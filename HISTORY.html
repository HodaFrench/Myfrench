<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>تاریخچه من | Français avec Hoda</title>
<link href="https://fonts.googleapis.com/css2?family=Estedad:wght@300;400;500;600;700&family=Roboto:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#1e3a5f;--gold:#b07a4a;--paper:#f4f3f5;--cream:#f9f8fa;--ink:#2c2a26;--gray:#8a8275;--line:#e2e1e3;--white:#fcfbfd;--green:#2e8b6b}
body{font-family:'Estedad',sans-serif;background:var(--paper);background-image:repeating-linear-gradient(transparent,transparent 31px,rgba(30,58,95,0.04) 31px,rgba(30,58,95,0.04) 32px);color:var(--ink);padding:0 0 60px}
.wrap{max-width:760px;margin:0 auto;padding:0 1rem}
.topbar{background:var(--navy);color:#f4f3f5;padding:11px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar a{color:#c4a572;text-decoration:none;font-size:13px}
.hero{background:linear-gradient(135deg,#1e3a5f,#2a5080);color:#fff;padding:28px 24px 24px;text-align:center}
.hero h1{font-family:'Roboto',serif;font-size:22px;font-weight:700;margin-bottom:6px}
.hero .sub{font-size:13px;opacity:.85}

/* stats */
.stats-row{display:flex;gap:10px;margin:18px 0;flex-wrap:wrap}
.stat-box{flex:1;min-width:100px;background:var(--white);border-radius:12px;padding:14px 12px;text-align:center;box-shadow:0 2px 10px rgba(31,58,95,.07);border:1px solid var(--line)}
.stat-val{font-size:24px;font-weight:800;color:var(--navy);line-height:1}
.stat-lbl{font-size:11px;color:var(--gray);margin-top:4px}

/* filter tabs */
.tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:6px 14px;border:1.5px solid var(--line);border-radius:20px;background:var(--cream);cursor:pointer;font-size:12.5px;font-weight:600;color:var(--gray);transition:all .2s}
.tab.active{background:var(--navy);color:#f5f0e8;border-color:var(--navy)}

/* timeline */
.day-group{margin-bottom:20px}
.day-label{font-size:11.5px;font-weight:700;color:var(--gold);letter-spacing:1px;padding:6px 0;border-bottom:1px solid var(--line);margin-bottom:10px}
.h-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--white);border-radius:10px;margin-bottom:6px;box-shadow:0 2px 8px rgba(31,58,95,.05);border:1px solid var(--line)}
.h-item.completed{border-right:3px solid var(--green)}
.h-item.visited{border-right:3px solid #b0b8c8}
.h-icon{font-size:18px;flex-shrink:0;width:32px;text-align:center}
.h-content{flex:1;min-width:0}
.h-title{font-size:13.5px;font-weight:600;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.h-meta{font-size:11px;color:var(--gray);margin-top:2px}
.h-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;flex-shrink:0}
.badge-done{background:rgba(46,139,107,.12);color:var(--green)}
.badge-visited{background:rgba(31,58,95,.08);color:#6a7a8a}
.h-link{font-size:11px;color:var(--navy);text-decoration:none;opacity:.5}
.h-link:hover{opacity:1}

.empty{text-align:center;padding:40px;color:var(--gray);font-size:14px}
</style>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="tracker.js"></script>
</head>
<body>
<style id="hk-wm">
.hk-wm{position:fixed;pointer-events:none;z-index:99999;font-family:Georgia,serif;font-size:13px;font-weight:600;color:rgba(30,58,95,0.07);letter-spacing:2px;transform:rotate(-25deg);user-select:none;white-space:nowrap}
</style>
<span class="hk-wm" style="top:22%;left:8%">Hoda Khedmati</span>
<span class="hk-wm" style="top:52%;left:42%">Hoda Khedmati</span>
<span class="hk-wm" style="top:78%;left:62%">Hoda Khedmati</span>
<style>
.hoda-back{position:sticky;top:0;z-index:200;background:rgba(255,253,246,.97);backdrop-filter:blur(12px);border-bottom:1.5px solid rgba(217,206,184,.55);display:flex;align-items:center;gap:10px;padding:9px 16px}
.hoda-back-btn{display:flex;align-items:center;gap:5px;background:#1e3a5f;color:#f5f0e8;text-decoration:none;border:none;border-radius:22px;padding:6px 16px;font-family:'Estedad',sans-serif;font-size:13.5px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background .2s}
.hoda-back-btn:hover{background:#2a5080}
.hoda-back-label{font-size:12px;color:#8a8275;flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
</style>
<div class="hoda-back">
  <a class="hoda-back-btn" href="index.html">&#8592; خانه</a>
  <span class="hoda-back-label">تاریخچه</span>
</div>

<div class="topbar">
  <a href="index.html">⌂ Français avec Hoda</a>
  <span style="font-size:13px;opacity:.7">📋 تاریخچه من</span>
</div>
<div class="hero">
  <h1>📋 تاریخچه یادگیری</h1>
  <div class="sub">همه چیزهایی که خوندی و کار کردی</div>
</div>

<div class="wrap">

<div class="stats-row" id="stats-row">
  <div class="stat-box"><div class="stat-val" id="s-total">۰</div><div class="stat-lbl">بازدید کل</div></div>
  <div class="stat-box"><div class="stat-val" id="s-done">۰</div><div class="stat-lbl">کامل خوانده</div></div>
  <div class="stat-box"><div class="stat-val" id="s-time">۰</div><div class="stat-lbl">دقیقه مطالعه</div></div>
  <div class="stat-box"><div class="stat-val" id="s-days">۰</div><div class="stat-lbl">روز فعال</div></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="filterH('all',this)">همه</div>
  <div class="tab" onclick="filterH('completed',this)">✅ خوانده‌شده</div>
  <div class="tab" onclick="filterH('grammar',this)">📐 گرامر</div>
  <div class="tab" onclick="filterH('vocab',this)">📚 واژگان</div>
  <div class="tab" onclick="filterH('image',this)">📸 تصویر</div>
  <div class="tab" onclick="filterH('podcast',this)">🎙️ پادکست</div>
</div>

<div id="history-list"></div>

</div>

<script>
function toFa(n){ return String(n).replace(/[0-9]/g,d=>'۰۱۲۳۴۵۶۷۸۹'[d]); }

function getCat(page){
  if(!page) return 'other';
  if(page.startsWith('GRAMMAR')) return 'grammar';
  if(page.startsWith('VOCAB')) return 'vocab';
  if(page.startsWith('IMAGE') || page.startsWith('img_')) return 'image';
  if(page.startsWith('IF_') || page.startsWith('PODCAST') || page.startsWith('innerfrench')) return 'podcast';
  if(page.startsWith('TCF') || page.includes('tcf') || page.includes('Tache')) return 'tcf';
  if(page.startsWith('Comparaison') || page.includes('comparaison')) return 'grammar';
  return 'other';
}

function getCatIcon(cat){
  const icons = {grammar:'📐',vocab:'📚',image:'📸',podcast:'🎧',tcf:'🎯',other:'📄'};
  return icons[cat] || '📄';
}

function getLink(page){
  if(!page) return '#';
  if(page.startsWith('IMAGE/') || page.startsWith('TCF/') || page.startsWith('Comparaison/')) return page;
  return page;
}

let allHistory = [];
let currentFilter = 'all';

function loadHistory(){
  const h = JSON.parse(localStorage.getItem('hoda_history')||'[]');
  const done = JSON.parse(localStorage.getItem('hoda_done')||'{}');
  const time = parseInt(localStorage.getItem('hoda_time')||'0');
  const joined = new Date(localStorage.getItem('hoda_joined')||new Date());
  
  // Mark completed status
  allHistory = h.map(item => ({
    ...item,
    completed: !!done[item.page] || item.completed
  }));
  
  // Stats
  document.getElementById('s-total').textContent = toFa(h.length);
  document.getElementById('s-done').textContent = toFa(Object.keys(done).length);
  document.getElementById('s-time').textContent = toFa(time);
  const days = Math.max(1, Math.floor((Date.now()-joined)/86400000));
  document.getElementById('s-days').textContent = toFa(days);
  
  renderHistory();
}

function filterH(filter, el){
  currentFilter = filter;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderHistory();
}

function renderHistory(){
  const list = document.getElementById('history-list');
  
  let items = allHistory;
  if(currentFilter === 'completed') items = items.filter(i=>i.completed);
  else if(currentFilter !== 'all') items = items.filter(i=>getCat(i.page)===currentFilter);
  
  if(!items.length){
    list.innerHTML = '<div class="empty">هنوز فعالیتی در این دسته نداری 📖</div>';
    return;
  }
  
  // Group by day
  const groups = {};
  items.forEach(item => {
    const d = item.time ? item.time.split('،')[0] : 'امروز';
    if(!groups[d]) groups[d] = [];
    groups[d].push(item);
  });
  
  list.innerHTML = Object.entries(groups).map(([day, dayItems]) => `
    <div class="day-group">
      <div class="day-label">📅 ${day}</div>
      ${dayItems.map(item => {
        const cat = getCat(item.page);
        const icon = getCatIcon(cat);
        const link = getLink(item.page);
        const t = item.time ? item.time.split('،')[1]?.trim() || '' : '';
        return `
        <div class="h-item ${item.completed?'completed':'visited'}">
          <div class="h-icon">${icon}</div>
          <div class="h-content">
            <div class="h-title">${item.title || item.page || '—'}</div>
            <div class="h-meta">${t}</div>
          </div>
          ${item.completed 
            ? '<span class="h-badge badge-done">✅ خوانده</span>'
            : '<span class="h-badge badge-visited">👁 بازدید</span>'
          }
          <a class="h-link" href="${link}">←</a>
        </div>`;
      }).join('')}
    </div>
  `).join('');
}

loadHistory();
</script>
<script>hodaAutoInitFull();</script>
<script>
/* hoda-protect: بازدارنده‌ی کپی (نه امنیت کامل) */
(function(){
  document.addEventListener('contextmenu',function(e){e.preventDefault();},{capture:true});
  document.addEventListener('selectstart',function(e){
    var t=e.target;
    if(t&&(t.tagName==='INPUT'||t.tagName==='TEXTAREA'||t.isContentEditable))return;
    e.preventDefault();
  });
  document.addEventListener('copy',function(e){
    var t=e.target;
    if(t&&(t.tagName==='INPUT'||t.tagName==='TEXTAREA'||t.isContentEditable))return;
    e.preventDefault();
  });
  document.addEventListener('keydown',function(e){
    var t=e.target;
    var inField=t&&(t.tagName==='INPUT'||t.tagName==='TEXTAREA'||t.isContentEditable);
    var k=(e.key||'').toLowerCase();
    if((e.ctrlKey||e.metaKey)&&['c','x','u','s','a'].indexOf(k)>-1&&!inField){e.preventDefault();}
  },{capture:true});
})();
</script>
<style>
body{-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none}
input,textarea,[contenteditable]{-webkit-user-select:text;-moz-user-select:text;-ms-user-select:text;user-select:text}
img{-webkit-user-drag:none;user-drag:none;pointer-events:none}
</style>
</body>
