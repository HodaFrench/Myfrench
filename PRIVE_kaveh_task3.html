<title>پرونده‌ی کاوه محمدی — Expression Orale Tâche 3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --navy:#1e3a5f; --navy-soft:#41618a; --purple:#7a5ba8; --purple-deep:#5a3b88;
    --gold:#b07a4a; --gold-soft:#c4a572; --terracotta:#c4502d;
    --paper:#f4f3f5; --paper-warm:#ebeaed; --cream:#f9f8fa;
    --ink:#2c2a26; --gray:#8a8275; --line:#e2e1e3; --white:#fcfbfd; --green:#2e8b6b;
  }
  body{font-family:'Vazirmatn',Arial,sans-serif; background-color:var(--paper);
    background-image:repeating-linear-gradient(transparent, transparent 31px, rgba(122,91,168,0.05) 31px, rgba(122,91,168,0.05) 32px);
    color:var(--ink); line-height:1.9; padding:20px 16px 70px;}
  .wrap{max-width:860px; margin:0 auto;}
  .topbar{display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap;}
  .topbar a{color:var(--purple); text-decoration:none; font-size:13.5px;
    border:1px solid var(--line); background:var(--cream); padding:9px 16px; border-radius:9px; transition:all .2s; cursor:pointer;}
  .topbar a:hover{background:var(--purple); color:#fff;}
  .header{background:linear-gradient(135deg,var(--purple),var(--purple-deep)); color:#fff;
    padding:32px 30px; border-radius:20px; text-align:center; margin-bottom:24px;
    box-shadow:0 14px 34px rgba(122,91,168,.26); position:relative; overflow:hidden;}
  .header::after{content:"";position:absolute;top:-40px;left:-40px;width:170px;height:170px;background:rgba(255,255,255,.06);border-radius:50%;}
  .header .tag{font-size:11px; color:var(--gold-soft); font-weight:700; letter-spacing:2px; margin-bottom:8px;}
  .header h1{font-size:25px; font-weight:700; margin-bottom:6px;}
  .header .sub{font-size:13.5px; opacity:.92;}

  #dashboard .intro{background:var(--paper-warm); border-right:4px solid var(--gold-soft); border-radius:12px;
    padding:16px 20px; margin-bottom:22px; font-size:14px; line-height:2.05;}
  #dashboard .intro b{color:var(--purple-deep);}
  .dash-section-title{font-size:14px; font-weight:700; color:var(--navy); margin:22px 0 12px; display:flex; align-items:center; gap:8px;}
  .dash-section-title::before{content:""; width:4px; height:18px; background:var(--purple); border-radius:2px;}
  .dash-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  @media(max-width:600px){.dash-grid{grid-template-columns:1fr;}}
  .dash-card{display:flex; align-items:center; gap:14px; background:var(--white); border:1px solid var(--line);
    border-radius:14px; padding:16px 18px; cursor:pointer; transition:all .2s; text-align:right; width:100%; font-family:inherit;}
  .dash-card:hover{transform:translateY(-3px); box-shadow:0 12px 28px rgba(122,91,168,.16); border-color:var(--purple);}
  .dash-card-emoji{font-size:26px; width:50px; height:50px; background:rgba(122,91,168,0.08); border-radius:13px; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .dash-card-body{flex:1;}
  .dash-card-num{font-size:11px; color:var(--purple); font-weight:700;}
  .dash-card-title{font-size:15px; font-weight:600; color:var(--navy); line-height:1.4;}
  .dash-card-go{font-size:18px; color:var(--purple); flex-shrink:0;}
  .dash-big{display:flex; align-items:center; gap:16px; border-radius:16px; padding:20px 24px; cursor:pointer; transition:all .2s; width:100%; font-family:inherit; text-align:right; color:#fff; margin-bottom:10px;}
  .dash-big.tpl{background:linear-gradient(135deg,#2e8b6b,#1d6b50); box-shadow:0 10px 26px rgba(46,139,107,.22);}
  .dash-big.struct{background:linear-gradient(135deg,var(--gold),#8a5d33); box-shadow:0 10px 26px rgba(176,122,74,.22);}
  .dash-big:hover{transform:translateY(-2px);}
  .dash-big-emoji{font-size:30px; flex-shrink:0;}
  .dash-big-body{flex:1;}
  .dash-big-title{font-size:16px; font-weight:700; margin-bottom:3px;}
  .dash-big-sub{font-size:12px; opacity:.92;}
  .dash-big-go{font-size:20px; flex-shrink:0;}

  #detail{display:none;}
  .back-bar{display:flex; align-items:center; gap:10px; margin-bottom:20px;}
  .back-btn{font-family:inherit; font-size:14px; font-weight:600; color:#fff; background:var(--purple); border:none; border-radius:10px; padding:10px 18px; cursor:pointer; transition:all .2s;}
  .back-btn:hover{background:var(--purple-deep);}
  .detail-label{font-size:12.5px; color:var(--gray);}

  .q-header{display:flex; align-items:center; gap:14px; margin-bottom:20px; padding-bottom:18px; border-bottom:2px solid var(--line);}
  .q-num{font-size:24px; flex-shrink:0;}
  .q-texts{flex:1;}
  .q-fr{font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:600; color:var(--navy); direction:ltr; text-align:left; line-height:1.3;}
  .q-fa{font-size:14px; color:var(--gray); margin-top:4px;}
  .types-legend{background:var(--cream); border-radius:12px; padding:14px 18px; margin-bottom:18px; font-size:12.5px; line-height:2;}
  .types-legend b{color:var(--navy);}
  .answers-wrap{display:flex; flex-direction:column; gap:12px;}
  .answer-card{border:1px solid var(--line); border-radius:12px; overflow:hidden;}
  .answer-card.best{border-color:var(--gold); box-shadow:0 4px 16px rgba(176,122,74,.12);}
  .answer-head{width:100%; display:flex; align-items:center; gap:10px; background:var(--cream); border:none; border-right:4px solid; padding:14px 18px; cursor:pointer; text-align:right; font-family:inherit;}
  .answer-head:hover{background:var(--paper-warm);}
  .answer-label{font-size:14px; font-weight:700; flex:1;}
  .answer-badge{font-size:10.5px; color:#fff; padding:3px 10px; border-radius:10px; font-weight:600; white-space:nowrap;}
  .answer-toggle{font-size:13px; color:var(--gray); transition:transform .25s;}
  .answer-card.open .answer-toggle{transform:rotate(180deg);}
  .answer-body{max-height:0; overflow:hidden; transition:max-height .4s ease;}
  .answer-card.open .answer-body{max-height:2400px;}
  .answer-desc{font-size:12.5px; color:var(--gray); line-height:1.9; padding:14px 18px 0; background:var(--white);}
  .answer-text{font-family:'Cormorant Garamond',serif; font-size:16.5px; line-height:1.95; color:var(--ink); direction:ltr; text-align:left; padding:12px 18px 18px; background:var(--white);}

  .struct-section{margin-top:22px; background:linear-gradient(135deg,rgba(46,123,181,0.06),rgba(122,91,168,0.04)); border-right:5px solid var(--navy-soft); border-radius:14px; padding:20px 22px;}
  .struct-head{font-size:16px; font-weight:700; color:var(--navy); margin-bottom:14px;}
  .struct-para{background:var(--white); border-radius:10px; padding:14px 16px; margin-bottom:10px; border:1px solid var(--line);}
  .struct-func{font-size:12px; color:var(--purple); font-weight:600; margin-bottom:6px;}
  .struct-text{font-family:'Cormorant Garamond',serif; font-size:15.5px; color:var(--ink); direction:ltr; text-align:left; line-height:1.8;}

  .practice-section{margin-top:22px; background:linear-gradient(135deg,rgba(46,139,107,0.06),rgba(196,165,114,0.05)); border-right:5px solid var(--green); border-radius:14px; padding:20px 22px;}
  .practice-head{font-size:16px; font-weight:700; color:var(--green); margin-bottom:6px;}
  .practice-sub{font-size:12.5px; color:var(--ink); line-height:1.9; margin-bottom:16px;}
  .skel-item{background:var(--white); border-radius:9px; padding:12px 16px; border:1px solid var(--line); margin-bottom:10px;}
  .skel-label{font-size:11.5px; color:var(--purple); font-weight:700; margin-bottom:5px;}
  .skel-text{font-family:'Cormorant Garamond',serif; font-size:15px; color:var(--navy); direction:ltr; text-align:left; line-height:1.8;}
  .golden-box{background:var(--white); border:1.5px solid var(--gold-soft); border-radius:12px; padding:14px 18px; margin-top:8px;}
  .golden-title{font-size:13px; font-weight:700; color:var(--gold); margin-bottom:10px;}
  .golden-item{font-family:'Cormorant Garamond',serif; font-size:15px; color:var(--ink); direction:ltr; text-align:left; padding:6px 0; border-bottom:1px dashed var(--line); line-height:1.7;}
  .golden-item:last-child{border-bottom:none;}

  .traps-intro{background:linear-gradient(135deg,rgba(196,80,45,.07),rgba(196,165,114,.05)); border-right:4px solid var(--terracotta); border-radius:12px; padding:16px 20px; margin:22px 0 16px; font-size:13px; line-height:1.95;}
  .traps-intro b{color:var(--terracotta);}
  .trap-item{background:var(--white); border:1px solid var(--line); border-radius:10px; padding:14px 16px; border-right:3px solid var(--gold-soft); margin-bottom:12px;}
  .trap-wrong{font-family:'Cormorant Garamond',serif; font-size:15.5px; color:#a04030; direction:ltr; text-align:left; text-decoration:line-through; text-decoration-color:rgba(196,80,45,.5); margin-bottom:6px;}
  .trap-right{font-family:'Cormorant Garamond',serif; font-size:16.5px; color:var(--green); font-weight:600; direction:ltr; text-align:left; margin-bottom:8px;}
  .trap-x{color:var(--terracotta); font-weight:700; text-decoration:none; display:inline-block;}
  .trap-check{color:var(--green); font-weight:700; display:inline-block;}
  .trap-why{font-size:12px; color:var(--gray); line-height:1.8; background:var(--cream); padding:8px 12px; border-radius:7px;}

  /* الگو و ساختار */
  .tpl-block{background:var(--white); border:1px solid var(--line); border-radius:14px; padding:20px 22px; margin-bottom:16px; box-shadow:0 6px 18px rgba(31,58,95,.05);}
  .tpl-block-title{font-size:15px; font-weight:700; color:var(--navy); margin-bottom:14px; display:flex; align-items:center; gap:8px; padding-bottom:10px; border-bottom:2px solid var(--paper-warm);}
  .plan-step{display:flex; gap:12px; padding:12px 0; border-bottom:1px dashed var(--line);}
  .plan-step:last-child{border-bottom:none;}
  .plan-num{flex-shrink:0; font-size:13px; font-weight:700; color:var(--purple); min-width:90px;}
  .plan-body{flex:1;}
  .plan-fr{font-family:'Cormorant Garamond',serif; font-size:15px; color:var(--ink); direction:ltr; text-align:left; line-height:1.7; margin-bottom:4px;}
  .plan-fa{font-size:12.5px; color:var(--gray);}
  .plan-time{font-size:11px; color:var(--gold); font-weight:600;}
  .bareme-row{display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px dashed var(--line); gap:10px;}
  .bareme-row:last-child{border-bottom:none;}
  .bareme-t{font-size:13.5px; font-weight:600; color:var(--navy);}
  .bareme-d{font-size:12px; color:var(--gray);}
  .bareme-p{font-size:13px; font-weight:700; color:var(--green); white-space:nowrap; flex-shrink:0;}
  .dodont-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  @media(max-width:600px){.dodont-grid{grid-template-columns:1fr;}}
  .dodont-col-title{font-size:14px; font-weight:700; margin-bottom:10px;}
  .do-title{color:var(--green);}
  .dont-title{color:var(--terracotta);}
  .dodont-item{border-radius:9px; padding:10px 13px; margin-bottom:8px; font-size:12.5px;}
  .do-item{background:rgba(46,139,107,0.07);}
  .dont-item{background:rgba(196,80,45,0.07);}
  .dodont-fr{font-family:'Cormorant Garamond',serif; font-size:14px; direction:ltr; text-align:left; margin-bottom:3px;}
  .do-item .dodont-fr{color:#1d6b50;}
  .dont-item .dodont-fr{color:#a04030;}
  .dodont-fa{font-size:11.5px; color:var(--gray);}

  .footer{text-align:center; margin-top:30px; color:var(--gray); font-size:12.5px;}
  .footer b{color:var(--purple);}
  .fade-in{animation:fadeIn .35s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>

  </div>
  <script>
    const T3 = {"template": {"duration": "۴ دقیقه و ۳۰ ثانیه — بدون آماده‌سازی", "bareme": [{"t": "غنا و ارتباط محتوا", "p": "۴ امتیاز", "d": "ایده‌های روشن و مرتبط + استدلال‌های متنوع و مشخص"}, {"t": "انسجام و سازماندهی", "p": "۲ امتیاز", "d": "ساختار منطقی: مقدمه، بدنه، نتیجه"}, {"t": "تسلط بر زبان", "p": "۲ امتیاز", "d": "واژگان مناسب، گرامر درست، روانی بیان"}], "plan": [{"step": "۱. مقدمه", "time": "~۳۰ ثانیه", "fr": "De nos jours, la question de... fait l'objet de débats. Certains pensent que... tandis que d'autres...", "fa": "طرح موضوع + اشاره به بحث روز + اعلام موضع شخصی"}, {"step": "۲. استدلال اول", "time": "~۱ دقیقه", "fr": "Premièrement / Tout d'abord... En effet... Par exemple...", "fa": "اولین دلیل + توضیح + مثال مشخص"}, {"step": "۳. استدلال دوم", "time": "~۱ دقیقه", "fr": "Deuxièmement / De plus / Par ailleurs...", "fa": "دلیل دوم + توضیح + مثال"}, {"step": "۴. استدلال سوم/ضداستدلال", "time": "~۱ دقیقه", "fr": "Cependant / Cela dit / Il ne faut pas oublier que...", "fa": "دلیل سوم یا نظر مخالف با ظرافت (نشانه‌ی پختگی)"}, {"step": "۵. نتیجه", "time": "~۳۰ ثانیه", "fr": "Pour conclure / En définitive, je dirais que...", "fa": "جمع‌بندی + تکرار موضع نهایی"}], "do": [{"fr": "De nos jours, ... fait l'objet de débats", "fa": "برای شروع رسمی موضوع"}, {"fr": "Il semble que / On peut considérer que", "fa": "بیان نظر رسمی (به‌جای À mon avis محاوره‌ای)"}, {"fr": "Premièrement... Deuxièmement... Enfin", "fa": "متصل‌کننده‌های ترتیبی"}, {"fr": "En effet / Par exemple / Ainsi", "fa": "توضیح و مثال"}, {"fr": "Cependant / Néanmoins / Cela dit", "fa": "بیان نظر مخالف با ظرافت"}, {"fr": "Pour conclure / En définitive", "fa": "نتیجه‌گیری"}, {"fr": "Il vaut mieux + مصدر", "fa": "پیشنهاد / توصیه"}, {"fr": "ce qui / ce que / dont", "fa": "جملات موصولی برای پیچیدگی"}], "dont": [{"fr": "Moi, je pense que... (تکراری)", "fa": "خیلی محاوره‌ای؛ به‌جایش Il me semble que"}, {"fr": "تکرار همان واژه‌ها", "fa": "غنای واژگانی یک معیار نمره است"}, {"fr": "جواب تک‌جمله‌ای یا خیلی کوتاه", "fa": "باید ۴.۵ دقیقه پیوسته حرف بزنی"}, {"fr": "سکوت طولانی یا گیر کردن", "fa": "بهتر است بازنویسی کنی تا ساکت بمانی"}, {"fr": "پریدن بین ایده‌ها بدون ربط", "fa": "نبودِ ساختار نمره را پایین می‌آورد"}, {"fr": "خارج شدن از موضوع (hors-sujet)", "fa": "همیشه به سؤال وفادار بمان"}]}, "questions": {"work": {"fr": "Est-il facile de travailler dans un autre pays ? Expliquez pourquoi.", "fa": "آیا کار کردن در کشوری دیگر آسان است؟ چرا؟", "emoji": "💼", "titre": "کار کردن در خارج", "answers": {"Type_1": "Le troisième point, et peut-être le plus important, concerne la promotion et l’avenir professionnel. Dans un autre pays, il peut être plus difficile d’obtenir une progression à long terme, parce que les règles ne sont pas toujours les mêmes. Dans certains contextes, les relations humaines positives et constructives comptent beaucoup ; dans d’autres, les critères techniques, les normes professionnelles ou les procédures dominent. Dans son pays d’origine, on peut parfois créer plus facilement des relations et compenser une faiblesse technique. À l’étranger, il faut d’abord comprendre les règles visibles et invisibles.", "Type_2": "Avec la mobilité professionnelle internationale, beaucoup de personnes quittent aujourd’hui leur pays pour travailler ailleurs. Cette réalité paraît souvent positive, parce qu’elle peut ouvrir des portes, offrir de nouvelles possibilités et aider certaines personnes à améliorer leur situation. Pourtant, je ne pense pas qu’il faille la présenter comme une démarche facile. Je reconnais son intérêt, mais je reste prudente. À mon avis, travailler dans un autre pays demande une préparation sérieuse, surtout pour trois raisons : la langue et la culture, la concurrence internationale et l’évolution de carrière.", "Type_3": "D’emblée, je suis d’avis que la langue représente une difficulté centrale. Vu que le travail ne se limite pas à exécuter des tâches techniques, il faut aussi discuter, comprendre les remarques, résoudre des désaccords et participer à des conversations informelles. Par exemple, dans un milieu rapide et multiculturel, une différence de ton ou une phrase mal comprise peut créer un problème durable. Il revient donc aux employés et aux managers de faire en sorte que la langue quotidienne et les codes culturels soient mieux compris. Ce qui passe avant tout, c’est l’ouverture d’esprit.", "Type_4": "Premièrement, la langue est un obstacle plus profond qu’on ne l’imagine. Dans un contexte professionnel, il ne suffit pas de connaître la langue officielle ou le vocabulaire technique. Il faut aussi comprendre les petites phrases, les habitudes de communication, les silences, l’humour, les critiques indirectes et la façon de gérer les tensions. Dans une équipe rapide, sérieuse et multiculturelle, un simple malentendu peut ralentir un projet ou rendre un conflit plus difficile à résoudre. C’est pour cela que la compétence linguistique doit toujours aller avec une vraie compréhension culturelle.", "Type_5": "Reste la question de l’avenir professionnel. Pour beaucoup, le vrai problème n’est pas seulement d’obtenir un emploi, mais de progresser. Or les cultures de promotion varient fortement : ici, les relations humaines constructives peuvent compter davantage ; ailleurs, ce sont les critères techniques, les procédures ou les normes professionnelles qui dominent. Dans son pays, on peut parfois compenser une faiblesse par une meilleure capacité relationnelle. À l’étranger, il faut d’abord comprendre comment la confiance se construit et comment les décisions de promotion se prennent. Ce décalage peut frustrer."}, "paragraphs": [{"func": "Introduction: sujet + débat actuel + opinion opposée + position personnelle", "text": "Aujourd’hui, travailler dans un autre pays attire beaucoup de personnes, parce que ce choix peut ouvrir des opportunités professionnelles et permettre une meilleure situation sociale ou économique. Pourtant, je ne dirais pas que c’est facile. Même si je comprends ceux qui voient cette voie comme une chance raisonnable, je pense qu’il faut être très prudent. À mon avis, la difficulté vient surtout de trois éléments : maîtriser la langue et les codes culturels, affronter une concurrence internationale, et progresser dans un système qui n’est pas le sien."}, {"func": "First argument: langue + culture + travail réel", "text": "Premièrement, la langue est un obstacle plus profond qu’on ne l’imagine. Dans un contexte professionnel, il ne suffit pas de connaître la langue officielle ou le vocabulaire technique. Il faut aussi comprendre les petites phrases, les habitudes de communication, les silences, l’humour, les critiques indirectes et la façon de gérer les tensions. Dans une équipe rapide, sérieuse et multiculturelle, un simple malentendu peut ralentir un projet ou rendre un conflit plus difficile à résoudre. C’est pour cela que la compétence linguistique doit toujours aller avec une vraie compréhension culturelle."}, {"func": "Second argument: culture multiculturelle + exemple Europe + small talk / fluidité", "text": "Deuxièmement, cette difficulté culturelle ne concerne pas seulement le pays d’accueil. Elle concerne aussi les collègues venus d’ailleurs. Dans l’exemple que j’ai retenu, une comparaison entre certains pays d’Europe de l’Est et d’Europe de l’Ouest montrait que, là où les travailleurs étrangers étaient plus nombreux, les problèmes quotidiens devenaient parfois plus lourds pour les cadres. Pour moi, cela signifie qu’un environnement international n’est pas automatiquement fluide. Il faut créer des espaces de dialogue, de petites conversations et de confiance."}, {"func": "Third argument: concurrence internationale + marché global + soft skills", "text": "Troisièmement, il ne faut pas oublier la concurrence. Quand on travaille dans son pays d’origine, dans un marché moins ouvert à l’immigration, on connaît mieux les règles du jeu et les attentes. À l’étranger, en revanche, on peut se retrouver en compétition avec des candidats venus du monde entier, parfois très solides techniquement. Dans ce cas, les compétences non techniques deviennent essentielles : savoir communiquer, s’adapter, comprendre les attentes et collaborer avec des personnes différentes. Sans préparation, on risque d’être surpris par le niveau réel du marché."}, {"func": "Counterargument + nuance: promotion, règles visibles/invisibles, difficulté mais pas impossibilité", "text": "Le point le plus délicat reste la progression à long terme. Trouver un emploi est déjà une étape ; obtenir des promotions en est une autre. Selon les pays, la promotion peut dépendre davantage des relations humaines, de la confiance, des normes professionnelles ou de la performance technique. Dans son pays, on peut parfois construire plus naturellement des relations et compenser certaines faiblesses. À l’étranger, il faut d’abord comprendre les règles visibles et invisibles. Cela ne rend pas la réussite impossible, mais cela demande plus de patience, de stratégie et de constance."}, {"func": "Conclusion: position + résumé + risque calculé + préparation", "text": "Pour conclure, travailler dans un autre pays peut être une expérience positive, mais ce n’est pas une option simple. Je comprends l’attrait de cette voie, car beaucoup ont réussi à améliorer leur position sociale et économique grâce à un risque calculé. Toutefois, cette réussite suppose une préparation sérieuse : langue, culture, concurrence, logique de promotion et gestion des risques. Donc, je dirais qu’il vaut mieux entrer dans ce parcours avec lucidité. Ce n’est pas impossible, mais c’est exigeant, et c’est cette exigence qu’il faut accepter avant de partir."}], "skeletons": [{"p": "P1", "text": "Aujourd’hui, travailler dans un autre pays attire beaucoup de personnes, car ________. Pourtant, je ne dirais pas que ________. À mon avis, la difficulté vient surtout de ________, ________ et ________."}, {"p": "P2", "text": "Premièrement, la langue est ________. Il ne suffit pas de ________. Il faut aussi comprendre ________, ________ et ________. C’est pour cela que ________."}, {"p": "P3", "text": "Deuxièmement, cette difficulté culturelle ne concerne pas seulement ________. Elle concerne aussi ________. Dans l’exemple que j’ai retenu, ________. Pour moi, cela signifie que ________."}, {"p": "P4", "text": "Troisièmement, il ne faut pas oublier ________. À l’étranger, on peut se retrouver ________. Dans ce cas, les compétences non techniques deviennent essentielles : ________, ________ et ________."}, {"p": "P5", "text": "Le point le plus délicat reste ________. Trouver un emploi est déjà ________; obtenir des promotions est ________. Selon les pays, ________. Cela demande ________."}, {"p": "P6", "text": "Pour conclure, travailler dans un autre pays peut être ________, mais ce n’est pas ________. Cette réussite suppose ________. Ce n’est pas impossible, mais ________."}], "skeletons2": [{"label": "P1", "text": "Aujourd’hui, travailler dans un autre pays attire beaucoup de personnes, car ________. Pourtant, je ne dirais pas que ________. À mon avis, la difficulté vient surtout de ________, ________ et ________."}, {"label": "P2", "text": "Premièrement, la langue est ________. Il ne suffit pas de ________. Il faut aussi comprendre ________, ________ et ________. C’est pour cela que ________."}, {"label": "P3", "text": "Deuxièmement, cette difficulté culturelle ne concerne pas seulement ________. Elle concerne aussi ________. Dans l’exemple que j’ai retenu, ________. Pour moi, cela signifie que ________."}, {"label": "P4", "text": "Troisièmement, il ne faut pas oublier ________. À l’étranger, on peut se retrouver ________. Dans ce cas, les compétences non techniques deviennent essentielles : ________, ________ et ________."}, {"label": "P5", "text": "Le point le plus délicat reste ________. Trouver un emploi est déjà ________; obtenir des promotions est ________. Selon les pays, ________. Cela demande ________."}, {"label": "P6", "text": "Pour conclure, travailler dans un autre pays peut être ________, mais ce n’est pas ________. Cette réussite suppose ________. Ce n’est pas impossible, mais ________."}], "golden": ["Ce n’est pas impossible, mais c’est exigeant, et c’est cette exigence qu’il faut accepter avant de partir."], "traps": [{"wrong": "un question sérieux", "right": "une question sérieuse", "why": "question مؤنث است."}, {"wrong": "avec essor", "right": "avec l’essor", "why": "اسم مفرد معمولاً article می‌خواهد."}, {"wrong": "quitter de son pays", "right": "quitter son pays", "why": "quitter فعل مستقیم است."}, {"wrong": "travaille dans un autre pays attire", "right": "travailler dans un autre pays attire", "why": "مصدر می‌تواند فاعل جمله باشد."}, {"wrong": "est facile travailler", "right": "est-il facile de travailler", "why": "ساختار سؤال رسمی."}, {"wrong": "se demander que", "right": "se demander si", "why": "برای سؤال غیرمستقیم بله/خیر از si استفاده می‌شود."}, {"wrong": "cette choix", "right": "ce choix", "why": "choix مذکر است."}, {"wrong": "peut ouvre", "right": "peut ouvrir", "why": "بعد از modal مصدر می‌آید."}, {"wrong": "meilleur situation", "right": "une meilleure situation", "why": "situation مؤنث است."}, {"wrong": "je ne dirai pas", "right": "je ne dirais pas", "why": "conditionnel برای نظر نرم‌تر."}, {"wrong": "ceux que voient", "right": "ceux qui voient", "why": "qui فاعل فعل است."}, {"wrong": "il faut de préparer", "right": "il faut préparer", "why": "بعد از il faut مصدر بدون de."}, {"wrong": "vient à", "right": "vient de", "why": "برای علت از de استفاده می‌شود."}, {"wrong": "maitriser", "right": "maîtriser", "why": "املای استاندارد با accent."}, {"wrong": "codes culturelle", "right": "codes culturels", "why": "codes مذکر جمع است."}]}, "adapt": {"fr": "Est-il difficile de s'adapter à la vie dans un autre pays ?", "fa": "آیا سازگاری با زندگی در کشوری دیگر سخت است؟", "emoji": "🌍", "titre": "سازگاری با کشور جدید", "answers": {"Type_1": "Aujourd’hui, vivre dans un autre pays n’est plus comme avant. C’est pour cela que la question de savoir s’il est encore compliqué de s’habituer à un nouveau pays me paraît importante. Certains pensent que cette expérience reste pleine de difficultés, de règles spéciales. Moi, je dirais plutôt que, de nos jours, l’adaptation peut être beaucoup plus simple. Je ne dis pas qu’il n’y a aucune difficulté, car la solitude et les différences locales existent toujours. Mais, par rapport au passé, la technologie, les médias, les voyages et les expériences partagées rendent ce changement moins inconnu.", "Type_2": "Troisièmement, le partage d’expériences joue un rôle très important. Aujourd’hui, les réseaux sociaux, les groupes en ligne et les groupes Telegram permettent de partager des informations concrètes. Une personne peut apprendre comment d’autres ont acheté un billet, trouvé un logement, compris une ville ou évité des erreurs simples. Le chemin devient donc plus transparent. Bien sûr, personne ne peut vivre exactement l’expérience d’un autre, et chaque adaptation reste personnelle. Pourtant, ces témoignages réduisent le sentiment d’être perdu et peuvent aider à trouver des contacts avant l’arrivée.", "Type_3": "Pour conclure, je pense que l’idée selon laquelle vivre ailleurs serait toujours compliqué ne l’emporte pas sur la réalité actuelle. Bien que la nostalgie et les différences locales puissent rester difficiles, je crois fermement que l’adaptation est devenue plus simple. Les outils numériques, le tourisme, les repères familiers et les expériences partagées donnent une base plus solide. À condition qu’une personne soit flexible, qu’elle cherche des informations avant, pendant et après son départ, il vaut mieux voir cette expérience comme un changement exigeant, mais traversable.", "Type_4": "Pour conclure, il est encore parfois difficile de s’habituer à vivre dans un autre pays, mais beaucoup moins qu’avant. Les outils numériques, le tourisme, les repères familiers et les témoignages partagés rendent l’arrivée plus claire et moins solitaire. Bien que la nostalgie, la langue et les règles locales puissent rester obstacles, l’adaptation devient possible si l’on adopte une attitude active. À condition de chercher des informations avant, pendant et après, il vaut mieux voir cette expérience non comme une rupture impossible, mais comme un changement exigeant qui peut devenir une base.", "Type_5": "En somme, s’habituer à un autre pays n’est pas devenu facile, mais c’est devenu nettement moins compliqué qu’avant. Les outils numériques, les témoignages, les cultures et les repères communs permettent de préparer l’arrivée et de réduire la sensation d’être perdu. Bien que la nostalgie, la langue, les règles locales et certaines différences profondes puissent peser, elles ne rendent pas l’adaptation impossible. À condition d’être flexible, curieux et actif avant, pendant et après, on peut transformer cette transition en étape de construction personnelle, avec moins de friction."}, "paragraphs": [], "skeletons": [], "skeletons2": [{"label": "Intro", "text": "Je dirais que s’habituer à vivre dans un autre pays n’est plus aussi ______ qu’autrefois, même si cela reste une expérience ______. Certaines personnes pensent qu’un nouveau pays reste difficile à ______. Pourtant, grâce à ______, aux voyages et aux expériences partagées, l’adaptation est devenue plus ______."}, {"label": "Argument 1", "text": "Mon premier argument, c’est que les outils numériques réduisent fortement ______. Avant d’arriver, on peut regarder ______, consulter ______ et lire des informations pratiques. Cela donne une première ______ du pays."}, {"label": "Argument 2", "text": "Ensuite, le tourisme et les échanges ont rendu les cultures moins ______. La nourriture peut devenir un ______ rassurant, parce qu’on peut retrouver certains restaurants, produits ou goûts familiers."}, {"label": "Argument 3", "text": "Un troisième élément essentiel est le partage des ______. Les réseaux sociaux et les groupes Telegram rendent le parcours plus ______. Cela ne remplace pas ______, mais cela réduit la confusion."}, {"label": "Counterargument", "text": "Cela dit, je ne veux pas ______ la situation. La solitude, l’éloignement, les règles ______, la langue réelle et certaines différences culturelles ou religieuses restent difficiles."}, {"label": "Conclusion", "text": "Pour conclure, vivre dans un autre pays reste parfois ______, mais beaucoup moins qu’avant. Il vaut mieux voir cette expérience non comme une rupture ______, mais comme un changement exigeant qui peut devenir une nouvelle ______."}], "golden": ["La préparation ne supprime pas la difficulté, mais elle permet de mieux la traverser.", "Une personne qui sait ce qu’elle cherche peut trouver plus vite les réponses utiles.", "Il vaut mieux voir cette expérience non comme une rupture impossible, mais comme un changement exigeant qui peut devenir une nouvelle base."], "traps": [{"wrong": "s’habituer dans un pays", "right": "s’habituer à un pays", "why": "این فعل با à می‌آید"}, {"wrong": "une autre pays", "right": "un autre pays", "why": "pays مذکر است"}, {"wrong": "un question", "right": "une question", "why": "question مؤنث است"}, {"wrong": "un expérience", "right": "une expérience", "why": "expérience مؤنث است"}, {"wrong": "un difficulté", "right": "une difficulté", "why": "difficulté مؤنث است"}, {"wrong": "un confusion", "right": "une confusion", "why": "confusion مؤنث است"}, {"wrong": "le solitude", "right": "la solitude", "why": "solitude مؤنث است"}, {"wrong": "la tourisme", "right": "le tourisme", "why": "tourisme مذکر است"}, {"wrong": "une repère", "right": "un repère", "why": "repère مذکر است"}, {"wrong": "un règle", "right": "une règle", "why": "règle مؤنث است"}, {"wrong": "le culture", "right": "la culture", "why": "culture مؤنث است"}, {"wrong": "un langue", "right": "une langue", "why": "langue مؤنث است"}, {"wrong": "les outil numériques", "right": "les outils numériques", "why": "جمع با s"}, {"wrong": "les médias aide", "right": "les médias aident", "why": "فاعل جمع، فعل جمع"}, {"wrong": "des plateforme", "right": "des plateformes", "why": "اسم جمع s می‌گیرد"}]}, "tv": {"fr": "Quel rôle joue la télévision dans l'éducation des enfants ?", "fa": "تلویزیون چه نقشی در آموزش کودکان دارد؟", "emoji": "📺", "titre": "تلویزیون و آموزش", "answers": {"Type_1": "Pour conclure, la télévision a eu une place centrale dans la vie familiale, mais depuis une vingtaine d’années, elle a perdu une grande partie de son rôle dans l’apprentissage des nouvelles générations. Aujourd’hui, d’autres outils technologiques, comme les réseaux sociaux, les plateformes en ligne et des formats similaires, prennent plus de temps, attirent plus l’attention, et peuvent être plus interactifs et plus diversifiés. Donc, même si la télévision reste installée dans les habitudes, je ne la considère pas comme nécessaire. Son influence diminue chaque jour davantage.", "Type_2": "En conclusion, je ne dirais pas que la télévision est nécessaire à l’éducation des enfants. Elle a été centrale pendant une période, mais elle a progressivement perdu son rôle dominant. Aujourd’hui, les réseaux sociaux, les plateformes en ligne et d’autres outils technologiques attirent davantage l’attention des jeunes, occupent plus leur temps et offrent plus de diversité et d’interaction. La télévision peut rester utile pour diffuser des informations éducatives générales, mais son poids réel diminue. Pour moi, elle est devenue un outil secondaire, pas un élément essentiel de l’éducation.", "Type_3": "Pour conclure, je dirais que les limites de la télévision l’emportent sur ses avantages éducatifs. Bien qu’elle puisse diffuser des contenus utiles et qu’elle ait compté dans les familles, elle n’est plus au centre de l’apprentissage. Les réseaux sociaux, les plateformes en ligne et d’autres outils technologiques prennent plus de temps, tout en étant plus interactifs et plus diversifiés. Donc, je crois fermement que la télévision peut aider à informer, à condition qu’on ne la confonde pas avec une vraie éducation adaptée. Il vaut mieux la considérer comme secondaire.", "Type_4": "Pour conclure, je dirais que la télévision a été importante, mais qu’elle n’est plus nécessaire à l’éducation des enfants aujourd’hui. Son rôle diminue parce que les jeunes consacrent davantage leur temps à d’autres plateformes, et parce que l’apprentissage exige plus d’échange et de diversité. Elle peut encore servir à diffuser largement certains contenus, notamment pour informer ou réduire les écarts d’accès. Mais son influence devient secondaire. À mon avis, il vaut mieux la considérer comme un outil utile dans certains cas, et non comme un pilier de l’éducation moderne.", "Type_5": "En définitive, la télévision a eu une importance historique, mais elle ne me semble plus nécessaire à l’éducation. Les vingt dernières années ont montré un recul de son influence au profit des réseaux sociaux, des plateformes en ligne et d’autres formats, qui prennent plus de temps et offrent davantage d’interaction et de diversité. Bien sûr, la télévision peut encore diffuser des contenus utiles à grande échelle. Mais son rôle devient progressivement secondaire. Pour moi, l’éducation moderne doit aller vers des outils plus réactifs, variés et capables de répondre aux questions réelles des enfants."}, "paragraphs": [], "skeletons": [], "skeletons2": [{"label": "", "text": "Je pense que la télévision n’est plus __________ à l’éducation des enfants, même si elle a longtemps __________ dans les familles."}, {"label": "", "text": "Depuis les années 2000, les médias de masse sont devenus __________, et il est normal de se demander si elle garde une __________ éducative."}, {"label": "", "text": "Certains diraient qu’elle reste utile, parce qu’elle __________ des contenus à beaucoup d’enfants."}, {"label": "", "text": "Cependant, à mes yeux, elle n’est plus __________."}, {"label": "", "text": "D’abord, il faut regarder sa __________ réelle dans la vie des enfants."}, {"label": "", "text": "Les jeunes ation", "why": "collocation درست"}, {"wrong": "le télévision", "right": "la télévision", "why": "télévision مؤنث است"}, {"wrong": "le éducation", "right": "l’éducation", "why": "شروع با vowel"}, {"wrong": "même que", "right": "même si", "why": "برای «اگرچه»"}, {"wrong": "depuis 2000, les médias deviennent", "right": "depuis 2000, les médias sont devenus", "why": "از گذشته تا حال"}, {"wrong": "demander si elle garde", "right": "se demander si elle garde", "why": "فعل pronominal"}, {"wrong": "valeur éducatif", "right": "valeur éducative", "why": "valeur مؤنث"}, {"wrong": "certains disent همیشه", "right": "certains diraient", "why": "conditionnel مودبانه"}, {"wrong": "parce que elle", "right": "parce qu’elle", "why": "قبل از vowel"}, {"wrong": "des contenu", "right": "des contenus", "why": "جمع"}, {"wrong": "je reconnait", "right": "je reconnais", "why": "صرف درست"}, {"wrong": "dans mes eyes", "right": "à mes yeux", "why": "عبارت ثابت"}, {"wrong": "central", "right": "centrale", "why": "télévision مؤنث"}, {"wrong": "répondre les besoins", "right": "répondre aux besoins", "why": "répondre à + les = aux"}, {"wrong": "besoins variées", "right": "besoins variés", "why": "besoins مذکر جمع"}]}}};
