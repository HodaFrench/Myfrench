<!DOCTYPE html><html lang="fa" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>les mots de l'info</title><link href="https://fonts.googleapis.com/css2?family=Estedad:wght@300;400;500;600;700;800&family=Roboto:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}
:root{--brown:#b07a4a;--brown-d:#8a5d33;--cream:#faf6f0;--ink:#3a352e;--soft:#7d7264}
body{font-family:"Estedad",sans-serif;background:var(--cream);color:var(--ink);line-height:1.8;padding:0 0 80px;-webkit-tap-highlight-color:transparent}
.hoda-watermark{position:fixed;inset:0;z-index:9000;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20width%3D%27320%27%20height%3D%27190%27%3E%3Ctext%20x%3D%270%27%20y%3D%27100%27%20font-family%3D%27Georgia%2Cserif%27%20font-size%3D%2716%27%20fill%3D%27rgba%28176%2C122%2C74%2C0.045%29%27%20transform%3D%27rotate%28-25%20160%2095%29%27%3EHoda%20Khedmati%3C/text%3E%3C/svg%3E");background-repeat:repeat}
.top{position:sticky;top:0;z-index:200;background:rgba(250,246,240,.94);backdrop-filter:blur(14px);border-bottom:1px solid rgba(176,122,74,.14);display:flex;align-items:center;gap:10px;padding:11px 16px}
.top a{display:inline-flex;align-items:center;gap:5px;background:var(--brown);color:#fff;text-decoration:none;border-radius:24px;padding:7px 17px;font-size:13.5px;font-weight:700;box-shadow:0 3px 10px rgba(176,122,74,.25)}
.top a:active{transform:scale(.95)}
.top .tl{font-size:12px;color:var(--soft);flex:1;text-align:center;font-weight:600}
.chero{text-align:center;padding:26px 24px 6px}
.chero .cic{width:82px;height:82px;border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:42px;margin:0 auto 14px;box-shadow:0 8px 22px rgba(0,0,0,.12)}
.chero .cname{font-size:22px;font-weight:800;color:var(--ink);margin-bottom:3px}
.chero .cfr{font-family:"Roboto",serif;font-size:14px;color:var(--brown);direction:ltr;font-style:italic;margin-bottom:6px;font-weight:600}
.chero .cdesc{font-size:13px;color:var(--soft);max-width:320px;margin:0 auto}
.chero .line{width:50px;height:4px;background:linear-gradient(90deg,#b07a4a,#d6a86e);border-radius:10px;margin:16px auto 4px}
.list{max-width:620px;margin:0 auto;padding:12px 16px}
.lesson{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid rgba(176,122,74,.14);border-radius:20px;padding:16px 16px;margin-bottom:13px;text-decoration:none;color:inherit;box-shadow:0 4px 14px rgba(176,122,74,.06);transition:transform .16s,box-shadow .16s}
.lesson:active{transform:scale(.975);box-shadow:0 2px 7px rgba(176,122,74,.1)}
.lesson .lnum{flex-shrink:0;width:46px;height:46px;border-radius:14px;background:linear-gradient(135deg,var(--brown),var(--brown-d));color:#fff;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:800;box-shadow:0 4px 10px rgba(138,93,51,.25)}
.lesson .ltx{flex:1;min-width:0}
.lesson .lt{font-size:15px;font-weight:800;color:var(--ink);margin-bottom:2px;line-height:1.35}
.lesson .lf{font-family:"Roboto",serif;font-size:11.5px;color:var(--brown);direction:ltr;font-style:italic;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lesson .lv{flex-shrink:0;font-size:10.5px;font-weight:800;color:#fff;background:var(--brown);border-radius:14px;padding:4px 11px}
.lesson .larr{flex-shrink:0;color:var(--brown);font-size:22px;font-weight:700}
.empty{text-align:center;padding:50px 30px;color:var(--soft)}
.empty .eic{font-size:52px;margin-bottom:14px;opacity:.5}
.empty .et{font-size:15px;font-weight:700;margin-bottom:6px;color:var(--ink)}
.empty .ed{font-size:13px}
.foot{text-align:center;font-size:12px;color:var(--soft);margin:16px 20px 0;padding:14px;line-height:1.85}
.foot b{color:var(--brown-d)}
@media(max-width:360px){.chero .cic{width:72px;height:72px;font-size:37px}.chero .cname{font-size:20px}.lesson{padding:14px 13px;border-radius:17px}.lesson .lnum{width:42px;height:42px;font-size:17px}}
</style></head><body><div class="hoda-watermark"></div><div class="top"><a href="MOTSINFO_index.html">&#8592; دسته‌ها</a><span class="tl">🗞️ کلمات خبری</span></div><div class="chero"><div class="cic" id="cic">🗞️</div><div class="cname" id="cname">…</div><div class="cfr" id="cfr"></div><div class="cdesc" id="cdesc"></div><div class="line"></div></div><div class="list" id="list"></div><div class="foot">📖 روی هر درس بزن تا واژه‌هایش را ببینی.<br><b>هر درس</b> شامل ۱۰ واژه با تعریف، معنی و مثال B2 است.</div><script src="data.js"></script>
<script>
var META={"ecole": {"fa": "کلمات مدرسه", "fr": "L'école", "emoji": "🏫", "desc": "درباره‌ی آموزش، نمره و کلاس", "ac": "#c98a4b"}, "travail": {"fa": "کلمات کار", "fr": "Le travail", "emoji": "💼", "desc": "شغل، استخدام و محیط کار", "ac": "#b0743e"}, "loisirs": {"fa": "سرگرمی و فرهنگ", "fr": "Loisirs & culture", "emoji": "🎭", "desc": "غذا، سریال، سینما و کتاب", "ac": "#cf9a5f"}, "tourisme": {"fa": "کلمات گردشگری", "fr": "Le tourisme", "emoji": "✈️", "desc": "سفر، مقصد و میراث", "ac": "#bd8551"}, "consommation": {"fa": "کلمات مصرف", "fr": "La consommation", "emoji": "🛒", "desc": "خرید، پول و مصرف", "ac": "#c68d55"}, "relations": {"fa": "روابط اجتماعی", "fr": "Les relations", "emoji": "👨‍👩‍👧", "desc": "خانواده و روابط انسانی", "ac": "#d19a68"}, "transports": {"fa": "کلمات حمل‌ونقل", "fr": "Les transports", "emoji": "🚲", "desc": "جابه‌جایی و وسایل نقلیه", "ac": "#b57d47"}, "environnement": {"fa": "محیط زیست", "fr": "L'environnement", "emoji": "🌿", "desc": "طبیعت و اقلیم", "ac": "#a8894f"}, "sante": {"fa": "کلمات سلامت", "fr": "La santé", "emoji": "❤️", "desc": "تغذیه، خواب و سلامت روان", "ac": "#cf8a6a"}, "medias": {"fa": "کلمات رسانه‌ها", "fr": "Les médias", "emoji": "📱", "desc": "اینترنت، شبکه‌ها و دیجیتال", "ac": "#c2864f"}};
function q(k){var m=(window.location.search||'').match(new RegExp(k+'=([a-z_]+)'));return m?m[1]:null;}
function build(){
  var cat=q('cat');
  if(!cat){try{cat=sessionStorage.getItem('mi_cat');}catch(e){}}
  var meta=META[cat]||{fa:'دسته',fr:'',emoji:'🗞️',desc:'',ac:'#b07a4a'};
  // سربرگ
  document.getElementById('cic').style.background='linear-gradient(135deg,'+meta.ac+','+meta.ac+')';
  document.getElementById('cic').textContent=meta.emoji;
  document.getElementById('cname').textContent=meta.fa;
  document.getElementById('cfr').textContent=meta.fr;
  document.getElementById('cdesc').textContent=meta.desc;
  document.title=meta.fa+" — les mots de l'info";
  // درس‌ها
  var items=[];
  try{items=(typeof LESSONS!=='undefined'?LESSONS.filter(function(l){return l.category==='vocab'&&l.sub==='mots_info'&&l.cat2===cat;}):[]);}catch(e){}
  var box=document.getElementById('list');
  if(!items.length){
    box.innerHTML='<div class="empty"><div class="eic">'+meta.emoji+'</div><div class="et">این دسته هنوز خالی است</div><div class="ed">به‌زودی درس‌های این بخش اضافه می‌شود.</div></div>';
    return;
  }
  var h='';
  items.forEach(function(l,i){
    var lv=l.level?'<span class="lv">'+l.level+'</span>':'';
    h+='<a class="lesson" href="'+(l.file||'#')+'"><span class="lnum">'+(i+1)+'</span><span class="ltx"><span class="lt">'+l.title+'</span><span class="lf">'+(l.titleFr||'')+'</span></span>'+lv+'<span class="larr">&#8249;</span></a>';
  });
  box.innerHTML=h;
}
window.addEventListener('DOMContentLoaded',build);
</script><script>(function(){document.addEventListener("contextmenu",function(e){e.preventDefault();},{capture:true});document.addEventListener("copy",function(e){var t=e.target;if(t&&(t.tagName==="INPUT"||t.tagName==="TEXTAREA"||t.isContentEditable))return;e.preventDefault();});document.addEventListener("keydown",function(e){var t=e.target;var f=t&&(t.tagName==="INPUT"||t.tagName==="TEXTAREA"||t.isContentEditable);var k=(e.key||"").toLowerCase();if((e.ctrlKey||e.metaKey)&&["c","x","u","s","a"].indexOf(k)>-1&&!f){e.preventDefault();}},{capture:true});})();</script><style>body{-webkit-user-select:none;user-select:none}input,textarea,[contenteditable]{user-select:text}img{pointer-events:none}</style><script src="backbtn.js"></script>
</body></html>
