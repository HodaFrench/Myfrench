<meta charset="UTF-8">

<title>گردونه موضوع | Français avec Hoda</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#1e3a5f;--gold:#b07a4a;--paper:#f4f3f5;--cream:#f9f8fa;--ink:#2c2a26;--gray:#8a8275;--line:#e2e1e3;--white:#fcfbfd;--pur:#7a5ba8}
body{font-family:'Estedad',sans-serif;background:var(--paper);background-image:repeating-linear-gradient(transparent,transparent 31px,rgba(30,58,95,.04) 31px,rgba(30,58,95,.04) 32px);color:var(--ink);padding-bottom:60px}
.wrap{max-width:780px;margin:0 auto;padding:0 1rem}
.hoda-back{position:sticky;top:0;z-index:200;background:rgba(255,253,246,.97);backdrop-filter:blur(12px);border-bottom:1.5px solid rgba(217,206,184,.55);display:flex;align-items:center;gap:10px;padding:9px 16px}
.hoda-back-btn{display:flex;align-items:center;gap:5px;background:var(--navy);color:#f5f0e8;text-decoration:none;border-radius:22px;padding:6px 16px;font-family:'Estedad',sans-serif;font-size:13.5px;font-weight:700;white-space:nowrap;transition:background .2s}
.hoda-back-btn:hover{background:#2a5080}
.hero{background:linear-gradient(135deg,#1e3a5f,#2a4f7f);color:#fff;padding:26px 20px 22px;text-align:center}
.hero h1{font-family:'Roboto',serif;font-size:22px;font-weight:700;margin-bottom:4px}
.wheel-sec{display:flex;flex-direction:column;align-items:center;padding:24px 0 14px}
.wheel-wrap{position:relative;width:270px;height:270px}
.wheel-ptr{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:26px;z-index:10;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3))}
canvas{border-radius:50%;box-shadow:0 8px 36px rgba(122,59,136,.35),0 0 0 5px rgba(122,59,136,.12);display:block}
.spin-btn{margin-top:18px;padding:12px 36px;background:linear-gradient(135deg,#1e3a5f,#2a4f7f);color:#fff;border:none;border-radius:14px;font-family:'Estedad',sans-serif;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 18px rgba(122,59,136,.4);transition:all .22s}
.spin-btn:hover{transform:translateY(-2px)}
.spin-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.result-card{background:var(--white);border-radius:16px;padding:16px 20px;margin:16px 0 0;box-shadow:0 4px 18px rgba(31,58,95,.09);border-right:4px solid var(--pur);display:none;animation:si .35s ease}
.result-card.show{display:block}
@keyframes si{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.r-label{font-size:10.5px;font-weight:700;color:var(--pur);letter-spacing:1.5px;margin-bottom:6px}
.r-topic{font-family:'Roboto',serif;font-size:22px;font-weight:700;color:var(--navy);direction:ltr;text-align:left}
.r-fa{font-size:14px;color:var(--gray);margin-top:3px;margin-bottom:10px}
.vocab-helper{background:var(--cream);border-radius:10px;padding:12px 14px;margin-top:8px}
.vh-title{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:1px;margin-bottom:8px}
.vh-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.vh-item{font-size:12px;padding:4px 8px;background:var(--white);border-radius:6px;direction:ltr;text-align:left;color:var(--navy)}
.mode-tabs{display:flex;gap:0;border-bottom:2px solid var(--line);margin:22px 0 0}
.mode-tab{flex:1;padding:10px;border:none;background:transparent;cursor:pointer;font-family:'Estedad',sans-serif;font-size:14px;font-weight:600;color:var(--gray);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s}
.mode-tab.act{color:var(--pur);border-bottom-color:var(--pur)}
.t-list{padding:12px 0;display:flex;flex-direction:column;gap:6px}
.t-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--white);border-radius:10px;cursor:pointer;transition:all .18s;border:1px solid var(--line)}
.t-item:hover{background:rgba(122,91,168,.06);border-color:rgba(122,91,168,.3)}
.t-num{font-size:10.5px;font-weight:700;color:var(--pur);width:26px;text-align:center;flex-shrink:0}
.t-fr{font-family:'Roboto',serif;font-size:15px;color:var(--navy);direction:ltr}
.t-fa{font-size:12px;color:var(--gray);margin-top:1px}
.t-arr{color:#b0a8c0;font-size:14px;margin-right:auto;flex-shrink:0}

.model-opt{margin-top:14px}
.model-btn{width:100%;background:linear-gradient(135deg,#7a5ba8,#5a3b88);color:#fff;border:none;border-radius:12px;padding:11px;font-family:'Estedad',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.model-btn:active{transform:scale(.98)}
.model-text{margin-top:12px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.mt-fr{direction:ltr;text-align:left;font-family:'Roboto',serif;font-size:14.5px;line-height:1.95;color:#2c3e50}
.mt-fa{margin-top:11px;font-size:13px;color:#5a6b60;line-height:1.95;border-top:1px dashed var(--line);padding-top:11px}
.mt-soon{color:#8a8275;font-size:13.5px;text-align:center;padding:6px}
</style>

<script src="tracker.js"></script>

let mode='w',spinning=false,angle=0;
function drawWheel(a){
  const cv=document.getElementById('wheel'),ctx=cv.getContext('2d');
  const cx=135,r=131,n=12,arc=(2*Math.PI)/n;
  ctx.clearRect(0,0,270,270);
  const items=mode==='w'?W:S;
  for(let i=0;i<n;i++){
    const s=a+i*arc,e=s+arc;
    ctx.beginPath();ctx.moveTo(cx,cx);ctx.arc(cx,cx,r,s,e);ctx.closePath();
    ctx.fillStyle=COLORS[i%COLORS.length];ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=2;ctx.stroke();
    ctx.save();ctx.translate(cx,cx);ctx.rotate(s+arc/2);
    ctx.textAlign='right';ctx.fillStyle='rgba(255,255,255,.95)';
    ctx.font="bold 10.5px 'Roboto',sans-serif";
    ctx.fillText((items[i%items.length][0]).substring(0,16),r-10,4);
    ctx.restore();
  }
  ctx.beginPath();ctx.arc(cx,cx,26,0,2*Math.PI);
  ctx.fillStyle='#f4f3f5';ctx.fill();
  ctx.strokeStyle='rgba(122,59,136,.25)';ctx.lineWidth=3;ctx.stroke();
  ctx.fillStyle='#7a5ba8';ctx.font='bold 15px Arial';ctx.textAlign='center';
  ctx.fillText('🎡',cx,cx+6);
}
function spin(){
  if(spinning)return;
  spinning=true;
  const btn=document.getElementById('spin-btn');
  btn.disabled=true;btn.textContent='⏳ در حال چرخش...';
  document.getElementById('rc').classList.remove('show');
  const total=(5+Math.random()*5)*2*Math.PI;
  const dur=3000+Math.random()*1500;
  const t0=performance.now(),a0=angle;
  function anim(t){
    const p=Math.min((t-t0)/dur,1),e=1-Math.pow(1-p,4);
    angle=a0+total*e;drawWheel(angle);
    if(p<1){requestAnimationFrame(anim);}
    else{
      spinning=false;btn.disabled=false;btn.textContent='🎡 دوباره بچرخون!';
      if(navigator.vibrate)navigator.vibrate([80,40,80,40,160]);
      const items=mode==='w'?W:S;
      const n=12,arc=(2*Math.PI)/n;
      const na=(((-angle)%(2*Math.PI))+(2*Math.PI))%(2*Math.PI);
      showResult(Math.floor(na/arc)%items.length);
    }
  }
  requestAnimationFrame(anim);

"le cinéma":{f:"J'adore aller au cinéma le week-end.<br>Je préfère les films d'aventure et les comédies, mais j'aime aussi les documentaires.<br>Le grand écran et le son rendent l'expérience vraiment spéciale.<br>Parfois, je regarde un film en version originale pour améliorer mon français.<br>Pour moi, le cinéma est une façon de voyager et de rêver sans quitter ma chaise.",p:"عاشق اینم که آخر هفته برم سینما. فیلم‌های ماجراجویی و کمدی رو ترجیح می‌دم ولی مستند هم دوست دارم. پرده‌ی بزرگ و صدا تجربه رو واقعاً خاص می‌کنه. گاهی فیلم رو به زبان اصلی می‌بینم تا فرانسه‌م بهتر بشه. برای من سینما راهیه برای سفر و رویا بدون اینکه از جام بلند شم."},
"la mode":{f:"La mode est une manière d'exprimer sa personnalité.<br>Je n'achète pas beaucoup de vêtements, mais je choisis des pièces simples et de bonne qualité.<br>J'aime les couleurs neutres parce qu'elles vont avec tout.<br>Suivre toutes les tendances coûte cher et ce n'est pas écologique.<br>Le plus important, c'est de se sentir bien et à l'aise dans ses vêtements.",p:"مد راهیه برای بیان شخصیت. زیاد لباس نمی‌خرم ولی تکه‌های ساده و باکیفیت انتخاب می‌کنم. رنگ‌های خنثی دوست دارم چون با همه‌چیز ست می‌شن. دنبال‌کردن همه‌ی ترندها هم گرونه هم برای محیط‌زیست بد. مهم‌تر از همه اینه که آدم توی لباسش راحت و خوب حس کنه."},
"l'amour":{f:"L'amour est l'un des sentiments les plus forts de la vie.<br>Il ne s'agit pas seulement de l'amour romantique, mais aussi de l'amour de la famille et des amis.<br>Aimer quelqu'un, c'est l'accepter avec ses qualités et ses défauts.<br>La confiance et le respect sont la base d'une relation solide.<br>Pour moi, l'amour donne du sens et de la chaleur à notre quotidien.",p:"عشق یکی از قوی‌ترین احساسات زندگیه. فقط عشق عاشقانه نیست، عشق به خانواده و دوست‌ها هم هست. دوست‌داشتنِ کسی یعنی پذیرفتنش با خوبی‌ها و عیب‌هاش. اعتماد و احترام پایه‌ی یه رابطه‌ی محکمه. برای من عشق به زندگی روزمره معنا و گرما می‌ده."},
"l'argent":{f:"L'argent est nécessaire pour vivre, mais il ne fait pas tout.<br>Il permet de payer le logement, la nourriture et les choses essentielles.<br>J'essaie de faire des économies chaque mois pour être tranquille.<br>Cependant, la santé, la famille et le temps libre sont plus précieux que l'argent.<br>À mon avis, il faut savoir gérer son argent sans en devenir esclave.",p:"پول برای زندگی لازمه ولی همه‌چیز نیست. کمک می‌کنه هزینه‌ی خونه و غذا و چیزهای ضروری رو بدیم. سعی می‌کنم هر ماه پس‌انداز کنم تا خیالم راحت باشه. ولی سلامتی و خانواده و وقت آزاد از پول باارزش‌ترن. به نظرم باید پول رو مدیریت کرد بدون اینکه برده‌ش بشیم."},
"le bonheur":{f:"Pour moi, le bonheur, ce sont les petits moments de la vie.<br>Un bon café le matin, un sourire, une promenade au soleil me rendent heureux.<br>Le bonheur ne dépend pas de l'argent ou des objets.<br>Il vient surtout des relations, de la santé et de la liberté de choisir.<br>Je pense qu'on est plus heureux quand on apprécie ce qu'on a déjà.",p:"برای من خوشبختی همون لحظه‌های کوچیک زندگیه. یه قهوه‌ی خوب صبح، یه لبخند، یه قدم‌زدن زیر آفتاب خوشحالم می‌کنه. خوشبختی به پول یا اشیا بستگی نداره. بیشتر از روابط، سلامتی و آزادیِ انتخاب میاد. فکر می‌کنم وقتی قدر چیزهایی که داریم رو بدونیم، خوشبخت‌تریم."},
"la solitude":{f:"La solitude n'est pas toujours une chose négative.<br>Parfois, j'ai besoin d'être seul pour me reposer et réfléchir.<br>Ces moments calmes m'aident à mieux me connaître.<br>Mais trop de solitude peut rendre triste et isolé.<br>L'important, c'est de trouver un équilibre entre le temps seul et le temps avec les autres.",p:"تنهایی همیشه چیز بدی نیست. گاهی لازم دارم تنها باشم تا استراحت کنم و فکر کنم. این لحظه‌های آروم کمکم می‌کنن خودم رو بهتر بشناسم. ولی تنهاییِ زیاد می‌تونه آدم رو غمگین و منزوی کنه. مهم اینه که بین وقت تنهایی و وقت با بقیه تعادل پیدا کنیم."},
"la peur":{f:"Tout le monde a peur de quelque chose, c'est normal.<br>Certaines personnes ont peur du noir, d'autres de parler en public.<br>La peur est une réaction naturelle qui nous protège du danger.<br>Mais parfois, elle nous empêche d'avancer et d'essayer de nouvelles choses.<br>Je pense qu'il faut affronter ses peurs petit à petit pour devenir plus fort.",p:"همه از چیزی می‌ترسن، طبیعیه. بعضی‌ها از تاریکی می‌ترسن، بعضی‌ها از حرف‌زدن جلوی جمع. ترس یه واکنش طبیعیه که از خطر محافظتمون می‌کنه. ولی گاهی نمی‌ذاره جلو بریم و چیزهای جدید رو امتحان کنیم. فکر می‌کنم باید کم‌کم با ترس‌هامون روبه‌رو شیم تا قوی‌تر بشیم."},
"le rêve":{f:"Tout le monde a des rêves, petits ou grands.<br>Certains rêvent de voyager, d'autres de réussir dans leur travail.<br>Mon rêve est de parler plusieurs langues et de découvrir le monde.<br>Les rêves nous donnent de la motivation et un but dans la vie.<br>Je crois qu'avec de la patience et des efforts, on peut réaliser ses rêves.",p:"همه رویا دارن، کوچیک یا بزرگ. بعضی‌ها رویای سفر دارن، بعضی‌ها موفقیت توی کار. رویای من اینه که چند زبون حرف بزنم و دنیا رو ببینم. رویاها بهمون انگیزه و هدف توی زندگی می‌دن. باور دارم با صبر و تلاش می‌شه رویاها رو محقق کرد."},
"les animaux":{f:"J'aime beaucoup les animaux, surtout les chiens et les chats.<br>Ils nous tiennent compagnie et nous donnent beaucoup d'affection.<br>Avoir un animal demande du temps et des responsabilités.<br>Il faut le nourrir, le soigner et s'occuper de lui chaque jour.<br>Je pense qu'il est important de protéger aussi les animaux sauvages et leur habitat.",p:"حیوانات رو خیلی دوست دارم، مخصوصاً سگ و گربه. بهمون همدمی می‌دن و کلی محبت. داشتنِ حیوون وقت و مسئولیت می‌خواد. باید هر روز غذاش بدی، ازش مراقبت کنی و بهش برسی. فکر می‌کنم محافظت از حیوانات وحشی و زیستگاهشون هم مهمه."},
"la nature":{f:"La nature est essentielle pour notre bien-être.<br>J'aime me promener dans la forêt et respirer l'air frais.<br>Le contact avec la nature aide à réduire le stress et à se détendre.<br>Malheureusement, la pollution et le réchauffement la menacent.<br>Nous devons tous la protéger pour les générations futures.",p:"طبیعت برای آرامش ما ضروریه. دوست دارم توی جنگل قدم بزنم و هوای تازه تنفس کنم. تماس با طبیعت کمک می‌کنه استرس کم شه و آدم آروم بگیره. متأسفانه آلودگی و گرمایش تهدیدش می‌کنن. همه‌مون باید برای نسل‌های آینده ازش محافظت کنیم."},
"la ville":{f:"J'habite dans une grande ville et j'aime son énergie.<br>Il y a beaucoup de magasins, de restaurants et de transports en commun.<br>On n'a jamais le temps de s'ennuyer en ville.<br>Par contre, il y a souvent du bruit, de la pollution et de la circulation.<br>La vie en ville est pratique, mais parfois fatigante.",p:"توی یه شهر بزرگ زندگی می‌کنم و انرژی‌ش رو دوست دارم. کلی مغازه و رستوران و حمل‌ونقل عمومی هست. آدم توی شهر هیچ‌وقت وقت نمی‌کنه حوصله‌ش سر بره. ولی در عوض اغلب سروصدا و آلودگی و ترافیک هست. زندگی شهری راحته ولی گاهی خسته‌کننده‌ست."},
"la campagne":{f:"La campagne est un endroit calme et reposant.<br>L'air y est pur et on est entouré de nature et d'animaux.<br>La vie y est plus lente et plus simple qu'en ville.<br>On peut cultiver un jardin et profiter du silence.<br>Par contre, il y a moins de services et de transports qu'en ville.",p:"روستا جای آروم و آرامش‌بخشیه. هوا اونجا پاکه و آدم میون طبیعت و حیوون‌هاست. زندگی اونجا آروم‌تر و ساده‌تر از شهره. می‌شه باغچه پرورش داد و از سکوت لذت برد. ولی در عوض خدمات و حمل‌ونقل کمتری نسبت به شهر هست."},
"la mer":{f:"J'adore la mer et le bruit des vagues.<br>En été, j'aime nager et me reposer sur la plage.<br>La mer me donne une sensation de liberté et de calme.<br>On peut aussi faire de belles promenades au bord de l'eau.<br>Il est important de garder la mer propre et de ne pas la polluer.",p:"عاشق دریا و صدای موج‌هام. تابستون دوست دارم شنا کنم و روی ساحل استراحت کنم. دریا بهم حس آزادی و آرامش می‌ده. می‌شه کنار آب هم قدم‌زدن‌های قشنگ داشت. مهمه که دریا رو تمیز نگه داریم و آلوده‌ش نکنیم."},
"Parlez d'un voyage mémorable.":{f:"Je me souviens encore de mon voyage à Paris.<br>C'était la première fois que je visitais une ville aussi belle.<br>J'ai vu la tour Eiffel, j'ai goûté de bons plats et j'ai rencontré des gens sympas.<br>Chaque jour, je découvrais quelque chose de nouveau.<br>Ce voyage restera un souvenir inoubliable pour toute ma vie.",p:"هنوز سفرم به پاریس رو یادمه. اولین باری بود که یه شهر به این قشنگی رو می‌دیدم. برج ایفل رو دیدم، غذاهای خوب چشیدم و آدم‌های مهربون دیدم. هر روز یه چیز جدید کشف می‌کردم. این سفر تا آخر عمر یه خاطره‌ی فراموش‌نشدنی می‌مونه."},
"Quelles qualités cherchez-vous chez un(e) ami(e) ?":{f:"Pour moi, la qualité la plus importante chez un ami, c'est l'honnêteté.<br>J'apprécie aussi quelqu'un de fidèle, qui reste là dans les moments difficiles.<br>Un bon ami sait écouter sans juger.<br>Le sens de l'humour est important aussi, car on aime rire ensemble.<br>Un vrai ami, c'est quelqu'un en qui on peut avoir confiance.",p:"برای من مهم‌ترین ویژگی توی یه دوست صداقته. آدمِ وفادار رو هم دوست دارم، کسی که توی لحظه‌های سخت کنارت می‌مونه. یه دوست خوب بلده بدون قضاوت گوش بده. حس شوخ‌طبعی هم مهمه، چون دوست داریم با هم بخندیم. دوست واقعی کسیه که بشه بهش اعتماد کرد."},
"Pensez-vous que l'argent fait le bonheur ?":{f:"À mon avis, l'argent ne fait pas vraiment le bonheur.<br>Bien sûr, il est nécessaire pour vivre confortablement et sans stress.<br>Mais les choses les plus importantes ne s'achètent pas : la santé, l'amour, l'amitié.<br>On peut être riche et se sentir seul et malheureux.<br>Je pense que l'argent aide, mais le vrai bonheur vient d'ailleurs.",p:"به نظر من پول واقعاً خوشبختی نمیاره. البته برای زندگیِ راحت و بی‌استرس لازمه. ولی مهم‌ترین چیزها خریدنی نیستن: سلامتی، عشق، دوستی. آدم می‌تونه پولدار باشه ولی تنها و ناراحت حس کنه. فکر می‌کنم پول کمک می‌کنه ولی خوشبختیِ واقعی جای دیگه‌ایه."},
"Comment gérez-vous le stress ?":{f:"Quand je suis stressé, j'essaie d'abord de respirer profondément.<br>Faire du sport ou marcher un peu m'aide beaucoup à me calmer.<br>J'aime aussi écouter de la musique ou parler avec un ami.<br>Il est important de bien dormir et de ne pas tout garder pour soi.<br>Petit à petit, j'apprends à rester calme face aux problèmes.",p:"وقتی استرس دارم، اول سعی می‌کنم عمیق نفس بکشم. ورزش‌کردن یا یه‌کم قدم‌زدن خیلی کمکم می‌کنه آروم شم. دوست دارم موسیقی گوش بدم یا با یه دوست حرف بزنم. مهمه که خوب بخوابم و همه‌چیز رو تو خودم نریزم. کم‌کم دارم یاد می‌گیرم جلوی مشکلات آروم بمونم."},
"la famille":{f:"Ma famille est très importante pour moi.<br>Nous sommes cinq à la maison : mes parents, mon frère, ma sœur et moi.<br>Le week-end, nous aimons manger ensemble et discuter de notre semaine.<br>Mes grands-parents habitent près de chez nous, alors on les voit souvent.<br>Pour moi, la famille, c'est le soutien et l'amour de tous les jours.",p:"خانواده برام خیلی مهمه. توی خونه پنج‌نفریم: پدر و مادرم، برادرم، خواهرم و من. آخر هفته دوست داریم با هم غذا بخوریم و درباره‌ی هفته‌مون حرف بزنیم. پدربزرگ و مادربزرگم نزدیک ما زندگی می‌کنن، برای همین زیاد می‌بینیمشون. برای من، خانواده یعنی حمایت و محبتِ هر روز."},
"le travail":{f:"Je travaille dans un bureau depuis trois ans.<br>J'aime bien mes collègues, mais les réunions sont parfois trop longues.<br>Mon patron est sympa et il respecte notre temps.<br>Le matin, je suis plus productif, alors je fais les tâches difficiles tôt.<br>Le travail peut être fatigant, mais il donne un sens à ma journée.",p:"سه ساله که توی یه دفتر کار می‌کنم. همکارهام رو دوست دارم، ولی جلسه‌ها گاهی خیلی طولانی‌ان. رئیسم مهربونه و به وقتمون احترام می‌ذاره. صبح‌ها بازده‌ترم، برای همین کارهای سخت رو زود انجام می‌دم. کار می‌تونه خسته‌کننده باشه، ولی به روزم معنا می‌ده."},
"les vacances":{f:"Chaque été, je pars en vacances avec ma famille.<br>Cette année, nous allons à la plage pour nous reposer au soleil.<br>J'adore voyager, visiter de nouveaux endroits et goûter la cuisine locale.<br>Avant de partir, je prépare toujours ma valise et mon passeport.<br>Les vacances, c'est le moment idéal pour oublier le stress et profiter de la vie.",p:"هر تابستون با خانواده‌م می‌رم تعطیلات. امسال می‌ریم ساحل تا زیر آفتاب استراحت کنیم. عاشق سفر، دیدن جاهای جدید و چشیدن غذای محلی‌ام. قبل از رفتن، همیشه چمدون و پاسپورتم رو آماده می‌کنم. تعطیلات بهترین وقته برای فراموش‌کردن استرس و لذت‌بردن از زندگی."},
"la nourriture":{f:"J'aime beaucoup cuisiner pour mes amis le week-end.<br>Mon plat préféré est délicieux mais un peu épicé.<br>Quand je trouve une bonne recette, je la garde toujours.<br>J'aime les choses sucrées, mais je préfère un repas frais et léger.<br>Pour moi, un bon repas, c'est aussi un moment de partage.",p:"خیلی دوست دارم آخر هفته برای دوستام آشپزی کنم. غذای موردعلاقه‌م خوشمزه ولی کمی تنده. وقتی یه دستور پختِ خوب پیدا می‌کنم، همیشه نگهش می‌دارم. چیزای شیرین دوست دارم، ولی غذای تازه و سبک رو ترجیح می‌دم. برای من، یه غذای خوب یه لحظه‌ی هم‌نشینی هم هست."},
"la santé":{f:"Pour rester en bonne santé, j'essaie de bien dormir et de faire de l'exercice.<br>Quand je suis malade, je vais chez le médecin et je prends mes médicaments.<br>Le stress est mauvais pour le corps, alors je fais attention.<br>Je mange sainement et je bois beaucoup d'eau.<br>La santé, c'est la chose la plus précieuse que nous ayons.",p:"برای سالم موندن، سعی می‌کنم خوب بخوابم و ورزش کنم. وقتی مریض می‌شم، می‌رم دکتر و داروهام رو می‌خورم. استرس برای بدن بده، برای همین حواسم هست. سالم غذا می‌خورم و آب زیاد می‌نوشم. سلامتی باارزش‌ترین چیزیه که داریم."},
"l'environnement":{f:"La protection de l'environnement est un sujet très important aujourd'hui.<br>Pour réduire la pollution, j'essaie de recycler et d'économiser l'énergie.<br>Je prends le vélo ou les transports en commun au lieu de la voiture.<br>Le changement climatique menace la nature, alors chacun doit agir.<br>Protéger la planète, c'est protéger notre avenir.",p:"محافظت از محیط زیست امروز موضوع خیلی مهمیه. برای کم‌کردن آلودگی، سعی می‌کنم بازیافت کنم و انرژی رو ذخیره کنم. به‌جای ماشین، دوچرخه یا حمل‌ونقل عمومی سوار می‌شم. تغییر اقلیم طبیعت رو تهدید می‌کنه، پس همه باید کاری کنیم. محافظت از سیاره یعنی محافظت از آینده‌مون."},
"la technologie":{f:"La technologie a complètement changé notre vie quotidienne.<br>Avec mon téléphone, je peux communiquer, travailler et apprendre partout.<br>Internet est très utile, mais il faut aussi faire attention à notre vie privée.<br>Parfois, je préfère éteindre mes écrans pour me reposer.<br>La technologie est un outil : tout dépend de comment on l'utilise.",p:"تکنولوژی زندگی روزمره‌مون رو کاملاً عوض کرده. با گوشیم می‌تونم همه‌جا ارتباط بگیرم، کار کنم و یاد بگیرم. اینترنت خیلی مفیده، ولی باید حواسمون به حریم خصوصی هم باشه. گاهی ترجیح می‌دم صفحه‌نمایش‌ها رو خاموش کنم تا استراحت کنم. تکنولوژی یه ابزاره: همه‌چیز به نحوه‌ی استفاده‌مون بستگی داره."},
"les voyages":{f:"Voyager est l'une de mes plus grandes passions.<br>J'aime découvrir de nouvelles cultures et rencontrer des gens différents.<br>Quand je visite un pays, j'essaie toujours de parler la langue locale.<br>Avant chaque voyage, je prépare mon itinéraire et je réserve mon hôtel.<br>Chaque voyage me rend plus ouvert et plus curieux.",p:"سفر یکی از بزرگ‌ترین علاقه‌هامه. دوست دارم فرهنگ‌های جدید کشف کنم و آدم‌های متفاوت ببینم. وقتی یه کشور رو می‌بینم، همیشه سعی می‌کنم زبون محلی رو حرف بزنم. قبل از هر سفر، برنامه‌م رو می‌چینم و هتلم رو رزرو می‌کنم. هر سفری منو بازتر و کنجکاوتر می‌کنه."},
"l'amitié":{f:"Pour moi, l'amitié est aussi importante que la famille.<br>Un vrai ami est quelqu'un qui te soutient dans les moments difficiles.<br>J'ai quelques amis proches en qui j'ai totalement confiance.<br>Nous rions ensemble, mais nous pouvons aussi parler de tout.<br>Une belle amitié, ça se construit avec le temps et la sincérité.",p:"برای من، دوستی به‌اندازه‌ی خانواده مهمه. یه دوستِ واقعی کسیه که توی لحظه‌های سخت کنارته. چند تا دوستِ صمیمی دارم که کاملاً بهشون اعتماد دارم. با هم می‌خندیم، ولی می‌تونیم درباره‌ی همه‌چی هم حرف بزنیم. یه دوستیِ خوب با زمان و صداقت ساخته می‌شه."},
"l'école":{f:"Je me souviens encore très bien de mes années d'école.<br>J'avais des professeurs sévères, mais ils m'ont beaucoup appris.<br>À l'école, on n'apprend pas seulement des leçons, mais aussi à vivre ensemble.<br>Mes matières préférées étaient les langues et l'histoire.<br>L'éducation est la base de tout dans la vie.",p:"هنوزم سال‌های مدرسه‌م رو خیلی خوب یادمه. معلم‌های سخت‌گیری داشتم، ولی خیلی چیزا یادم دادن. توی مدرسه فقط درس یاد نمی‌گیری، بلکه با هم زندگی‌کردن رو هم یاد می‌گیری. درس‌های موردعلاقه‌م زبان و تاریخ بودن. آموزش پایه‌ی همه‌چیز توی زندگیه."},
"le sport":{f:"Faire du sport est essentiel pour rester en forme.<br>Je m'entraîne trois fois par semaine, surtout le matin.<br>Le sport m'aide à réduire le stress et à mieux dormir.<br>J'aime aussi regarder les matchs avec mes amis le week-end.<br>Un corps actif, c'est un esprit en bonne santé.",p:"ورزش‌کردن برای فرم موندن ضروریه. هفته‌ای سه بار تمرین می‌کنم، بیشتر صبح‌ها. ورزش کمکم می‌کنه استرسم کم بشه و بهتر بخوابم. آخر هفته هم دوست دارم با دوستام مسابقه ببینم. بدنِ فعال یعنی ذهنِ سالم."},
"la musique":{f:"La musique fait partie de ma vie tous les jours.<br>J'écoute différents styles selon mon humeur.<br>Quand je suis triste, une belle chanson peut me redonner le sourire.<br>J'aimerais aussi apprendre à jouer d'un instrument un jour.<br>La musique est une langue que tout le monde comprend.",p:"موسیقی هر روز بخشی از زندگیمه. بسته به حالم سبک‌های مختلف گوش می‌دم. وقتی غمگینم، یه آهنگِ قشنگ می‌تونه لبخند رو بهم برگردونه. دوست دارم یه روز نواختنِ یه ساز رو هم یاد بگیرم. موسیقی زبونیه که همه می‌فهمنش."},
"Décrivez votre journée idéale.":{f:"Ma journée idéale commence tard, sans réveil.<br>Le matin, je prends un bon petit-déjeuner et je me promène au soleil.<br>L'après-midi, je fais une activité relaxante comme lire ou cuisiner.<br>Le soir, je retrouve mes amis pour un dîner agréable.<br>Une journée parfaite, c'est un équilibre entre repos et plaisir.",p:"روزِ ایده‌آلِ من دیر شروع می‌شه، بدون ساعتِ زنگ‌دار. صبح یه صبحانه‌ی خوب می‌خورم و زیر آفتاب قدم می‌زنم. بعدازظهر یه کارِ آرام‌بخش مثل کتاب‌خوندن یا آشپزی می‌کنم. شب با دوستام برای یه شامِ دلپذیر دور هم جمع می‌شیم. یه روزِ کامل یعنی تعادل بین استراحت و لذت."},
"Quel est votre plus grand rêve ?":{f:"Mon plus grand rêve est de voyager dans le monde entier.<br>Je veux découvrir d'autres cultures et apprendre plusieurs langues.<br>J'espère aussi avoir un travail qui a du sens pour moi.<br>Je sais que ce n'est pas facile, mais je reste motivé.<br>Un jour, je suis sûr que je réaliserai ce rêve.",p:"بزرگ‌ترین رؤیای من سفر به سراسر دنیاست. می‌خوام فرهنگ‌های دیگه رو کشف کنم و چند تا زبون یاد بگیرم. امیدوارم یه کاری هم داشته باشم که برام معنا داره. می‌دونم آسون نیست، ولی باانگیزه می‌مونم. مطمئنم یه روز این رؤیا رو محقق می‌کنم."},
"Parlez d'une personne importante dans votre vie.":{f:"Une personne très importante dans ma vie est ma mère.<br>Elle m'a toujours soutenu et elle croit en moi.<br>J'admire sa patience et sa force dans les moments difficiles.<br>Grâce à elle, j'ai appris à ne jamais abandonner.<br>Je lui suis vraiment reconnaissant pour tout ce qu'elle fait.",p:"یه آدمِ خیلی مهم توی زندگیم مادرمه. همیشه ازم حمایت کرده و بهم باور داره. صبر و قدرتش رو توی لحظه‌های سخت تحسین می‌کنم. به‌خاطر اون یاد گرفتم هیچ‌وقت تسلیم نشم. واقعاً برای همه‌ی کارهایی که می‌کنه ازش ممنونم."},
"Quels sont les avantages et inconvénients des réseaux sociaux ?":{f:"Les réseaux sociaux ont beaucoup d'avantages et d'inconvénients.<br>D'un côté, ils permettent de rester connecté avec nos proches.<br>On peut aussi partager des idées et apprendre des choses utiles.<br>D'un autre côté, ils peuvent rendre les gens dépendants et nuire à la vie privée.<br>Le plus important, c'est de trouver un bon équilibre.",p:"شبکه‌های اجتماعی مزایا و معایب زیادی دارن. از یه طرف، اجازه می‌دن با عزیزانمون در ارتباط بمونیم. می‌شه ایده‌ها رو هم به اشتراک گذاشت و چیزای مفید یاد گرفت. از طرف دیگه، می‌تونن آدم‌ها رو وابسته کنن و به حریم خصوصی آسیب بزنن. مهم‌تر از همه، پیدا‌کردن یه تعادلِ خوبه."},
"Si vous pouviez vivre dans un autre pays, lequel choisiriez-vous ?":{f:"Si je pouvais vivre dans un autre pays, je choisirais la France.<br>J'aime sa culture, sa langue et son art de vivre.<br>Bien sûr, il faudrait s'adapter à un nouveau mode de vie.<br>Au début, ce serait difficile, surtout pour la langue.<br>Mais je pense que ce serait une expérience inoubliable.",p:"اگه می‌تونستم توی یه کشور دیگه زندگی کنم، فرانسه رو انتخاب می‌کردم. فرهنگ، زبون و هنرِ زندگیش رو دوست دارم. البته باید با یه سبکِ زندگیِ جدید سازگار بشم. اولش سخت می‌بود، مخصوصاً برای زبون. ولی فکر می‌کنم تجربه‌ی فراموش‌نشدنی‌ای می‌بود."},
"Décrivez votre repas préféré.":{f:"Mon repas préféré est un plat simple mais délicieux.<br>J'adore les pâtes avec une sauce tomate maison.<br>Ce qui rend ce plat spécial, c'est qu'on le mange en famille.<br>Ma mère le prépare le dimanche, et toute la maison sent bon.<br>Pour moi, un bon repas, c'est aussi de bons souvenirs.",p:"غذای موردعلاقه‌م یه غذای ساده ولی خوشمزه‌ست. عاشق ماکارونی با سسِ گوجه‌ی خونگی‌ام. چیزی که این غذا رو خاص می‌کنه اینه که خانوادگی می‌خوریمش. مادرم یکشنبه‌ها درستش می‌کنه و کلِ خونه بوی خوب می‌گیره. برای من، یه غذای خوب یعنی خاطره‌های خوب هم."},
"Qu'est-ce qui vous rend heureux(se) ?":{f:"Beaucoup de petites choses me rendent heureux chaque jour.<br>Passer du temps avec mes proches me donne de l'énergie.<br>J'aime aussi les moments simples, comme un café le matin.<br>Apprendre quelque chose de nouveau me rend fier de moi.<br>Pour moi, le bonheur, ce sont surtout ces petits moments.",p:"خیلی چیزای کوچیک هر روز خوشحالم می‌کنن. وقت‌گذروندن با عزیزانم بهم انرژی می‌ده. لحظه‌های ساده رو هم دوست دارم، مثل یه قهوه‌ی صبحگاهی. یادگرفتنِ یه چیزِ جدید بهم حسِ افتخار می‌ده. برای من، خوشبختی بیشتر همین لحظه‌های کوچیکه."},
"Comment passez-vous votre temps libre ?":{f:"Pendant mon temps libre, j'aime faire plusieurs activités.<br>Souvent, je lis un livre ou je regarde un bon film.<br>Quand il fait beau, je me promène dans la nature.<br>J'aime aussi retrouver mes amis pour discuter autour d'un café.<br>Le temps libre, c'est important pour se détendre et recharger les batteries.",p:"توی وقتِ آزادم دوست دارم کارهای مختلف بکنم. اغلب یه کتاب می‌خونم یا یه فیلمِ خوب می‌بینم. وقتی هوا خوبه، توی طبیعت قدم می‌زنم. دوست دارم با دوستام هم دور یه قهوه گپ بزنم. وقتِ آزاد برای آروم‌شدن و شارژ‌شدن مهمه."}
};

function toggleModel(){
  var mt=document.getElementById('r-model-text');
  var mb=document.getElementById('r-model-btn');
  if(mt.style.display==='none'){mt.style.display='block';mb.textContent='\uD83D\uDD3C بستن متن نمونه';}
  else{mt.style.display='none';mb.textContent='\uD83D\uDCDD متن نمونه‌ی ۵ خطی را ببین';}
}
function showResult(i){
  const items=mode==='w'?W:S;
  const item=items[i];
  document.getElementById('r-topic').textContent=item[0];
  document.getElementById('r-fa').textContent=item[1];
  if(item[2]&&item[2].length){
    document.getElementById('r-vocab-grid').innerHTML=item[2].map(v=>'<div class="vh-item">'+v+'</div>').join('');
    document.getElementById('r-vocab').style.display='block';
  }else{document.getElementById('r-vocab').style.display='none';}
  // متن نمونه‌ی ۵ خطی
  var mt=document.getElementById('r-model-text');
  var mb=document.getElementById('r-model-btn');
  mt.style.display='none';
  mb.textContent='\uD83D\uDCDD متن نمونه‌ی ۵ خطی را ببین';
  var tx=TEXTS[item[0]];
  if(tx){mt.innerHTML='<div class="mt-fr">'+tx.f+'</div><div class="mt-fa">'+tx.p+'</div>';}
  else{mt.innerHTML='<div class="mt-soon">نمونه‌ی این موضوع به‌زودی اضافه می‌شود ✍️</div>';}
  const rc=document.getElementById('rc');
  rc.classList.remove('show');void rc.offsetWidth;rc.classList.add('show');
  rc.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function switchMode(m,el){
  mode=m;
  document.querySelectorAll('.mode-tab').forEach(t=>t.classList.remove('act'));
  el.classList.add('act');drawWheel(angle);renderList();
  document.getElementById('rc').classList.remove('show');
}
function renderList(){
  const items=mode==='w'?W:S;
  document.getElementById('t-list').innerHTML=items.map((item,i)=>
    '<div class="t-item" onclick="showResult('+i+');document.getElementById(\'rc\').scrollIntoView({behavior:\'smooth\'})">'
    +'<span class="t-num">'+(i+1)+'</span>'
    +'<div style="flex:1"><div class="t-fr">'+item[0]+'</div><div class="t-fa">'+item[1]+'</div></div>'
    +'<span class="t-arr">🎯</span></div>'
  ).join('');
}
drawWheel(0);renderList();
</script>
<script>hodaAutoInitFull();</script>
<script>
/* hoda-protect: بازدارنده‌ی کپی (نه امنیت کامل) */
(function(){
  document.addEventListener('contextmenu',function(e){e.preventDefault();},{capture:true});
  document.addEventListener('selectstart',function(e){
    var t=e.target;
    if(t&&(t.tagName==='INPUT'||t.tagName==='TEXTAREA'||t.isContentEditable))return;
    e.preventDefault();
  });
  document.addEventListener('copy',function(e){
    var t=e.target;
    if(t&&(t.tagName==='INPUT'||t.tagName==='TEXTAREA'||t.isContentEditable))return;
    e.preventDefault();
  });
  document.addEventListener('keydown',function(e){
    var t=e.target;
    var inField=t&&(t.tagName==='INPUT'||t.tagName==='TEXTAREA'||t.isContentEditable);
    var k=(e.key||'').toLowerCase();
    if((e.ctrlKey||e.metaKey)&&['c','x','u','s','a'].indexOf(k)>-1&&!inField){e.preventDefault();}
  },{capture:true});
})();
</script>
<style>
body{-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none}
input,textarea,[contenteditable]{-webkit-user-select:text;-moz-user-select:text;-ms-user-select:text;user-select:text}
img{-webkit-user-drag:none;user-drag:none;pointer-events:none}
</style>
<script src="backbtn.js"></script>
</body>
