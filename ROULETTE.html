<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#1e3a5f;--gold:#b07a4a;--paper:#f4f3f5;--cream:#f9f8fa;--ink:#2c2a26;--gray:#8a8275;--line:#e2e1e3;--white:#fcfbfd}

/* WHEEL */
.wheel-section{display:flex;flex-direction:column;align-items:center;padding:24px 0 16px}
.wheel-wrap{position:relative;width:280px;height:280px;margin:0 auto}
.wheel-pointer{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:28px;z-index:10;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3))}
canvas{border-radius:50%;box-shadow:0 8px 40px rgba(122,59,136,.35),0 0 0 6px rgba(122,59,136,.15);display:block}

.spin-btn{
  margin-top:20px;
  padding:13px 40px;
  background:linear-gradient(135deg,#7a5ba8,#4a2d7a);
  color:#fff;border:none;border-radius:14px;
  font-family:'Estedad',sans-serif;font-size:16px;font-weight:700;
  cursor:pointer;transition:all .25s;
  box-shadow:0 4px 20px rgba(122,59,136,.4);
}
.spin-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(122,59,136,.5)}
.spin-btn:active{transform:translateY(0)}
.spin-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* result */
.result-card{
  background:var(--white);border-radius:16px;padding:20px 22px;
  margin:18px 0 0;box-shadow:0 4px 20px rgba(31,58,95,.1);
  border-right:4px solid #7a5ba8;
  display:none;animation:slideIn .4s ease;
}
.result-card.show{display:block}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.result-label{font-size:11px;font-weight:700;color:#7a5ba8;letter-spacing:1.5px;margin-bottom:8px}
.result-topic{font-family:'Roboto',serif;font-size:24px;font-weight:700;color:var(--navy);direction:ltr;text-align:left;margin-bottom:4px}
.result-fa{font-size:14px;color:var(--gray)}

/* mode tabs */
.mode-tabs{display:flex;gap:0;border-bottom:2px solid var(--line);margin:24px 0 0}
.mode-tab{flex:1;padding:10px;border:none;background:transparent;cursor:pointer;font-family:'Estedad',sans-serif;font-size:14px;font-weight:600;color:var(--gray);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s}
.mode-tab.active{color:#7a5ba8;border-bottom-color:#7a5ba8}

/* list */
.topics-list{padding:16px 0}
.topic-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 14px;background:var(--white);
  border-radius:10px;margin-bottom:6px;
  cursor:pointer;transition:all .2s;
  border:1px solid var(--line);
}
.topic-item:hover{background:rgba(122,59,136,.06);border-color:rgba(122,59,136,.3)}
.topic-num{font-size:11px;font-weight:700;color:#7a5ba8;width:28px;flex-shrink:0;text-align:center}
.topic-fr{font-family:'Roboto',serif;font-size:15px;color:var(--navy);flex:1;direction:ltr;text-align:left}
.topic-fa{font-size:12px;color:var(--gray);margin-top:1px}
.spin-this{font-size:12px;color:#7a5ba8;opacity:.5}
.topic-item:hover .spin-this{opacity:1}
</style>

// Wheel colors - site theme
const COLORS = [
  '#1e3a5f','#7a5ba8','#b07a4a','#2e8b6b','#8a2040',
  '#22618f','#6b3fa0','#c4502d','#1a5a44','#4a2d7a',
];

let currentMode = 'words';
let isSpinning = false;
let currentAngle = 0;
let currentItems = WORDS;

function getItems(){
  return currentMode === 'words' ? WORDS : SENTENCES.map(s=>s[0]);
}

function drawWheel(angle){
  const canvas = document.getElementById('wheel');
  const ctx = canvas.getContext('2d');
  const cx = canvas.width/2, cy = canvas.height/2, r = cx - 4;
  const items = getItems();
  const n = Math.min(items.length, 12); // show max 12 segments
  const arc = (2*Math.PI)/n;
  
  ctx.clearRect(0,0,canvas.width,canvas.height);
  
  // Draw segments
  for(let i=0;i<n;i++){
    const start = angle + i*arc;
    const end = start + arc;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,start,end);
    ctx.closePath();
    ctx.fillStyle = COLORS[i%COLORS.length];
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,.15)';
    ctx.lineWidth = 2;
    ctx.stroke();
    
    // Text
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(start + arc/2);
    ctx.textAlign = 'right';
    ctx.fillStyle = 'rgba(255,255,255,.95)';
    ctx.font = "bold 11px 'Roboto',sans-serif";
    const label = items[i % items.length].substring(0,18);
    ctx.fillText(label, r-12, 4);
    ctx.restore();
  }
  
  // Center circle
  ctx.beginPath();
  ctx.arc(cx,cy,28,0,2*Math.PI);
  ctx.fillStyle = '#f4f3f5';
  ctx.fill();
  ctx.strokeStyle = 'rgba(122,59,136,.3)';
  ctx.lineWidth = 3;
  ctx.stroke();
  
  ctx.fillStyle = '#7a5ba8';
  ctx.font = "bold 16px 'Roboto',sans-serif";
  ctx.textAlign = 'center';
  ctx.fillText('🎡',cx,cy+6);
}

function spin(){
  if(isSpinning) return;
  isSpinning = true;
  const btn = document.getElementById('spin-btn');
  btn.disabled = true;
  btn.textContent = '⏳ در حال چرخش...';
  document.getElementById('result-card').classList.remove('show');
  
  const totalSpins = 5 + Math.random()*5;
  const totalAngle = totalSpins * 2 * Math.PI;
  const duration = 3000 + Math.random()*1500;
  const start = performance.now();
  const startAngle = currentAngle;
  
  function animate(now){
    const elapsed = now - start;
    const progress = Math.min(elapsed/duration, 1);
    // Ease out
    const ease = 1 - Math.pow(1-progress, 4);
    currentAngle = startAngle + totalAngle * ease;
    drawWheel(currentAngle);
    
    if(progress < 1){
      requestAnimationFrame(animate);
    } else {
      isSpinning = false;
      btn.disabled = false;
      btn.textContent = '🎡 دوباره بچرخون!';
      
      // Vibrate
      if(navigator.vibrate) navigator.vibrate([100,50,100,50,200]);
      
      // Find winner
      const items = getItems();
      const n = Math.min(items.length,12);
      const arc = (2*Math.PI)/n;
      const normalizedAngle = (((-currentAngle) % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
      const winIndex = Math.floor(normalizedAngle/arc) % n;
      const fullIndex = winIndex % items.length;
      
      const card = document.getElementById('result-card');
      const topic = document.getElementById('result-topic');
      const fa = document.getElementById('result-fa');
      
      if(currentMode === 'words'){
        topic.textContent = WORDS[fullIndex];
        fa.textContent = '';
        fa.style.display = 'none';
      } else {
        topic.textContent = SENTENCES[fullIndex][0];
        fa.textContent = SENTENCES[fullIndex][1];
        fa.style.display = 'block';
      }
      
      card.classList.remove('show');
      void card.offsetWidth; // reflow
      card.classList.add('show');
    }
  }
  requestAnimationFrame(animate);
}

function switchMode(mode, el){
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  drawWheel(currentAngle);
  renderList();
  document.getElementById('result-card').classList.remove('show');
}

function renderList(){
  const list = document.getElementById('topics-list');
  if(currentMode === 'words'){
    list.innerHTML = WORDS.map((w,i) => `
      <div class="topic-item" onclick="selectTopic(${i})">
        <span class="topic-num">${i+1}</span>
        <div style="flex:1">
          <div class="topic-fr">${w}</div>
        </div>
        <span class="spin-this">🎯</span>
      </div>
    `).join('');
  } else {
    list.innerHTML = SENTENCES.map((s,i) => `
      <div class="topic-item" onclick="selectTopic(${i})">
        <span class="topic-num">${i+1}</span>
        <div style="flex:1">
          <div class="topic-fr">${s[0]}</div>
          <div class="topic-fa">${s[1]}</div>
        </div>
        <span class="spin-this">🎯</span>
      </div>
    `).join('');
  }
}

function selectTopic(i){
  const card = document.getElementById('result-card');
  if(currentMode === 'words'){
    document.getElementById('result-topic').textContent = WORDS[i];
    document.getElementById('result-fa').style.display = 'none';
  } else {
    document.getElementById('result-topic').textContent = SENTENCES[i][0];
    document.getElementById('result-fa').textContent = SENTENCES[i][1];
    document.getElementById('result-fa').style.display = 'block';
  }
  card.classList.remove('show');
  void card.offsetWidth;
  card.classList.add('show');
  card.scrollIntoView({behavior:'smooth',block:'center'});
  if(navigator.vibrate) navigator.vibrate(80);
}

// Init
drawWheel(0);
renderList();
</script>
