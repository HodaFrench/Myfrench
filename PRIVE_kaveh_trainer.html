<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>کاوه — Tâche 3 Live Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Estedad:wght@300;400;500;600;700&family=Roboto:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --navy:#1e3a5f;--accent:#c4502d;--green:#2e8b6b;--gold:#b07a4a;
    --blue:#2e7bb5;--purple:#7a5ba8;
    --paper:#f4f3f5;--cream:#f9f8fa;--ink:#2c2a26;--gray:#8a8275;
    --line:#e2e1e3;--white:#fcfbfd;
  }
  body{font-family:'Estedad',Arial,sans-serif;background:var(--paper);color:var(--ink);
    min-height:100vh;padding:16px 14px 30px;}
  .wrap{max-width:780px;margin:0 auto;}
  .topbar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
  .topbar a{color:var(--accent);text-decoration:none;font-size:13px;border:1px solid var(--line);
    background:var(--cream);padding:7px 14px;border-radius:8px;}
  .topbar a:hover{background:var(--accent);color:#fff;}

  /* ═══ انتخاب موضوع ═══ */
  #screenSelect{display:block;}
  #screenTrainer{display:none;}

  .sel-header{background:linear-gradient(135deg,#8a2040,var(--accent));color:#fff;
    padding:24px 22px;border-radius:16px;margin-bottom:18px;text-align:center;}
  .sel-header h1{font-size:21px;font-weight:700;margin-bottom:6px;}
  .sel-header p{font-size:13px;opacity:.9;}
  .sel-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  @media(max-width:540px){.sel-grid{grid-template-columns:1fr;}}
  .sel-card{background:var(--white);border:1px solid var(--line);border-radius:12px;
    padding:14px 16px;cursor:pointer;transition:all .2s;text-align:right;}
  .sel-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 20px rgba(196,80,45,.12);}
  .sel-em{font-size:22px;margin-bottom:5px;}
  .sel-fr{font-family:'Roboto',serif;font-size:14.5px;font-weight:700;color:var(--navy);direction:ltr;text-align:left;margin-bottom:3px;}
  .sel-fa{font-size:12.5px;color:var(--accent);}
  .sel-q{font-size:11.5px;color:var(--gray);margin-top:5px;font-family:'Roboto',serif;direction:ltr;text-align:left;line-height:1.5;}

  /* ═══ تایمر بالا ═══ */
  .timer-bar{background:linear-gradient(135deg,var(--navy),#2a4f7a);color:#fff;
    border-radius:14px;padding:14px 20px;margin-bottom:14px;
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .timer-display{font-family:'Roboto',serif;font-size:38px;font-weight:700;
    direction:ltr;letter-spacing:2px;min-width:90px;}
  .timer-display.warn{color:#ffd47e;}
  .timer-display.danger{color:#ff7e7e;animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.6;}}
  .timer-controls{display:flex;gap:8px;}
  .tbtn{font-family:'Estedad',sans-serif;font-size:13px;font-weight:700;
    border:none;border-radius:20px;padding:8px 18px;cursor:pointer;transition:all .2s;}
  .tbtn.start{background:var(--green);color:#fff;}
  .tbtn.pause{background:rgba(255,255,255,.2);color:#fff;}
  .tbtn.reset{background:rgba(255,255,255,.1);color:#fff;font-size:12px;}
  .tbtn:hover{opacity:.85;}
  .progress-wrap{flex:1;min-width:180px;}
  .progress-bar{height:8px;background:rgba(255,255,255,.15);border-radius:4px;overflow:hidden;margin-bottom:5px;}
  .progress-fill{height:100%;background:var(--green);border-radius:4px;transition:width .5s linear;}
  .progress-label{font-size:11.5px;opacity:.8;}

  /* ═══ مراحل پیشرفت (breadcrumb) ═══ */
  .steps-bar{display:flex;gap:0;margin-bottom:14px;}
  .step-pill{flex:1;text-align:center;padding:8px 4px;font-size:11px;font-weight:600;
    border-top:3px solid var(--line);color:var(--gray);transition:all .3s;cursor:default;}
  .step-pill.active{border-top-color:var(--accent);color:var(--accent);}
  .step-pill.done{border-top-color:var(--green);color:var(--green);}

  /* ═══ بخش اصلی (card مرحله) ═══ */
  .stage-card{background:var(--white);border:1px solid var(--line);border-radius:16px;
    padding:0;overflow:hidden;margin-bottom:14px;
    box-shadow:0 6px 20px rgba(31,58,95,.06);}
  .stage-head{padding:16px 20px;display:flex;align-items:center;gap:12px;}
  .stage-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;
    justify-content:center;font-size:20px;flex-shrink:0;}
  .stage-title-wrap{flex:1;}
  .stage-title{font-size:16px;font-weight:700;color:var(--navy);}
  .stage-time{font-size:11.5px;font-weight:600;margin-top:2px;}
  .stage-body{padding:0 20px 18px;}

  /* راهنماها */
  .hint-list{list-style:none;margin-bottom:14px;}
  .hint-item{display:flex;gap:10px;align-items:flex-start;padding:9px 0;
    border-bottom:1px dashed var(--line);font-size:13.5px;line-height:1.85;}
  .hint-item:last-child{border-bottom:none;}
  .hi-dot{flex-shrink:0;width:8px;height:8px;border-radius:50%;margin-top:7px;}
  .hi-key{font-weight:700;color:var(--navy);margin-left:4px;}
  .hi-fr{font-family:'Roboto',serif;font-size:13px;color:var(--blue);direction:ltr;
    display:block;margin-top:3px;line-height:1.6;background:rgba(46,123,181,.07);
    padding:5px 10px;border-radius:6px;}

  /* جملات شروع */
  .starters{background:rgba(46,123,181,.06);border-right:3px solid var(--blue);
    border-radius:10px;padding:12px 14px;margin-bottom:14px;}
  .starters-title{font-size:12px;font-weight:700;color:var(--blue);margin-bottom:8px;}
  .starter-item{font-family:'Roboto',serif;font-size:14px;direction:ltr;text-align:left;
    padding:5px 0;border-bottom:1px dashed rgba(46,123,181,.2);color:var(--ink);}
  .starter-item:last-child{border-bottom:none;}

  /* دکمه‌ی تیک */
  .tick-btn{width:100%;font-family:'Estedad',sans-serif;font-size:16px;font-weight:700;
    padding:14px;border:none;border-radius:12px;cursor:pointer;transition:all .2s;
    display:flex;align-items:center;justify-content:center;gap:8px;}
  .tick-btn.ready{background:var(--green);color:#fff;}
  .tick-btn.ready:hover{background:#246b53;transform:translateY(-1px);}
  .tick-btn.done-btn{background:var(--cream);color:var(--gray);cursor:default;}

  /* صفحهٔ پایان */
  .end-card{background:linear-gradient(135deg,#1d6b50,var(--green));color:#fff;
    border-radius:16px;padding:36px 24px;text-align:center;margin-bottom:14px;}
  .end-emoji{font-size:52px;margin-bottom:14px;}
  .end-title{font-size:24px;font-weight:700;margin-bottom:8px;}
  .end-sub{font-size:14px;opacity:.9;line-height:2;}
  .end-actions{display:flex;gap:10px;justify-content:center;margin-top:20px;flex-wrap:wrap;}
  .eact{font-family:'Estedad',sans-serif;font-size:14px;font-weight:700;
    padding:12px 24px;border-radius:20px;cursor:pointer;border:none;transition:all .2s;}
  .eact.retry{background:rgba(255,255,255,.2);color:#fff;}
  .eact.new{background:#fff;color:var(--green);}
  .eact:hover{opacity:.85;}

  .back-sel{font-family:'Estedad',sans-serif;font-size:13.5px;color:var(--accent);
    background:none;border:1px solid var(--line);border-radius:8px;
    padding:7px 16px;cursor:pointer;margin-bottom:14px;}
</style>
</head>

    </div>
    <div class="sel-grid" id="topicGrid"></div>

  <!-- ═══ صفحهٔ تمرین ═══ -->

      <div class="timer-controls">
        <button class="tbtn start" id="startBtn" onclick="startTimer()">▶ شروع</button>
        <button class="tbtn pause" id="pauseBtn" onclick="pauseTimer()">⏸</button>
        <button class="tbtn reset" onclick="resetAll()">↺</button>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:100%"></div></div>

    <!-- نوار مراحل -->
    <div class="steps-bar" id="stepsBreadcrumb"></div>

    <!-- محتوای مرحله -->
    <div id="stageContent"></div>
  </div>
</div>

// ─── State ───
let curTopic = null;
let curStage = 0;
let stagesDone = [];
let timeLeft = 270;
let timerRunning = false;
let timerInterval = null;
const TOTAL = 270;

// ─── Selection ───
function buildTopicGrid(){
  document.getElementById("topicGrid").innerHTML = TOPICS.map((t,i)=>`
    <div class="sel-card" onclick="selectTopic(${i})">
      <div class="sel-em">${t.em}</div>
      <div class="sel-fr">${t.fr}</div>
      <div class="sel-fa">${t.fa}</div>
      <div class="sel-q">${t.q.slice(0,80)}...</div>
    </div>`).join("");
}

function selectTopic(i){
  curTopic = TOPICS[i];
  curStage = 0;
  stagesDone = new Array(curTopic.stages.length).fill(false);
  timeLeft = TOTAL;
  timerRunning = false;
  clearInterval(timerInterval);
  document.getElementById("screenSelect").style.display="none";
  document.getElementById("screenTrainer").style.display="block";
  document.getElementById("qText").textContent = curTopic.q;
  updateTimerDisplay();
  buildBreadcrumb();
  renderStage(0);
  window.scrollTo(0,0);
}

function goBack(){
  clearInterval(timerInterval);
  timerRunning = false;
  document.getElementById("screenSelect").style.display="block";
  document.getElementById("screenTrainer").style.display="none";
}

// ─── Timer ───
function startTimer(){
  if(timerRunning) return;
  timerRunning = true;
  document.getElementById("startBtn").textContent="▶ در حال اجرا";
  timerInterval = setInterval(()=>{
    if(timeLeft<=0){
      clearInterval(timerInterval);
      timerRunning=false;
      showEnd();
      return;
    }
    timeLeft--;
    updateTimerDisplay();
    // auto-advance stage hint
    autoHighlightStage();
  },1000);
}

function pauseTimer(){
  clearInterval(timerInterval);
  timerRunning=false;
  document.getElementById("startBtn").textContent="▶ ادامه";
}

function resetAll(){
  clearInterval(timerInterval);
  timerRunning=false;
  timeLeft=TOTAL;
  curStage=0;
  stagesDone=new Array(curTopic.stages.length).fill(false);
  document.getElementById("startBtn").textContent="▶ شروع";
  updateTimerDisplay();
  buildBreadcrumb();
  renderStage(0);
}

function updateTimerDisplay(){
  const m=Math.floor(timeLeft/60), s=timeLeft%60;
  const d=document.getElementById("timerDisplay");
  d.textContent=m+":"+(s<10?"0":"")+s;
  d.className="timer-display";
  if(timeLeft<60) d.classList.add("danger");
  else if(timeLeft<90) d.classList.add("warn");
  const pct = (timeLeft/TOTAL)*100;
  document.getElementById("progressFill").style.width=pct+"%";
  const st = curTopic ? curTopic.stages[curStage] : null;
  document.getElementById("progressLabel").textContent =
    st ? `مرحله‌ی ${curStage+1}/${curTopic.stages.length}: ${st.title}` : "آماده";
}

function autoHighlightStage(){
  if(!curTopic) return;
  const elapsed = TOTAL - timeLeft;
  let acc=0;
  for(let i=0;i<curTopic.stages.length;i++){
    acc+=curTopic.stages[i].timeS;
    if(elapsed<acc && curStage!==i){
      // فقط اگه کاوه دکمه نزده، نوار breadcrumb رو هایلایت کن
      buildBreadcrumb();
      break;
    }
  }
}

// ─── Breadcrumb ───
function buildBreadcrumb(){
  if(!curTopic) return;
  const el=document.getElementById("stepsBreadcrumb");
  el.innerHTML=curTopic.stages.map((s,i)=>{
    let cls="step-pill";
    if(stagesDone[i]) cls+=" done";
    else if(i===curStage) cls+=" active";
    return `<div class="${cls}" onclick="jumpStage(${i})">${s.icon}</div>`;
  }).join("");
}

function jumpStage(i){
  curStage=i;
  buildBreadcrumb();
  renderStage(i);
}

// ─── Render Stage ───
function renderStage(i){
  if(!curTopic) return;
  const s = curTopic.stages[i];
  const isDone = stagesDone[i];
  const hints = s.hints.map(h=>`
    <li class="hint-item">
      <span class="hi-dot" style="background:${h.dot}"></span>
      <div>${h.text}<span class="hi-fr" dir="ltr">${h.fr}</span></div>
    </li>`).join("");
  const starters = s.starters.map(st=>`<div class="starter-item" dir="ltr">${st}</div>`).join("");
  const tickBtn = isDone
    ? `<button class="tick-btn done-btn" disabled>✅ این مرحله تموم شد</button>`
    : `<button class="tick-btn ready" onclick="tickStage(${i})">✅ تموم شد — برو مرحله‌ی بعد</button>`;
  const nextNote = i<curTopic.stages.length-1
    ? `<div style="font-size:12px;color:var(--gray);text-align:center;margin-top:8px;">مرحله‌ی بعد: <b>${curTopic.stages[i+1].title}</b></div>`
    : "";

  document.getElementById("stageContent").innerHTML = `
    <div class="stage-card">
      <div class="stage-head" style="background:${s.color}18;border-bottom:1px solid ${s.color}30;">
        <div class="stage-icon" style="background:${s.color}22;">${s.icon}</div>
        <div class="stage-title-wrap">
          <div class="stage-title">${s.title}</div>
          <div class="stage-time" style="color:${s.color}">⏱ ${s.time}</div>
        </div>
      </div>
      <div class="stage-body">
        <ul class="hint-list">${hints}</ul>
        <div class="starters">
          <div class="starters-title">💬 جملات شروع — یکی را انتخاب کن</div>
          ${starters}
        </div>
        ${tickBtn}
        ${nextNote}
      </div>
    </div>`;
}

function tickStage(i){
  stagesDone[i]=true;
  if(i<curTopic.stages.length-1){
    curStage=i+1;
    buildBreadcrumb();
    renderStage(i+1);
    window.scrollTo({top:document.getElementById("stepsBreadcrumb").offsetTop-10,behavior:"smooth"});
  } else {
    buildBreadcrumb();
    showEnd();
  }
}

function showEnd(){
  clearInterval(timerInterval);
  timerRunning=false;
  const elapsed=TOTAL-timeLeft;
  const min=Math.floor(elapsed/60), sec=elapsed%60;
  const allDone=stagesDone.every(Boolean);
  document.getElementById("stageContent").innerHTML=`
    <div class="end-card">
      <div class="end-emoji">${allDone?"🏆":"⭐"}</div>
      <div class="end-title">${allDone?"عالی! تمام مراحل!":"تمرین تموم شد!"}</div>
      <div class="end-sub">
        مدت صحبت: <b>${min}:${sec<10?"0":""}${sec}</b><br>
        ${allDone?"تمام بخش‌ها را پوشش دادی — این یه تمرین B2 واقعی بود!":"دفعه‌ی بعد سعی کن همه‌ی مراحل را پوشش بدی."}
      </div>
      <div class="end-actions">
        <button class="eact retry" onclick="resetAll()">↺ همین موضوع دوباره</button>
        <button class="eact new" onclick="goBack()">← موضوع جدید</button>
      </div>
    </div>`;
}

buildTopicGrid();
</script>
