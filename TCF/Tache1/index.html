<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Estedad',sans-serif;background:#f4f3f5;min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:20px;
  background-image:repeating-linear-gradient(transparent,transparent 31px,rgba(65,97,138,0.06) 31px,rgba(65,97,138,0.06) 32px)}
.card{background:#fff;border-radius:20px;padding:40px;max-width:440px;width:100%;
  text-align:center;box-shadow:0 10px 40px rgba(31,58,95,.1)}
.emoji{font-size:56px;margin-bottom:16px}
h1{font-family:'Roboto',serif;font-size:22px;color:#1e3a5f;margin-bottom:8px}
p{font-size:14px;color:#8a8275;line-height:1.8;margin-bottom:24px}
a{display:inline-block;padding:10px 24px;background:#1e3a5f;color:#fff;
  border-radius:10px;text-decoration:none;font-size:14px;font-weight:600}
a:hover{background:#41618a}
</style>


</head>
<body>
<style id="hk-wm">
.hk-wm{position:fixed;pointer-events:none;z-index:99999;font-family:Georgia,serif;font-size:13px;font-weight:600;color:rgba(30,58,95,0.07);letter-spacing:2px;transform:rotate(-25deg);user-select:none;white-space:nowrap}
</style>
<span class="hk-wm" style="top:22%;left:8%">Hoda Khedmati</span>
<span class="hk-wm" style="top:52%;left:42%">Hoda Khedmati</span>
<span class="hk-wm" style="top:78%;left:62%">Hoda Khedmati</span>
<div class="card">
  <div class="emoji">🚧</div>
  <h1>Tâche 1 — به زودی</h1>
  <p>محتوای این بخش در حال آماده‌سازی است.<br>به زودی اضافه می‌شود.</p>
  <a href="../../index.html">← بازگشت به مسیر یادگیری</a>
</div>
<script>
/* hoda-protect: بازدارنده‌ی کپی (نه امنیت کامل) */
(function(){
  document.addEventListener('contextmenu',function(e){e.preventDefault();},{capture:true});
  document.addEventListener('selectstart',function(e){
    var t=e.target;
    if(t&&(t.tagName==='INPUT'||t.tagName==='TEXTAREA'||t.isContentEditable))return;
    e.preventDefault();
  });
  document.addEventListener('copy',function(e){
    var t=e.target;
    if(t&&(t.tagName==='INPUT'||t.tagName==='TEXTAREA'||t.isContentEditable))return;
    e.preventDefault();
  });
  document.addEventListener('keydown',function(e){
    var t=e.target;
    var inField=t&&(t.tagName==='INPUT'||t.tagName==='TEXTAREA'||t.isContentEditable);
    var k=(e.key||'').toLowerCase();
    if((e.ctrlKey||e.metaKey)&&['c','x','u','s','a'].indexOf(k)>-1&&!inField){e.preventDefault();}
  },{capture:true});
})();
</script>
<style>
body{-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none}
input,textarea,[contenteditable]{-webkit-user-select:text;-moz-user-select:text;-ms-user-select:text;user-select:text}
img{-webkit-user-drag:none;user-drag:none;pointer-events:none}
</style>
</body>
