<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tâche 1 — Expression Orale TCF</title>
<link href="https://fonts.googleapis.com/css2?family=Estedad:wght@400;500;600&family=Roboto:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Estedad',sans-serif;background:#f4f3f5;min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:20px;
  background-image:repeating-linear-gradient(transparent,transparent 31px,rgba(65,97,138,0.06) 31px,rgba(65,97,138,0.06) 32px)}
.card{background:#fff;border-radius:20px;padding:40px;max-width:440px;width:100%;
  text-align:center;box-shadow:0 10px 40px rgba(31,58,95,.1)}
.emoji{font-size:56px;margin-bottom:16px}
h1{font-family:'Roboto',serif;font-size:22px;color:#1e3a5f;margin-bottom:8px}
p{font-size:14px;color:#8a8275;line-height:1.8;margin-bottom:24px}
a{display:inline-block;padding:10px 24px;background:#1e3a5f;color:#fff;
  border-radius:10px;text-decoration:none;font-size:14px;font-weight:600}
a:hover{background:#41618a}
</style>

<style id="hoda-wm-style">
.hoda-watermark{
  position:fixed;inset:0;pointer-events:none;z-index:9999;
  overflow:hidden;
}
.hoda-watermark::before{
  content:'';
  position:absolute;inset:0;
  background-image:repeating-linear-gradient(
    -45deg,
    transparent,
    transparent 120px,
    rgba(30,58,95,0.045) 120px,
    rgba(30,58,95,0.045) 121px
  );
}
.hoda-watermark-text{
  position:absolute;
  width:220px;
  text-align:center;
  font-family:'Roboto','Estedad',sans-serif;
  font-size:15px;
  font-weight:700;
  color:rgba(30,58,95,0.07);
  letter-spacing:1px;
  transform:rotate(-35deg);
  white-space:nowrap;
  line-height:1.6;
  user-select:none;
}
</style>
</head>
<body>
<div class="hoda-watermark" aria-hidden="true" id="hoda-wm">
</div>
<script>
(function(){
  const wm = document.getElementById('hoda-wm');
  if(!wm) return;
  const W = window.innerWidth || 1200;
  const H = window.innerHeight || 800;
  const cols = Math.ceil(W / 200) + 2;
  const rows = Math.ceil(H / 160) + 4;
  let html = '';
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const x = (c * 200) - 100;
      const y = (r * 160) - 80;
      html += `<div class="hoda-watermark-text" style="left:${x}px;top:${y}px">Hoda Khedmati<br>©frenchavechoda</div>`;
    }
  }
  wm.innerHTML = html;
})();
</script>
<div class="card">
  <div class="emoji">🚧</div>
  <h1>Tâche 1 — به زودی</h1>
  <p>محتوای این بخش در حال آماده‌سازی است.<br>به زودی اضافه می‌شود.</p>
  <a href="../../index.html">← بازگشت به مسیر یادگیری</a>
</div>
</body>
</html>
