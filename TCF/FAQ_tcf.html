.chev{flex-shrink:0;align-self:center;color:var(--teal);font-size:17px;transition:transform .3s}
.faq-item.open .chev{transform:rotate(180deg)}
.faq-answer{max-height:0;overflow:hidden;transition:max-height .5s ease}

.ex{display:inline-block;direction:ltr;font-family:'Roboto',serif;background:rgba(46,125,143,.09);border-radius:7px;padding:1px 8px;color:#1f3b42;font-size:13.5px;unicode-bidi:isolate}

.box{background:rgba(46,139,107,.07);border:1px solid #bce0cd;border-radius:11px;padding:10px 13px;margin:9px 0;font-size:13px;line-height:1.85}
.box b{color:var(--green-d)}
.foot{text-align:center;font-size:12.5px;color:var(--gray);margin:24px 6px 0;line-height:1.8;padding:14px;background:var(--white);border-radius:14px;border:1px dashed #cbd9dc}
.foot b{color:var(--teal-d)}
</style>
</head>

/* برای افزودن سوال جدید فقط یک شیء به این آرایه اضافه کن */
const FAQS = [
  {
    q: `TCF Canada دقیقاً چیه و با TEF چه فرقی داره؟`,
    a: `<h4>📋 TCF Canada چیه؟</h4>
        <p><b>TCF Canada</b> (Test de Connaissance du Français) یه آزمونِ رسمیِ زبان فرانسه‌ست که مخصوصِ پرونده‌های <b>مهاجرت به کانادا</b> (اکسپرس انتری، استانی، شهروندی) طراحی شده و موردِ تأییدِ <b>IRCC</b> (اداره‌ی مهاجرت کانادا)ست.</p>
        <h4>🆚 فرقش با TEF</h4>
        <p>هر دو آزمون برای مهاجرت کانادا قبول‌ان و هر دو چهار مهارت رو می‌سنجن. تفاوت‌ها بیشتر در سبک سواله:</p>
        <ul>
        <li><b>TCF:</b> سوال‌های چندگزینه‌ای برای شنیداری و خواندنی، با سطح‌بندیِ تدریجی (از آسون به سخت).</li>
        <li><b>TEF:</b> ساختار کمی متفاوت و گاهی تعداد سوال بیشتر.</li>
        </ul>
        <div class="box">💡 <b>کدوم رو انتخاب کنم؟</b> هیچ‌کدوم «بهتر» نیست — به این بستگی داره با کدوم راحت‌تری. خیلی‌ها TCF رو به‌خاطر سبکِ تدریجی‌ترش ترجیح می‌دن. هر دو نتیجه‌ی معادلِ <b>NCLC/CLB</b> می‌دن که برای امتیاز مهاجرت استفاده می‌شه.</div>`
  },
  {
    q: `آزمون TCF چند بخش داره و هر کدوم چطوریه؟`,
    a: `<p>TCF Canada <b>۴ مهارت</b> رو می‌سنجه:</p>
        <ul>
        <li>🎧 <b>Compréhension orale</b> (شنیداری) — چندگزینه‌ای، حدود ۳۹ سوال، ~۳۵ دقیقه</li>
        <li>📖 <b>Compréhension écrite</b> (خواندنی) — چندگزینه‌ای، حدود ۳۹ سوال، ~۶۰ دقیقه</li>
        <li>✍️ <b>Expression écrite</b> (نوشتاری) — ۳ تکلیف (Tâche)، ۶۰ دقیقه</li>
        <li>🗣️ <b>Expression orale</b> (گفتاری) — ۳ تکلیف، حدود ۱۲ دقیقه، با ممتحن</li>
        </ul>
        <div class="box">📝 <b>نکته:</b> بخش شنیداری و خواندنی نمره‌شون خودکار و دقیقه. بخش نوشتاری و گفتاری رو <b>ارزیاب‌های انسانی</b> تصحیح می‌کنن.</div>`
  },
  {
    q: `نمره‌دهی TCF چطوریه؟ NCLC یعنی چی؟`,
    a: `<p>هر مهارت یه نمره از <b>۶۹۹</b> می‌گیره که به سطحِ <b>NCLC</b> (نسخه‌ی فرانسویِ CLB) تبدیل می‌شه — از NCLC 1 تا 12.</p>
        <h4>🎯 سطح‌های مهم برای مهاجرت</h4>
        <ul>
        <li><b>NCLC 7</b> — حداقلِ رایج برای خیلی از برنامه‌ها (معادل B2)</li>
        <li><b>NCLC 9 یا بالاتر</b> — بیشترین امتیازِ زبان در اکسپرس انتری (نقطه‌ی طلایی!)</li>
        </ul>
        <div class="box">⭐ <b>چرا فرانسه ارزشمنده؟</b> در اکسپرس انتری، با NCLC 7 به بالا در فرانسه می‌تونی تا <b>۵۰ امتیاز اضافه</b> بگیری — حتی اگه زبان اصلیت انگلیسی باشه. برای همین خیلی‌ها فرانسه رو به‌عنوان زبان دوم امتحان می‌دن.</div>
        <div class="tip">💡 <span>برای محاسبه‌ی دقیق، جدولِ تبدیلِ نمره‌ی TCF به NCLC رو از سایت رسمیِ IRCC چک کن، چون گاهی به‌روز می‌شه.</span></div>`
  },
  {
    q: `بخش <span class="fr" dir="ltr">Expression écrite</span> سه تکلیفش چیه؟`,
    a: `<p>بخش نوشتاری <b>۳ تکلیف</b> داره که سختی‌شون پله‌پله بیشتر می‌شه (۶۰ دقیقه برای کل):</p>
        <ul>
        <li><b>Tâche 1</b> — یه پیام کوتاه (مثلاً به دوست یا همسایه). حدود <b>۶۰ تا ۱۲۰ کلمه</b>. سطح ساده.</li>
        <li><b>Tâche 2</b> — تعریفِ یه تجربه یا رویداد (مثلاً یه خاطره، یه سفر). حدود <b>۱۲۰ تا ۱۵۰ کلمه</b>.</li>
        <li><b>Tâche 3</b> — بیانِ نظر و استدلال درباره‌ی دو متن. حدود <b>۱۲۰ تا ۱۸۰ کلمه</b>. سخت‌ترین بخش.</li>
        </ul>
        <div class="box">✍️ <b>تکنیک:</b> برای Tâche 3 حتماً ساختار داشته باش: مقدمه، چند استدلال با مثال، و نتیجه. از کلمات ربط (<span class="ex" dir="ltr">d'abord, de plus, cependant, en conclusion</span>) استفاده کن — این‌ها نمره‌ت رو بالا می‌برن.</div>`
  },
  {
    q: `بخش <span class="fr" dir="ltr">Expression orale</span> چطور برگزار می‌شه؟ استرس دارم!`,
    a: `<p>بخش گفتاری حدود <b>۱۲ دقیقه</b>ست و رودررو (یا آنلاین) با یه ممتحن انجام می‌شه. <b>۳ تکلیف</b>:</p>
        <ul>
        <li><b>Tâche 1</b> — مصاحبه‌ی آشنایی (~۲ دقیقه). سوال‌های ساده درباره‌ی خودت، کار، علایق. <b>بدون آمادگی.</b></li>
        <li><b>Tâche 2</b> — یه موقعیت تعاملی (~۳.۵ دقیقه). باید از ممتحن سوال بپرسی (مثلاً درباره‌ی یه کلاس، یه سفر). <b>۲ دقیقه آمادگی.</b></li>
        <li><b>Tâche 3</b> — بیانِ نظر درباره‌ی یه موضوع (~۴.۵ دقیقه). باید استدلال کنی. <b>۲ دقیقه آمادگی.</b></li>
        </ul>
        <div class="box">😌 <b>برای کنترل استرس:</b> یادت باشه ممتحن دنبالِ <b>گیر انداختنت نیست</b>؛ می‌خواد ببینه می‌تونی ارتباط برقرار کنی. اگه کلمه‌ای یادت رفت، با کلمات دیگه توضیحش بده — همین مهارت نمره داره! آروم حرف بزن و طبیعی باش.</div>
        <div class="tip">💡 <span>در Tâche 2 یادت نره که باید <b>سوال بپرسی</b>، نه فقط جواب بدی. این بخش رو خیلی‌ها فراموش می‌کنن.</span></div>`
  },
  {
    q: `چند ماه باید برای TCF آماده بشم؟`,
    a: `<p>این کاملاً به <b>سطح فعلیت</b> و <b>هدفت</b> (چه NCLC ای می‌خوای) بستگی داره. یه تخمین کلی:</p>
        <ul>
        <li>از <b>صفر تا B2 (NCLC 7)</b>: معمولاً <b>۱۰ تا ۱۵ ماه</b> با تمرین منظمِ روزانه.</li>
        <li>از <b>B1 به B2</b>: حدود <b>۴ تا ۶ ماه</b>.</li>
        <li>اگه <b>قبلاً B2</b> هستی و فقط می‌خوای با فرمتِ آزمون آشنا شی: <b>۴ تا ۸ هفته</b> تمرینِ متمرکزِ نمونه‌سؤال.</li>
        </ul>
        <div class="box">⏳ <b>رمز اصلی استمراره، نه ساعت‌های طولانیِ پراکنده.</b> هر روز ۴۵ تا ۶۰ دقیقه‌ی منظم خیلی بهتر از یه روزِ ۵ ساعته‌ست. و حتماً ماه آخر رو با <b>آزمون‌های شبیه‌سازی‌شده‌ی زمان‌دار</b> تمرین کن.</div>`
  },
  {
    q: `اعتبار نتیجه‌ی TCF چقدره و چند بار می‌تونم بدمش؟`,
    a: `<p>🔹 <b>اعتبار:</b> نتیجه‌ی TCF Canada معمولاً <b>۲ سال</b> اعتبار داره. برای پرونده‌ی مهاجرت باید نتیجه‌ات در زمان ثبت، هنوز معتبر باشه.</p>
        <p>🔹 <b>تعداد دفعات:</b> محدودیتِ سختی نداری و می‌تونی چند بار آزمون بدی، ولی معمولاً باید یه <b>فاصله‌ی زمانی</b> (حدود ۳۰ روز) بین دو تلاش رعایت بشه.</p>
        <div class="tip">💡 <span>چون هزینه‌ی آزمون بالاست، بهتره فقط وقتی ثبت‌نام کنی که با آزمون‌های آزمایشی به سطحِ هدفت رسیده باشی. این اطلاعات ممکنه به‌روز بشه، پس قبل از ثبت‌نام سایت رسمیِ مرکزِ آزمون رو هم چک کن.</span></div>`
  }
];

function render(){
  document.getElementById('faq').innerHTML = FAQS.map((f,i)=>`
    <div class="faq-item" data-i="${i}">
      <div class="faq-head" onclick="tog(${i})">
        <div class="faq-char">${CHAR}</div>
        <div class="qbubble"><div class="q-label">❓ سوال</div><div class="q-text">${f.q}</div></div>
        <span class="chev">&#9662;</span>
      </div>
      <div class="faq-answer"><div class="answer-inner">
        <div class="a-label">✅ جواب هدا</div>
        <div class="a-text">${f.a}</div>
      </div></div>
    </div>`).join('');
}
function tog(i){document.querySelector('.faq-item[data-i="'+i+'"]').classList.toggle('open');}
render();
document.querySelector('.faq-item') && document.querySelector('.faq-item').classList.add('open');

<script>if(window.hodaAutoInitFull)hodaAutoInitFull();</script>
<script>
/* hoda-protect: بازدارنده‌ی کپی (نه امنیت کامل) */
(function(){
  document.addEventListener('contextmenu',function(e){e.preventDefault();},{capture:true});
  document.addEventListener('selectstart',function(e){
    var t=e.target;
    if(t&&(t.tagName==='INPUT'||t.tagName==='TEXTAREA'||t.isContentEditable))return;
    e.preventDefault();
  });
  document.addEventListener('copy',function(e){
    var t=e.target;
    if(t&&(t.tagName==='INPUT'||t.tagName==='TEXTAREA'||t.isContentEditable))return;
    e.preventDefault();
  });
  document.addEventListener('keydown',function(e){
    var t=e.target;
    var inField=t&&(t.tagName==='INPUT'||t.tagName==='TEXTAREA'||t.isContentEditable);
    var k=(e.key||'').toLowerCase();
    if((e.ctrlKey||e.metaKey)&&['c','x','u','s','a'].indexOf(k)>-1&&!inField){e.preventDefault();}
  },{capture:true});
})();
</script>
<style>
body{-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none}
input,textarea,[contenteditable]{-webkit-user-select:text;-moz-user-select:text;-ms-user-select:text;user-select:text}
img{-webkit-user-drag:none;user-drag:none;pointer-events:none}
</style>
</body>
</html>
