<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --navy:#1e3a5f; --navy-soft:#41618a; --accent:#c77d3a; --accent-deep:#a05f23;
    --paper:#f4f3f5; --paper-warm:#ebeaed; --cream:#f9f8fa; --ink:#2c2a26; --gray:#8a8275;
    --line:#e2e1e3; --white:#fcfbfd;
    --fam:#5a8f4a; --cour:#2e7bb5; --sout:#7a5ba8;
  }
  body{font-family:'Estedad',Arial,sans-serif; background-color:var(--paper);
    background-image:repeating-linear-gradient(transparent, transparent 31px, rgba(199,125,58,0.05) 31px, rgba(199,125,58,0.05) 32px);
    color:var(--ink); line-height:1.9; padding:20px 16px 70px;}
  .wrap{max-width:840px; margin:0 auto;}
  .topbar{display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap;}
  .topbar a{color:var(--accent); text-decoration:none; font-size:13.5px; border:1px solid var(--line);
    background:var(--cream); padding:9px 16px; border-radius:9px; transition:all .2s; cursor:pointer;}
  .topbar a:hover{background:var(--accent); color:#fff;}
  .ph-header{background:linear-gradient(135deg, var(--accent), var(--accent-deep)); color:#fff;
    padding:28px; border-radius:20px; margin-bottom:18px; box-shadow:0 14px 34px rgba(199,125,58,.28); position:relative; overflow:hidden;}
  .ph-header::after{content:"";position:absolute;top:-40px;left:-40px;width:160px;height:160px;background:rgba(255,255,255,.07);border-radius:50%;}
  .ph-header .ph-emoji{font-size:32px; margin-bottom:6px;}
  .ph-header h1{font-size:25px; font-weight:700; margin-bottom:5px;}
  .ph-header p{font-size:13.5px; opacity:.93; line-height:1.9;}
  .ph-legend{display:flex; gap:14px; flex-wrap:wrap; margin-bottom:18px; font-size:12px;}
  .ph-leg{display:flex; align-items:center; gap:6px;}
  .ph-leg-dot{width:11px; height:11px; border-radius:50%;}
  /* فهرست تب‌ها */
  .ph-tabs{display:flex; flex-wrap:wrap; gap:7px; margin-bottom:22px; position:sticky; top:0;
    background:var(--paper); padding:12px 0; z-index:10; border-bottom:2px solid var(--line);}
  .ph-tab{font-family:'Estedad',sans-serif; font-size:13px; font-weight:600; background:var(--white);
    color:var(--ink); border:1.5px solid var(--line); border-radius:20px; padding:8px 14px; cursor:pointer; transition:all .2s;}
  .ph-tab:hover{border-color:var(--accent);}
  .ph-tab.active{background:var(--accent); color:#fff; border-color:var(--accent); box-shadow:0 4px 12px rgba(199,125,58,.35);}
  .ph-section{animation:fadeIn .35s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .ph-sec-title{font-size:20px; font-weight:700; color:var(--accent-deep); margin-bottom:16px; padding-bottom:10px; border-bottom:2px solid var(--paper-warm);}
  /* کارت عبارت */
  .ph-card{background:var(--white); border:1px solid var(--line); border-radius:14px; padding:16px 18px; margin-bottom:14px; box-shadow:0 4px 14px rgba(31,58,95,.04);}
  .ph-fa{font-size:15.5px; font-weight:600; color:var(--navy); margin-bottom:12px; display:flex; align-items:center; gap:8px;}
  .ph-fa::before{content:"›"; color:var(--accent); font-size:20px; font-weight:700;}
  .ph-levels{display:flex; flex-direction:column; gap:8px;}
  .ph-lvl{display:flex; gap:10px; align-items:flex-start;}
  .ph-lvl-tag{flex-shrink:0; font-size:10.5px; font-weight:700; padding:3px 9px; border-radius:8px; color:#fff; margin-top:3px; min-width:54px; text-align:center;}
  .ph-lvl-fam .ph-lvl-tag{background:var(--fam);}
  .ph-lvl-cour .ph-lvl-tag{background:var(--cour);}
  .ph-lvl-sout .ph-lvl-tag{background:var(--sout);}
  .ph-lvl-phrases{flex:1; display:flex; flex-direction:column; gap:4px;}
  .ph-phrase{font-family:'Roboto',serif; font-size:16px; color:var(--ink); direction:ltr; text-align:left; line-height:1.55;}
  .ph-tip{background:linear-gradient(135deg, rgba(199,125,58,.08), rgba(199,125,58,.03)); border-right:3px solid var(--accent);
    border-radius:9px; padding:9px 14px; margin-top:12px; font-size:12.5px; line-height:1.85; color:var(--ink);}
  .ph-tip b{color:var(--accent-deep);}
  .ph-footer{text-align:center; margin-top:30px; color:var(--gray); font-size:12.5px;}
  .ph-footer b{color:var(--accent);}
</style>

    function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

    function buildTabs(){
      document.getElementById("phTabs").innerHTML = PHRASES.map((c,i) =>
        `<button class="ph-tab${i===0?' active':''}" onclick="showCat(${i})">${c.emoji} ${esc(c.titre)}</button>`
      ).join("");
    }
    function lvlBlock(tag, cls, arr){
      if(!arr || !arr.length) return "";
      const phrases = arr.map(p => `<div class="ph-phrase" dir="ltr">${esc(p)}</div>`).join("");
      return `<div class="ph-lvl ${cls}"><span class="ph-lvl-tag">${tag}</span><div class="ph-lvl-phrases">${phrases}</div></div>`;
    }
    function showCat(i){
      const c = PHRASES[i];
      let cards = "";
      c.items.forEach(it => {
        cards += `<div class="ph-card">
          <div class="ph-fa">${esc(it.fa)}</div>
          <div class="ph-levels">
            ${lvlBlock("خودمونی","ph-lvl-fam",it.fam)}
            ${lvlBlock("روزمره","ph-lvl-cour",it.cour)}
            ${lvlBlock("رسمی","ph-lvl-sout",it.sout)}
          </div>
          ${it.tip ? `<div class="ph-tip">💡 ${esc(it.tip)}</div>` : ""}
        </div>`;
      });
      document.getElementById("phContent").innerHTML =
        `<div class="ph-section"><h2 class="ph-sec-title">${c.emoji} ${esc(c.titre)}</h2>${cards}</div>`;
      document.querySelectorAll(".ph-tab").forEach((t,idx)=>t.classList.toggle("active",idx===i));
      window.scrollTo(0,0);
    }
    buildTabs();
    showCat(0);
