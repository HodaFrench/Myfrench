<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Français avec Hoda — کتابخانه فرانسه</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Estedad:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Estedad',sans-serif;background:#f7f3ea;min-height:100vh;direction:rtl;color:#1f3a5f}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:repeating-linear-gradient(transparent,transparent 31px,rgba(65,97,138,0.08) 31px,rgba(65,97,138,0.08) 32px)}
body::after{content:"";position:fixed;top:0;bottom:0;right:58px;width:2px;z-index:0;pointer-events:none;background:rgba(196,80,45,0.18)}
.page{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:2rem 1rem 5rem}
.header{text-align:center;padding:1.5rem 0 2.5rem}
.header h1{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:#1f3a5f;letter-spacing:.5px}
.header p{font-size:11px;color:#a8874f;margin-top:7px;letter-spacing:2px}

/* کارت‌های کنار جاده */
.node-card{background:#f7f3ea;border:1.5px solid #d9ceb8;border-radius:12px;padding:.55rem .85rem;cursor:pointer;transition:border-color .15s,transform .15s;display:inline-block;max-width:140px;text-align:center}
.node-card:hover{border-color:#a8874f;transform:translateY(-2px)}
.nc-title{font-size:13px;font-weight:600;line-height:1.3}
.nc-count{font-size:10px;color:#a8874f;margin-top:3px}

/* layout ردیف‌ها */
.road-wrap{position:relative}
.row{display:flex;align-items:center;justify-content:space-between;margin:0;padding:0 4px}
.row.center{justify-content:center}
.row.right{justify-content:flex-end}
.row.left{justify-content:flex-start}
.spacer{display:flex;justify-content:center}
.vline{width:3px;background:#e0dbd2;border-radius:2px;margin:0 auto;position:relative}
.vline::after{content:'';position:absolute;top:0;bottom:0;left:50%;transform:translateX(-50%);width:1.5px;background:#fff;opacity:.8}
.milestone{display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:50%;flex-shrink:0}
.ms-main{width:54px;height:54px;background:#1f3a5f;color:#f7f3ea;font-size:10px;font-weight:600}
.ms-mid{width:50px;height:50px;background:#f7f3ea;border:2px solid #1f3a5f;color:#1f3a5f;font-size:11px;font-weight:600}
.ms-b2{width:50px;height:50px;background:#f7f3ea;border:2px solid #a8874f;color:#a8874f;font-size:11px;font-weight:600}
.ms-tcf{width:54px;height:54px;background:#1f3a5f;color:#f7f3ea;font-size:10px;font-weight:600}
.ms-end{width:54px;height:54px;background:#a8874f;color:#f7f3ea;font-size:16px}
.ms-label{font-size:9px;margin-top:2px;opacity:.7}
.curve{width:100%;height:44px;overflow:visible}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(31,58,95,.3);z-index:200;align-items:center;justify-content:center;padding:1rem}
.overlay.open{display:flex}
.modal{background:#f7f3ea;border-radius:18px;width:100%;max-width:420px;max-height:84vh;overflow:hidden;display:flex;flex-direction:column;border:1px solid #d9ceb8}
.mhead{padding:1.2rem 1.4rem 1rem;border-bottom:1px solid #e8e0ce;display:flex;align-items:center;justify-content:space-between}
.mtitle{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600}
.mcount{font-size:11px;color:#a8874f;margin-top:3px}
.mclose{width:30px;height:30px;border-radius:50%;border:1px solid #d9ceb8;background:#efe9db;cursor:pointer;font-size:14px;color:#41618a;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mbody{overflow-y:auto;padding:1rem 1.4rem 1.5rem}
.item{display:flex;align-items:flex-start;gap:.7rem;padding:.65rem 0;border-bottom:1px solid #efe9db;text-decoration:none;transition:opacity .15s}
.item:last-child{border-bottom:none}
.item:hover{opacity:.65}
.iico{font-size:16px;flex-shrink:0;margin-top:2px;width:22px;text-align:center}
.ititle{font-size:13px;color:#1f3a5f;line-height:1.45;font-weight:500}
.imeta{font-size:11px;color:#a8874f;margin-top:2px}
.empty{text-align:center;padding:2rem;font-size:13px;color:#a8874f}
</style>

<style id="hoda-wm-style">
.hoda-watermark{
  position:fixed;inset:0;pointer-events:none;z-index:9999;
  overflow:hidden;
}
.hoda-watermark::before{
  content:'';
  position:absolute;inset:0;
  background-image:repeating-linear-gradient(
    -45deg,
    transparent,
    transparent 120px,
    rgba(30,58,95,0.045) 120px,
    rgba(30,58,95,0.045) 121px
  );
}
.hoda-watermark-text{
  position:absolute;
  width:220px;
  text-align:center;
  font-family:'Roboto','Estedad',sans-serif;
  font-size:15px;
  font-weight:700;
  color:rgba(30,58,95,0.07);
  letter-spacing:1px;
  transform:rotate(-35deg);
  white-space:nowrap;
  line-height:1.6;
  user-select:none;
}
</style>
</head>
<body>
<div class="hoda-watermark" aria-hidden="true" id="hoda-wm">
</div>
<script>
(function(){
  const wm = document.getElementById('hoda-wm');
  if(!wm) return;
  const W = window.innerWidth || 1200;
  const H = window.innerHeight || 800;
  const cols = Math.ceil(W / 200) + 2;
  const rows = Math.ceil(H / 160) + 4;
  let html = '';
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const x = (c * 200) - 100;
      const y = (r * 160) - 80;
      html += `<div class="hoda-watermark-text" style="left:${x}px;top:${y}px">Hoda Khedmati<br>©frenchavechoda</div>`;
    }
  }
  wm.innerHTML = html;
})();
</script>
<div class="page">
<div class="header">
  <h1>Français avec Hoda</h1>
  <p>کتابخانه یادگیری · A1 تا TCF Canada</p>
</div>

<div class="road-wrap">

<!-- شروع -->
<div class="spacer" style="margin-bottom:6px">
  <div class="milestone ms-main" style="display:flex;flex-direction:column;align-items:center;justify-content:center">
    <span>شروع</span><span class="ms-label">A1</span>
  </div>
</div>

<!-- خط + ردیف ۱: گرامر / واژگان -->
<div class="vline" style="height:28px"></div>
<div class="row" style="align-items:flex-start;gap:8px;margin:8px 0">
  <div class="node-card" onclick="openCat('grammar')" style="border-color:#1f3a5f">
    <div class="nc-title" style="color:#1f3a5f">گرامر</div>
    <div class="nc-count">۳۳ درس · A1 تا C1</div>
  </div>
  <div style="width:3px;background:#e0dbd2;align-self:stretch;border-radius:2px;flex-shrink:0"></div>
  <div class="node-card" onclick="openCat('vocab')" style="border-color:#22618f">
    <div class="nc-title" style="color:#22618f">واژگان</div>
    <div class="nc-count">۱۵ مجموعه</div>
  </div>
</div>

<!-- خط + ردیف ۲: گردونه / جملات -->
<div class="vline" style="height:20px"></div>
<div class="row" style="align-items:flex-start;gap:8px;margin:8px 0">
  <div class="node-card" onclick="openCat('roulette')" style="border-color:#7a5ba8">
    <div class="nc-title" style="color:#7a5ba8">گردونه موضوع</div>
  </div>
  <div style="width:3px;background:#e0dbd2;align-self:stretch;border-radius:2px;flex-shrink:0"></div>
  <div class="node-card" onclick="openCat('phrases')" style="border-color:#c77d3a">
    <div class="nc-title" style="color:#c77d3a">جملات کاربردی</div>
  </div>
</div>

<!-- خط + B1 -->
<div class="vline" style="height:28px"></div>
<div class="spacer" style="margin:6px 0">
  <div class="milestone ms-mid" style="display:flex;flex-direction:column;align-items:center;justify-content:center">
    <span>B1</span><span class="ms-label" style="color:#a8874f">متوسط</span>
  </div>
</div>

<!-- خط + ردیف ۳: مینی‌آرتیکل / InnerFrench -->
<div class="vline" style="height:28px"></div>
<div class="row" style="align-items:flex-start;gap:8px;margin:8px 0">
  <div class="node-card" onclick="openCat('miniarticle')" style="border-color:#b0506f">
    <div class="nc-title" style="color:#b0506f">مینی‌آرتیکل</div>
    <div class="nc-count">۴۱ متن</div>
  </div>
  <div style="width:3px;background:#e0dbd2;align-self:stretch;border-radius:2px;flex-shrink:0"></div>
  <div class="node-card" onclick="openCat('innerfrench')" style="border-color:#5a3b88">
    <div class="nc-title" style="color:#5a3b88">InnerFrench</div>
    <div class="nc-count">۷ اپیزود</div>
  </div>
</div>

<!-- خط + B2 -->
<div class="vline" style="height:28px"></div>
<div class="spacer" style="margin:6px 0">
  <div class="milestone ms-b2" style="display:flex;flex-direction:column;align-items:center;justify-content:center">
    <span>B2</span><span class="ms-label" style="color:#888">پیشرفته</span>
  </div>
</div>

<!-- خط + ردیف ۴: آرتیکل / پادکست -->
<div class="vline" style="height:28px"></div>
<div class="row" style="align-items:flex-start;gap:8px;margin:8px 0">
  <div class="node-card" onclick="openCat('article')" style="border-color:#2e8b6b">
    <div class="nc-title" style="color:#2e8b6b">آرتیکل</div>
    <div class="nc-count">۶ مقاله دوزبانه</div>
  </div>
  <div style="width:3px;background:#e0dbd2;align-self:stretch;border-radius:2px;flex-shrink:0"></div>
  <div class="node-card" onclick="openCat('podcast')" style="border-color:#c4502d">
    <div class="nc-title" style="color:#c4502d">پادکست</div>
    <div class="nc-count">۸ اپیزود</div>
  </div>
</div>

<!-- خط + TCF -->
<div class="vline" style="height:28px"></div>
<div class="spacer" style="margin:6px 0">
  <div class="milestone ms-tcf" style="display:flex;flex-direction:column;align-items:center;justify-content:center">
    <span>TCF</span><span class="ms-label">Canada</span>
  </div>
</div>

<!-- خط + ردیف ۵: فرهنگ / آمادگی TCF -->
<div class="vline" style="height:28px"></div>
<div class="row" style="align-items:flex-start;gap:8px;margin:8px 0">
  <div class="node-card" onclick="openCat('culture')" style="border-color:#8a2040">
    <div class="nc-title" style="color:#8a2040">فرهنگ فرانسه</div>
    <div class="nc-count">۳ محتوا</div>
  </div>
  <div style="width:3px;background:#e0dbd2;align-self:stretch;border-radius:2px;flex-shrink:0"></div>
  <div class="node-card" onclick="openCat('tcf')" style="border-color:#1a4f7a">
    <div class="nc-title" style="color:#1a4f7a">آمادگی TCF</div>
    <div class="nc-count">۶ محتوا · کانادا</div>
  </div>
</div>

<!-- خط + پایان -->
<div class="vline" style="height:28px"></div>
<div class="spacer" style="margin-top:6px">
  <div class="milestone ms-end" style="display:flex;flex-direction:column;align-items:center;justify-content:center">
    <span>✈</span><span class="ms-label">Canada</span>
  </div>
</div>

</div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="mhead">
      <div>
        <div class="mtitle" id="mtitle"></div>
        <div class="mcount" id="mcount"></div>
      </div>
      <button class="mclose" onclick="closeModal()">✕</button>
    </div>
    <div class="mbody" id="mbody"></div>
  </div>
</div>

<script src="data.js"></script>
<script>
const CAT_LINKS={roulette:'ROULETTE.html',phrases:'PHRASES_utiles.html'};
function catInfo(id){return CATEGORIES.find(c=>c.id===id)||{label:id,icon:'§',color:'#1f3a5f'};}
function openCat(id){
  const ci=catInfo(id);
  if(CAT_LINKS[id]){window.location.href=CAT_LINKS[id];return;}
  document.getElementById('mtitle').textContent=ci.label;
  document.getElementById('mtitle').style.color=ci.color||'#1f3a5f';
  const body=document.getElementById('mbody');
  body.innerHTML='';
  if(id==='miniarticle'){
    document.getElementById('mcount').textContent=MINIARTICLES.length+' متن';
    MINIARTICLES.forEach(m=>{
      const a=document.createElement('a');a.className='item';a.href='index.html#cat=miniarticle';
      a.innerHTML=`<span class="iico">${m.emoji||'✑'}</span><div><div class="ititle">${m.titre}</div><div class="imeta">${m.niveau||''}</div></div>`;
      body.appendChild(a);
    });
  } else if(id==='innerfrench'){
    document.getElementById('mcount').textContent=INNERFRENCH.length+' اپیزود';
    INNERFRENCH.forEach(e=>{
      const a=document.createElement('a');a.className='item';a.href=e.source||'#';a.target='_blank';
      a.innerHTML=`<span class="iico">▶</span><div><div class="ititle">${e.titreFa}</div><div class="imeta">اپیزود ${e.num}</div></div>`;
      body.appendChild(a);
    });
  } else {
    const items=LESSONS.filter(l=>l.category===id);
    document.getElementById('mcount').textContent=items.length+' محتوا';
    if(!items.length){body.innerHTML='<div class="empty">محتوایی یافت نشد</div>';}
    else items.forEach(l=>{
      const a=document.createElement('a');a.className='item';a.href=l.file||'#';
      a.innerHTML=`<span class="iico">${ci.icon||'§'}</span><div><div class="ititle">${l.title}</div><div class="imeta">${l.level||''}</div></div>`;
      body.appendChild(a);
    });
  }
  document.getElementById('overlay').classList.add('open');
}
function closeModal(e){
  if(!e||e.target===document.getElementById('overlay'))
    document.getElementById('overlay').classList.remove('open');
}
</script>
</body>
</html>
