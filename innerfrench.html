<meta charset="UTF-8">

<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --navy:#1e3a5f; --navy-soft:#41618a; --purple:#7a5ba8; --gold:#b07a4a; --gold-soft:#c4a572;
    --paper:#f4f3f5; --paper-warm:#ebeaed; --cream:#f9f8fa; --ink:#2c2a26; --gray:#8a8275;
    --line:#e2e1e3; --white:#fcfbfd; --terracotta:#c4502d;
  }
  body{font-family:'Estedad',Arial,sans-serif; background-color:var(--paper);
    background-image:repeating-linear-gradient(transparent, transparent 31px, rgba(46,123,181,0.05) 31px, rgba(46,123,181,0.05) 32px);
    color:var(--ink); line-height:1.9; padding:22px 16px 90px;}
  .wrap{max-width:820px; margin:0 auto;}
  .topbar{display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap;}
  .topbar a{color:#1a4f7a; text-decoration:none; font-size:13.5px;
    border:1px solid var(--line); background:var(--cream); padding:9px 16px; border-radius:9px; transition:all .2s;}
  .topbar a:hover{background:#2e7bb5; color:#fff;}
  .if-episode{background:var(--white); border:1px solid var(--line); border-top:4px solid #2e7bb5;
    border-radius:18px; padding:26px 24px; box-shadow:0 8px 24px rgba(31,58,95,.06);}
  .if-ep-head{padding-bottom:16px; margin-bottom:18px; border-bottom:2px solid var(--line);}
  .if-ep-titre{font-family:'Roboto',serif; font-size:27px; font-weight:700; color:var(--navy); line-height:1.3; direction:ltr; text-align:left;}
  .if-ep-titre-fa{font-size:16px; color:var(--ink); margin-top:5px;}
  .if-ep-theme{font-size:12.5px; color:#2e7bb5; margin-top:10px; background:rgba(46,123,181,0.08); display:inline-block; padding:4px 14px; border-radius:12px;}
  .if-play-btn{display:block; width:100%; text-align:center; font-family:'Estedad',sans-serif;
    background:linear-gradient(135deg,#2e7bb5,#1a4f7a); color:#fff; font-size:15px; font-weight:700;
    padding:14px; border:none; border-radius:12px; cursor:pointer; margin-bottom:10px; transition:transform .2s,opacity .2s;}
  .if-play-btn:hover{transform:translateY(-1px); opacity:.95;}
  .if-source{display:block; text-align:center; text-decoration:none; background:var(--cream); color:#2e7bb5;
    border:1px solid var(--line); font-size:13px; font-weight:600; padding:9px; border-radius:10px; margin-bottom:18px; transition:all .2s;}
  .if-source:hover{background:rgba(46,123,181,0.08); border-color:#2e7bb5;}
  .if-intro{background:var(--paper-warm); border-right:4px solid var(--gold-soft); border-radius:10px;
    padding:14px 18px; margin-bottom:18px; font-size:14px; line-height:2.05;}
  .if-hint{font-size:12.5px; color:var(--gray); background:var(--cream); padding:8px 14px; border-radius:8px; margin-bottom:20px;}
  .if-text{display:flex; flex-direction:column; gap:18px;}
  .if-block{border-right:2px solid var(--line); padding-right:14px;}
  .if-para{direction:ltr; text-align:left; font-family:'Roboto',serif; font-size:18px; line-height:1.85; color:var(--ink);}
  .if-para-fa{font-size:13px; line-height:1.9; color:var(--gray); opacity:.78; margin-top:6px;}
  .if-credit{margin-top:24px; padding-top:16px; border-top:1px dashed var(--line); font-size:12px; color:var(--gray); text-align:center;}
  /* واژه‌های کلیکی */
  .cw{position:relative; cursor:pointer; color:#b0506f; border-bottom:1.5px dotted #b0506f; transition:background .2s; padding:0 1px;}
  .cw:hover{background:rgba(176,80,111,0.1);}
  .cw.open{background:#b0506f; color:#fff;}
  .cw-struct{background:rgba(46,123,181,0.12); color:#1f6196; border-bottom:1.5px dashed #2e7bb5;}
  .cw-struct:hover{background:rgba(46,123,181,0.22);}
  .cw-struct.open{background:#2e7bb5; color:#fff;}
  .cw-struct::before{content:"⚙ "; font-size:10px; opacity:.6;}
  .cw-pop{position:absolute; bottom:130%; left:50%; transform:translateX(-50%);
    background:var(--navy); color:var(--cream); font-family:'Estedad',sans-serif; font-size:13px; font-weight:500;
    direction:rtl; white-space:nowrap; padding:5px 12px; border-radius:8px; z-index:10;
    box-shadow:0 6px 18px rgba(0,0,0,0.2); opacity:0; visibility:hidden; transition:opacity .3s ease,visibility .3s; pointer-events:none;}
  .cw.open .cw-pop{opacity:1; visibility:visible;}
  /* پخش‌کننده */
  .mini-player{position:fixed; bottom:0; left:0; right:0; z-index:999;
    background:linear-gradient(135deg,#2e7bb5,#1a4f7a); color:#fff; display:none; align-items:center; gap:12px;
    padding:10px 16px; box-shadow:0 -6px 24px rgba(31,58,95,0.25); transform:translateY(100%); transition:transform .35s ease;}
  .mini-player.show{display:flex; transform:translateY(0);}
  .mp-close{background:rgba(255,255,255,0.15); color:#fff; border:none; width:28px; height:28px; border-radius:50%; cursor:pointer; flex-shrink:0; font-size:13px;}
  .mp-close:hover{background:rgba(255,255,255,0.3);}
  .mp-icon{font-size:16px; width:38px; height:38px; background:rgba(255,255,255,0.15); border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .mp-info{flex-shrink:0; max-width:180px;}
  .mp-title{font-size:13.5px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .mp-sub{font-size:11px; opacity:.8;}
  #mpAudio{height:36px; border-radius:8px; flex:1; min-width:0;}
  @media(max-width:600px){.mini-player{flex-wrap:wrap;} .mp-info{max-width:none; flex:1;} #mpAudio{width:100%; flex-basis:100%;}}
  .loading{text-align:center; padding:60px 20px; color:var(--gray);}
</style>
</head>

<button id="if-back" onclick="history.back()">← بازگشت</button>
  <div class="wrap">
    <div class="topbar">
      <a href="index.html">⌂ Français avec Hoda</a>

  </div>

  <div id="miniPlayer" class="mini-player">
    <button class="mp-close" onclick="closeMiniPlayer()" title="بستن">✕</button>
    <div class="mp-icon">▶</div>
    <div class="mp-info"><div class="mp-title" id="mpTitle">—</div><div class="mp-sub">InnerFrench</div></div>

  <script src="data.js"></script>
  <script>
    function safeUrl(u){ return String(u||"").replace(/"/g,"&quot;"); }

    function parseClickWords(text){
      text = text.replace(/⟪([^|⟫]+)\|([^⟫]+)⟫/g, function(_, mot, sens){
        const m = mot.replace(/"/g,'&quot;'); const s = sens.replace(/"/g,'&quot;');
        return '<span class="cw cw-struct" dir="ltr" onclick="toggleCw(this)" data-sens="'+s+'">'+m+'</span>';
      });
      text = text.replace(/⟦([^|⟧]+)\|([^⟧]+)⟧/g, function(_, mot, sens){
        const m = mot.replace(/"/g,'&quot;'); const s = sens.replace(/"/g,'&quot;');
        return '<span class="cw" dir="ltr" onclick="toggleCw(this)" data-sens="'+s+'">'+m+'</span>';
      });
      return text;
    }

    function toggleCw(el){
      if(el.classList.contains("open")){
        el.classList.remove("open");
        if(el._cwTimer){ clearTimeout(el._cwTimer); el._cwTimer=null; }
        return;
      }
      let pop = el.querySelector(".cw-pop");
      if(!pop){
        pop = document.createElement("span");
        pop.className = "cw-pop";
        pop.textContent = el.getAttribute("data-sens");
        el.appendChild(pop);
      }
      el.classList.add("open");
      if(el._cwTimer) clearTimeout(el._cwTimer);
      el._cwTimer = setTimeout(()=>{ el.classList.remove("open"); el._cwTimer=null; }, 3000);
    }

    function playInPlayer(audioUrl, title){
      const player = document.getElementById("miniPlayer");
      const audio = document.getElementById("mpAudio");
      document.getElementById("mpTitle").textContent = title;
      if(audio.getAttribute("data-src") !== audioUrl){
        audio.src = audioUrl; audio.setAttribute("data-src", audioUrl);
      }
      player.classList.add("show");
      audio.play().catch(()=>{});
    }
    function closeMiniPlayer(){
      const audio = document.getElementById("mpAudio");
      audio.pause();
      document.getElementById("miniPlayer").classList.remove("show");
    }
    function goToList(e){ /* لینک خودش به index می‌رود */ }

    function render(){
      const params = new URLSearchParams(location.search);
      const num = parseInt(params.get("ep") || "1", 10);
      const list = (typeof INNERFRENCH !== "undefined") ? INNERFRENCH : [];
      const ep = list.find(e => e.num === num) || list[0];
      if(!ep){ document.getElementById("content").innerHTML = '<div class="loading">قسمت پیدا نشد.</div>'; return; }
      document.title = "InnerFrench #" + ep.num + " — " + ep.titreFa;
      const html = `
        <div class="if-episode">
          <div class="if-ep-head">
            <div class="if-ep-titre" dir="ltr">${ep.titre}</div>
            <div class="if-ep-titre-fa">${ep.titreFa}</div>
            ${ep.theme ? `<div class="if-ep-theme">${ep.theme}</div>` : ""}
          </div>
          ${ep.audio ? `<button class="if-play-btn" onclick="playInPlayer('${safeUrl(ep.audio)}', 'InnerFrench #${ep.num} — ${ep.titreFa}')">▶ پخش پادکست در همین صفحه</button>` : ""}
          <a class="if-source" href="${ep.source}" target="_blank" rel="noopener">🔗 منبع اصلی در InnerFrench.com</a>
          ${ep.intro ? `<div class="if-intro">${ep.intro}</div>` : ""}
          <div class="if-hint">💡 روی واژه‌های رنگی بزن تا معنی‌شان را ببینی (صورتی=واژه، آبی ⚙=ساختار)</div>
          <div class="if-text">
            ${(ep.paras||[]).map(p => {
              const fr = (typeof p === "object") ? p.fr : p;
              const fa = (typeof p === "object") ? p.fa : "";
              return `<div class="if-block"><p class="if-para" dir="ltr">${parseClickWords(fr)}</p>${fa ? `<p class="if-para-fa">${fa}</p>` : ""}</div>`;
            }).join("")}
          </div>
          <div class="if-credit">منبع: InnerFrench — Hugo Cotton · با احترام به سازنده‌ی اثر</div>
        </div>`;
      document.getElementById("content").innerHTML = html;
      window.scrollTo(0, 0);
    }

    document.addEventListener("DOMContentLoaded", render);
  </script>
  <script src="protect.js"></script>


<!-- 🎙️ Voice Recorder -->
<style>
#rec-widget{
  background:var(--white,#fcfbfd);
  border:1px solid rgba(217,206,184,.6);
  border-radius:14px;padding:14px 16px;
  margin:16px 0;box-shadow:0 3px 12px rgba(31,58,95,.06);
}
.rec-title{font-size:11px;font-weight:700;color:#b07a4a;letter-spacing:1.5px;margin-bottom:10px}
.rec-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
#rec-btn{
  display:flex;align-items:center;gap:6px;
  padding:8px 16px;border:none;border-radius:10px;
  background:#1e3a5f;color:#f5f0e8;
  font-family:'Estedad',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;transition:all .2s;
}
#rec-btn.recording{background:#c0392b;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
#rec-timer{font-size:12px;color:#8a8275;font-variant-numeric:tabular-nums}
.rec-list{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.rec-item{background:#f5f0e8;border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:8px}
.rec-item audio{flex:1;height:30px;accent-color:#1e3a5f}
.rec-item-date{font-size:10px;color:#8a8275;flex-shrink:0}
.rec-del{background:none;border:none;color:#c0392b;cursor:pointer;font-size:14px;opacity:.5;flex-shrink:0}
.rec-del:hover{opacity:1}
.rec-empty{font-size:12px;color:#b0a090;text-align:center;padding:8px 0}
</style>

<div id="rec-widget">
  <div class="rec-title">🎙️ صدایت رو ضبط کن</div>
  <div class="rec-controls">
    <button id="rec-btn" onclick="toggleRec()">🎙️ شروع ضبط</button>
    <span id="rec-timer">۰:۰۰</span>
    <span style="font-size:11px;color:#b0a090">ضبط‌ها در مرورگرت ذخیره می‌مونن</span>
  </div>
  <div class="rec-list" id="rec-list"></div>
</div>

<script>
(function(){
  const PAGE = location.pathname.split('/').pop().split('?')[0];
  const REC_KEY = 'hoda_recs_' + PAGE;
  let mediaRecorder = null, chunks = [], timerInterval = null, seconds = 0;
  
  function toFa(n){ return String(n).replace(/[0-9]/g,d=>'۰۱۲۳۴۵۶۷۸۹'[d]); }
  function fmtTime(s){ return toFa(Math.floor(s/60))+':'+toFa(s%60<10?'0'+s%60:s%60); }
  
  window.toggleRec = async function(){
    const btn = document.getElementById('rec-btn');
    if(!mediaRecorder || mediaRecorder.state==='inactive'){
      try{
        const stream = await navigator.mediaDevices.getUserMedia({audio:true});
        mediaRecorder = new MediaRecorder(stream);
        chunks = [];
        mediaRecorder.ondataavailable = e => chunks.push(e.data);
        mediaRecorder.onstop = () => {
          const blob = new Blob(chunks, {type:'audio/webm'});
          saveRec(blob);
          stream.getTracks().forEach(t=>t.stop());
        };
        mediaRecorder.start();
        btn.textContent = '⏹ توقف ضبط';
        btn.classList.add('recording');
        seconds = 0;
        timerInterval = setInterval(()=>{
          seconds++;
          document.getElementById('rec-timer').textContent = fmtTime(seconds);
          if(seconds >= 300){ toggleRec(); } // max 5 min
        },1000);
      }catch(e){
        alert('دسترسی به میکروفون لازمه. لطفاً اجازه بده.');
      }
    } else {
      mediaRecorder.stop();
      btn.textContent = '🎙️ ضبط جدید';
      btn.classList.remove('recording');
      clearInterval(timerInterval);
      document.getElementById('rec-timer').textContent = toFa('0')+':'+toFa('00');
    }
  };
  
  function saveRec(blob){
    const reader = new FileReader();
    reader.onload = function(e){
      const recs = JSON.parse(localStorage.getItem(REC_KEY)||'[]');
      recs.unshift({
        data: e.target.result,
        date: new Date().toLocaleString('fa-IR'),
        ts: Date.now()
      });
      localStorage.setItem(REC_KEY, JSON.stringify(recs.slice(0,20))); // max 20
      renderRecs();
    };
    reader.readAsDataURL(blob);
  }
  
  function delRec(ts){
    const recs = JSON.parse(localStorage.getItem(REC_KEY)||'[]').filter(r=>r.ts!==ts);
    localStorage.setItem(REC_KEY, JSON.stringify(recs));
    renderRecs();
  }
  window.delRec = delRec;
  
  function renderRecs(){
    const list = document.getElementById('rec-list');
    const recs = JSON.parse(localStorage.getItem(REC_KEY)||'[]');
    if(!recs.length){
      list.innerHTML='<div class="rec-empty">هنوز ضبطی نداری — اولین ضبطت رو بکن! 🎙️</div>';
      return;
    }
    list.innerHTML = recs.map(r=>`
      <div class="rec-item">
        <audio controls src="${r.data}" style="flex:1;height:30px;accent-color:#1e3a5f"></audio>
        <span class="rec-item-date">${r.date}</span>
        <button class="rec-del" onclick="delRec(${r.ts})" title="حذف">🗑</button>
      </div>
    `).join('');
  }
  
  renderRecs();
})();
</script>

<!-- ✅ Mark as Done -->
<style>
#done-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:rgba(255,253,246,.96);backdrop-filter:blur(12px);
  border-top:1px solid rgba(217,206,184,.6);
  padding:10px 16px;
  display:flex;align-items:center;gap:10px;
}
#done-btn{
  flex:1;padding:10px;
  background:#1e3a5f;color:#f5f0e8;
  border:none;border-radius:10px;
  font-family:'Estedad',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;transition:all .25s;
}
#done-btn.done{background:#2e8b6b}
#done-btn:hover{opacity:.9}
body{padding-bottom:70px!important}
</style>
<div id="done-bar">
  <button id="done-btn" onclick="markDone()">✓ خوانده شد</button>
</div>
<script>
(function(){
  const page = location.pathname.split('/').pop().split('?')[0];
  const title = document.title.split('|')[0].trim().replace(/[📐📚✍️🎧📰🗼🎯🎙️📸👤]/g,'').trim();
  
  // Track visit
  const history = JSON.parse(localStorage.getItem('hoda_history')||'[]');
  const entry = {
    page, title,
    time: new Date().toLocaleString('fa-IR'),
    ts: Date.now()
  };
  // Remove duplicate
  const filtered = history.filter(h => h.page !== page);
  filtered.unshift(entry);
  localStorage.setItem('hoda_history', JSON.stringify(filtered.slice(0,200)));
  
  // Also update visited
  const visited = JSON.parse(localStorage.getItem('hoda_visited')||'[]');
  const vi = visited.findIndex(v => v.file === page);
  const ve = {file:page, title, time:new Date().toLocaleDateString('fa-IR')};
  if(vi>=0) visited[vi]=ve; else visited.unshift(ve);
  localStorage.setItem('hoda_visited', JSON.stringify(visited.slice(0,100)));
  
  // Check if already done
  const done = JSON.parse(localStorage.getItem('hoda_done')||'{}');
  const btn = document.getElementById('done-btn');
  if(done[page]){
    btn.textContent = '✓ خوانده شده';
    btn.classList.add('done');
  }
  
  window.markDone = function(){
    const done = JSON.parse(localStorage.getItem('hoda_done')||'{}');
    done[page] = new Date().toISOString();
    localStorage.setItem('hoda_done', JSON.stringify(done));
    
    // Add to history as "completed"
    const h = JSON.parse(localStorage.getItem('hoda_history')||'[]');
    h.unshift({page, title, time: new Date().toLocaleString('fa-IR'), ts: Date.now(), completed: true});
    localStorage.setItem('hoda_history', JSON.stringify(h.slice(0,200)));
    
    // Update status
    const status = JSON.parse(localStorage.getItem('hoda_status')||'{}');
    status[page] = 'done';
    localStorage.setItem('hoda_status', JSON.stringify(status));
    
    btn.textContent = '✓ خوانده شده';
    btn.classList.add('done');
  };
})();
</script>
