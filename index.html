<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma bibliothèque de français — Hoda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Vazirmatn:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --navy: #1e3a5f;        /* سرمه‌ای جلد کتاب */
            --navy-deep: #16293f;
            --navy-soft: #41618a;
            --gold: #b07a4a; --gold-deep: #8a5a2b;        /* طلایی/برنزی حروف */
            --gold-soft: #c4a572;
            --terracotta: #c4502d;  /* نارنجی آجری — لهجه (مثل French Mornings) */
            --paper: #f4f3f5;       /* دقیقاً رنگ پس‌زمینه‌ی عکس کرواسان */
            --paper-warm: #ebeaed;
            --cream: #f9f8fa;
            --ink: #2c2a26;         /* مرکب */
            --gray: #8a8275;
            --line: #e2e1e3;
            --white: #fcfbfd;
            /* نام‌های قدیمی برای سازگاری */
            --blue-deep: #1f3a5f;
            --blue: #41618a;
            --blue-soft: #a8874f;
            --blue-pale: #efe9db;
            --blue-mist: #f7f3ea;
        }


        body {
            font-family: 'Vazirmatn', 'Tahoma', sans-serif;
            background-color: var(--paper);
            color: var(--ink);
            line-height: 1.9;
            min-height: 100vh;
        }
        /* بافت ظریف کاغذ */


        /* پس‌زمینه‌ی کاغذ خط‌دار (مثل دفترچه) */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
            /* خطوط افقی آبی کم‌رنگ + خط حاشیه‌ی عمودی قرمز */
            background-image:
              repeating-linear-gradient(transparent, transparent 31px, rgba(65,97,138,0.10) 31px, rgba(65,97,138,0.10) 32px);
            pointer-events: none;
        }
        /* خط حاشیه‌ی عمودی قرمز (سمت راست برای RTL) */
        body::after {
            content: "";
            position: fixed;
            top: 0; bottom: 0;
            right: 58px;
            width: 2px;
            background: rgba(196,80,45,0.22);
            z-index: -1;
            pointer-events: none;
        }

        /* نوار بالا */
        .topbar {
            text-align: center;
            padding: 16px;
            background: var(--white);
            border-bottom: 1px solid var(--line);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .topbar .logo {
            width: 46px; height: 46px;
            border-radius: 50%;
            background: var(--navy);
            border: 2px solid var(--gold-soft);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            color: var(--gold-soft);
        }
        .topbar h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 26px; font-weight: 600;
            color: var(--navy); letter-spacing: 0.5px;
        }
        .topbar .tag { margin-top: 4px; }
        .topbar .name-fa { display: block; font-size: 15px; color: var(--navy); font-weight: 500; }
        .topbar .role-fa { display: block; font-size: 12px; color: var(--gray); margin-top: 1px; }

        /* بخش معرفی */
        /* چیدمان دو ستونه‌ی معرفی */
        .hero-centered { text-align: center; max-width: 680px; margin: 0 auto; }
        .hero-centered .hero-tag { text-align: center; }
        .hero-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: center;
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
        }
        .hero-text { text-align: right; }
        .hero-tag {
            font-size: 13px;
            color: var(--terracotta);
            font-weight: 600;
            letter-spacing: 3px;
            margin-bottom: 18px;
            text-transform: uppercase;
        }
        .hero-photo { display: flex; justify-content: center; }
        .photo-frame {
            width: 100%;
            max-width: 420px;
            aspect-ratio: 4/5;
            border-radius: 20px;
            overflow: hidden;
            background: var(--paper-warm);
            box-shadow: 0 20px 50px rgba(31,58,95,0.18);
            border: 1px solid var(--line);
        }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .photo-placeholder {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 14px; color: var(--gold-soft);
            background: linear-gradient(135deg, var(--paper-warm), var(--cream));
        }
        .photo-placeholder .ph-icon { font-size: 48px; }
        .photo-placeholder .ph-text { font-size: 15px; color: var(--gray); text-align: center; line-height: 1.8; }
        @media (max-width: 820px) {
            .hero-centered { text-align: center; max-width: 680px; margin: 0 auto; }
        .hero-centered .hero-tag { text-align: center; }
        .hero-grid { grid-template-columns: 1fr; gap: 28px; }
            .hero-photo { order: -1; }
            .hero-text { text-align: center; }
            .photo-frame { max-width: 280px; }
        }

        .hero {
            min-height: calc(100vh - 88px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 24px;
            transition: min-height 0.5s ease;
            position: relative; z-index: 1;
        }
        .hero.shrink { min-height: auto; padding: 48px 24px 26px; }

        .hero .welcome {
            font-size: 13px;
            color: var(--gold);
            font-weight: 500;
            margin-bottom: 20px;
            letter-spacing: 4px;
        }
        .hero h2 {
            font-size: 46px;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--navy);
            line-height: 1.4;
        }
        .hero .sub {
            font-size: 18px;
            color: var(--ink);
            font-weight: 500;
            margin: 0 auto 12px;
            max-width: 540px;
            text-align: center;
        }
        .hero .sub-fr {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            color: var(--gold-deep);
            font-weight: 700;
            letter-spacing: 0.5px;
            margin: 0 auto 22px;
            font-style: italic;
            text-align: center;
        }
        .channel-btn {
            display: inline-flex;
            align-items: center;
            gap: 9px;
            margin-bottom: 40px;
            padding: 11px 24px;
            background: transparent;
            border: 1px solid var(--gold-soft);
            border-radius: 4px;
            color: var(--gold);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            transition: all 0.25s;
        }
        .channel-btn:hover {
            background: var(--navy);
            border-color: var(--navy);
            color: var(--cream);
        }
        .channel-btn .tg { font-size: 18px; }

        /* کارت نکته — گوشه‌ی صفحه (لطیف و هماهنگ با تم) */
        .tip-corner {
            position: fixed;
            bottom: 22px;
            left: 22px;
            width: 300px;
            max-width: calc(100vw - 44px);
            background: var(--cream);
            border: 1px solid var(--line);
            border-right: 4px solid var(--gold-soft);
            border-radius: 14px;
            padding: 16px 18px;
            text-align: right;
            cursor: pointer;
            z-index: 90;
            box-shadow: 0 10px 30px rgba(31,58,95,0.14);
            transition: all 0.3s ease;
        }
        .tip-corner:hover {
            transform: translateY(-3px);
            box-shadow: 0 16px 38px rgba(31,58,95,0.2);
        }
        .tip-close {
            position: absolute;
            top: 8px; left: 10px;
            font-size: 18px; line-height: 1;
            color: var(--gray);
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.2s;
        }
        .tip-close:hover { opacity: 1; }
        .tip-head {
            font-size: 12px;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 0.5px;
            margin-bottom: 9px;
            display: flex; align-items: center; gap: 6px;
        }
        .tip-fr {
            font-family: 'Cormorant Garamond', serif;
            font-size: 16px;
            font-style: italic;
            line-height: 1.45;
            color: var(--navy);
            direction: ltr; text-align: left;
            margin-bottom: 8px;
        }
        .tip-fa {
            font-size: 12.5px;
            line-height: 1.85;
            color: var(--ink);
            opacity: 0.85;
        }
        .tip-next {
            font-size: 10.5px;
            color: var(--gray);
            margin-top: 10px;
            text-align: center;
        }
        @media (max-width: 600px) {
            .tip-corner { width: calc(100vw - 32px); left: 16px; bottom: 16px; }
        }

        /* جستجو */
        .search-box {
            width: 100%;
            max-width: 560px;
            position: relative;
            margin-bottom: 30px;
        }
        .search-box input {
            width: 100%;
            padding: 18px 56px 18px 22px;
            font-size: 16px;
            border: 1px solid var(--line);
            border-radius: 8px;
            font-family: inherit;
            background: var(--cream);
            transition: all 0.25s;
            color: var(--ink);
        }
        .search-box input:focus {
            outline: none;
            border-color: var(--gold-soft);
            box-shadow: 0 6px 22px rgba(168,135,79,0.12);
        }
        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 21px; top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            opacity: 0.45;
        }

        /* دسته‌ها به‌صورت کارت در صفحه‌ی اول */
        .cat-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            max-width: 560px;
            width: 100%;
        }
        .cat-chip {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: var(--white);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 24px 22px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }
        /* نوار رنگی ظریف سمت راست هر کادر */
        .cat-chip::before {
            content: "";
            position: absolute;
            top: 0; right: 0; bottom: 0;
            width: 4px;
            background: var(--c);
            opacity: 0.85;
            transition: width 0.3s ease;
        }
        .cat-chip:hover {
            border-color: transparent;
            transform: translateY(-4px);
            box-shadow: 0 14px 30px rgba(31,58,95,0.13);
        }
        .cat-chip:hover::before { width: 8px; }
        .cat-chip .chip-mark {
            flex-shrink: 0;
            width: 46px; height: 46px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; line-height: 1;
            color: var(--c);
            background: var(--cream);
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        .cat-chip:hover .chip-mark {
            background: var(--c);
            color: var(--white);
        }
        .cat-chip .chip-body { display: flex; flex-direction: column; }
        .cat-chip .name {
            font-size: 17px; font-weight: 500; color: var(--navy);
            line-height: 1.5;
        }
        .cat-chip .num { font-size: 12px; color: var(--gray); margin-top: 2px; }

        /* جدیدترین محتوا */
        .latest {
            margin-top: 50px;
            width: 100%;
            max-width: 760px;
        }
        .latest-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            color: var(--navy);
            margin-bottom: 6px;
            font-weight: 600;
        }
        .latest-title .fa { font-family: 'Vazirmatn', sans-serif; font-size: 17px; display:block; }
        .latest-sub { font-size: 13px; color: var(--gray); margin-bottom: 22px; }
        .news-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .news-card {
            display: flex;
            gap: 18px;
            background: var(--white);
            border: 1px solid var(--line);
            border-radius: 14px;
            overflow: hidden;
            text-decoration: none;
            transition: all 0.25s ease;
        }
        .news-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 32px rgba(31,58,95,0.13);
            border-color: transparent;
        }
        .news-img {
            flex-shrink: 0;
            width: 190px;
            min-height: 130px;
            overflow: hidden;
        }
        .news-img svg { width: 100%; height: 100%; display: block; object-fit: cover; }
        .news-body {
            flex: 1;
            padding: 16px 20px 16px 0;
            display: flex;
            flex-direction: column;
            text-align: right;
        }
        .news-cat {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        .news-title {
            font-size: 19px;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 8px;
            line-height: 1.5;
        }
        .news-excerpt {
            font-size: 14px;
            color: var(--gray);
            line-height: 1.9;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .news-more {
            font-size: 13px;
            font-weight: 700;
            margin-top: auto;
        }
        @media (max-width: 600px) {
            .news-card { flex-direction: column; }
            .news-img { width: 100%; height: 140px; }
            .news-body { padding: 16px 18px; }
        }

        /* بخش شاگردان خصوصی */
        .prive-lock {
            background: var(--white); border: 1px solid var(--line); border-top: 4px solid #7a5ba8;
            border-radius: 18px; padding: 40px 30px; text-align: center;
            box-shadow: 0 8px 24px rgba(31,58,95,0.06); max-width: 420px; margin: 0 auto;
        }
        .prive-lock-icon { font-size: 48px; margin-bottom: 16px; }
        .prive-lock-title { font-size: 20px; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
        .prive-lock-sub { font-size: 14px; color: var(--gray); line-height: 1.9; margin-bottom: 24px; }
        .prive-input {
            width: 100%; font-family: 'Vazirmatn', sans-serif; font-size: 16px; text-align: center;
            padding: 12px 16px; border: 1.5px solid var(--line); border-radius: 12px;
            margin-bottom: 14px; outline: none; transition: border-color 0.2s; letter-spacing: 2px;
        }
        .prive-input:focus { border-color: #7a5ba8; }
        .prive-btn {
            width: 100%; font-family: 'Vazirmatn', sans-serif; font-size: 15px; font-weight: 700;
            background: linear-gradient(135deg, #7a5ba8, #5a3b88); color: #fff;
            border: none; border-radius: 12px; padding: 13px; cursor: pointer; transition: opacity 0.2s;
        }
        .prive-btn:hover { opacity: 0.92; }
        .prive-error { font-size: 13px; color: var(--terracotta); margin-top: 14px; min-height: 18px; }
        .prive-welcome {
            background: linear-gradient(135deg, rgba(122,91,168,0.08), rgba(196,165,114,0.05));
            border-right: 4px solid #7a5ba8; border-radius: 10px; padding: 14px 18px;
            font-size: 14px; color: var(--ink); margin-bottom: 18px;
        }
        .prive-card {
            background: var(--white); border: 1px solid var(--line); border-top: 4px solid #7a5ba8;
            border-radius: 16px; padding: 24px; margin-bottom: 18px; box-shadow: 0 8px 24px rgba(31,58,95,0.06);
        }
        .prive-card-head { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .prive-emoji {
            font-size: 24px; width: 48px; height: 48px; background: rgba(122,91,168,0.1);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
        }
        .prive-nom { font-size: 20px; font-weight: 700; color: var(--navy); }
        .prive-note { font-size: 14px; color: var(--ink); line-height: 1.9; margin-bottom: 16px; }
        .prive-items { display: flex; flex-direction: column; gap: 10px; }
        .prive-item {
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
            background: var(--cream); border-radius: 10px; padding: 14px 16px; text-decoration: none;
            border-right: 3px solid #7a5ba8; transition: all 0.2s;
        }
        a.prive-item:hover { background: rgba(122,91,168,0.06); transform: translateX(-2px); }
        .prive-item-titre { font-size: 15px; font-weight: 600; color: var(--navy); }
        .prive-item-desc { font-size: 13px; color: var(--gray); flex: 1; }
        .prive-item-go { font-size: 16px; color: #7a5ba8; }
        .prive-empty { font-size: 13px; color: var(--gray); text-align: center; padding: 20px; font-style: italic; }

        /* بخش InnerFrench */
        .if-card {
            display: flex; align-items: center; gap: 14px;
            background: var(--white); border: 1px solid var(--line);
            border-right: 4px solid #2e7bb5; border-radius: 14px;
            padding: 18px 20px; cursor: pointer; text-align: right;
            box-shadow: 0 6px 18px rgba(31,58,95,0.05); transition: all 0.2s; width: 100%;
        }
        .if-card:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(46,123,181,0.15); border-right-color: #1a4f7a; }
        .if-num {
            font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 700;
            color: #fff; background: linear-gradient(135deg,#2e7bb5,#1a4f7a);
            min-width: 50px; height: 50px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .if-body { flex: 1; display: flex; flex-direction: column; gap: 2px; }
        .if-titre { font-family: 'Cormorant Garamond', serif; font-size: 19px; font-weight: 600; color: var(--navy); }
        .if-titre-fa { font-size: 13.5px; color: var(--ink); }
        .if-theme { font-size: 11.5px; color: #2e7bb5; margin-top: 3px; }
        .if-go { font-size: 16px; color: #2e7bb5; flex-shrink: 0; }

        .if-episode { background: var(--white); border: 1px solid var(--line); border-top: 4px solid #2e7bb5;
            border-radius: 16px; padding: 26px 24px; box-shadow: 0 8px 24px rgba(31,58,95,0.06); }
        .if-ep-head { padding-bottom: 16px; margin-bottom: 18px; border-bottom: 2px solid var(--line); }
        .if-ep-titre { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 700; color: var(--navy); line-height: 1.3; }
        .if-ep-titre-fa { font-size: 15px; color: var(--ink); margin-top: 4px; }
        .if-ep-theme { font-size: 12.5px; color: #2e7bb5; margin-top: 8px; background: rgba(46,123,181,0.08); display: inline-block; padding: 3px 12px; border-radius: 12px; }
        .if-player { margin-bottom: 14px; }
        .if-source {
            display: block; text-align: center; text-decoration: none;
            background: linear-gradient(135deg,#2e7bb5,#1a4f7a); color: #fff;
            font-size: 14px; font-weight: 600; padding: 12px; border-radius: 10px; margin-bottom: 18px;
            transition: opacity 0.2s;
        }
        .if-source:hover { opacity: 0.9; }
        .if-intro { background: var(--paper-warm); border-right: 4px solid var(--gold-soft);
            border-radius: 10px; padding: 14px 18px; font-size: 14px; line-height: 2; margin-bottom: 16px; }
        .if-hint { font-size: 12.5px; color: var(--gray); background: var(--cream); padding: 8px 14px; border-radius: 8px; margin-bottom: 20px; }
        .if-text { display: flex; flex-direction: column; gap: 18px; }
        .if-block { border-right: 2px solid var(--line); padding-right: 14px; }
        .if-para { direction: ltr; text-align: left; font-family: 'Cormorant Garamond', serif;
            font-size: 18px; line-height: 1.95; color: var(--ink); margin-bottom: 5px; }
        .if-para-fa { font-size: 13px; line-height: 1.9; color: var(--gray); opacity: 0.75; }
        .if-credit { margin-top: 24px; padding-top: 16px; border-top: 1px dashed var(--line);
            font-size: 12px; color: var(--gray); text-align: center; }

        /* تب‌ها و فیلتر مینی‌آرتیکل */
        .mini-tabs { display: flex; gap: 10px; margin-bottom: 14px; }
        .mini-tab {
            flex: 1; font-family: 'Vazirmatn', sans-serif; font-size: 14.5px; font-weight: 700;
            background: var(--white); color: var(--gray); border: 1.5px solid var(--line);
            border-radius: 12px; padding: 12px; cursor: pointer; transition: all 0.2s;
        }
        .mini-tab:hover { border-color: #b0506f; }
        .mini-tab.active { background: #b0506f; color: #fff; border-color: #b0506f; }
        .mini-niveaux { display: flex; align-items: center; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
        .mini-niv-label { font-size: 13px; color: var(--gray); font-weight: 700; }
        .mini-niv {
            font-family: 'Vazirmatn', sans-serif; font-size: 13px; font-weight: 600;
            background: var(--cream); color: var(--ink); border: 1.5px solid var(--line);
            border-radius: 20px; padding: 5px 16px; cursor: pointer; transition: all 0.2s;
        }
        .mini-niv:hover { border-color: #b0506f; }
        .mini-niv.active { background: rgba(176,80,111,0.12); color: #b0506f; border-color: #b0506f; }
        .mini-section-intro {
            font-size: 13px; line-height: 2; color: var(--ink);
            background: linear-gradient(135deg, rgba(176,80,111,0.06), rgba(196,165,114,0.05));
            border-right: 4px solid #b0506f; border-radius: 10px; padding: 14px 18px; margin-bottom: 18px;
        }

            margin: 0 auto;
            padding: 0 24px 80px;
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            transition: opacity 0.4s ease;
        }
        .results.show { opacity: 1; max-height: none; overflow: visible; }

        .results-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin: 30px 0 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--line);
        }
        .results-head h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 30px; font-weight: 600; color: var(--navy);
        }
        .results-head .count { font-size: 14px; color: var(--gray); }
        .back-btn {
            background: transparent;
            color: var(--gray);
            border: 1px solid var(--line);
            padding: 9px 18px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }
        .back-btn:hover { background: var(--navy); border-color: var(--navy); color: var(--cream); }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 22px;
        }
        /* برای بخش‌های تک‌کارتی بزرگ (صفت، کوییز، نکته، واکنش، تلفظ) */
        .grid.grid-single {
            grid-template-columns: 1fr;
            max-width: 720px;
            margin: 0 auto;
        }
        .card {
            background: var(--white);
            border-radius: 6px;
            border: 1px solid var(--line);
            overflow: hidden;
            transition: all 0.25s;
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 34px rgba(31,58,95,0.12);
            border-color: var(--gold-soft);
        }
        .card-top {
            height: 4px;
            background: var(--navy);
        }
        .card-body { padding: 24px; display: flex; flex-direction: column; flex: 1; }
        .theme-box {
            background: var(--paper-warm);
            border-radius: 10px;
            padding: 10px 13px;
            margin: 10px 0 12px;
            border-right: 3px solid var(--terracotta);
        }
        .theme-line { font-size: 13px; color: var(--ink); margin-bottom: 7px; }
        .theme-label { font-weight: 700; color: var(--terracotta); }
        .kw-line { display: flex; flex-wrap: wrap; gap: 6px; }
        .kw {
            font-size: 12px;
            background: var(--white);
            color: var(--navy);
            border: 1px solid var(--line);
            padding: 2px 10px;
            border-radius: 20px;
            font-weight: 500;
        }
        .card-cat {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 1px;
            color: var(--gray);
            margin-bottom: 12px;
            align-self: flex-start;
            text-transform: uppercase;
        }
        .card h4 { font-size: 19px; font-weight: 700; margin-bottom: 6px; color: var(--navy); }
        .card .fr {
            font-family: 'Cormorant Garamond', serif;
            font-size: 17px; color: var(--gold);
            direction: ltr; text-align: left;
            margin-bottom: 14px; line-height: 1.4; font-style: italic;
        }
        .card-meta { margin-bottom: 16px; }
        .card-meta span {
            display: inline-block;
            background: var(--paper-warm);
            color: var(--navy);
            font-size: 12px;
            padding: 4px 11px;
            border-radius: 3px;
            margin: 3px 3px 3px 0;
        }
        .pod-cover {
            position: relative;
            height: 150px;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            background: var(--navy);
        }
        .pod-cover svg { width: 100%; height: 100%; display: block; }
        .pod-play {
            position: absolute;
            width: 52px; height: 52px;
            border-radius: 50%;
            background: rgba(255,253,248,0.92);
            color: var(--navy);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; padding-left: 4px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.25);
            transition: all 0.25s;
        }
        .card-podcast:hover .pod-play {
            transform: scale(1.12);
            background: var(--gold);
            color: var(--white);
        }
        .pod-desc {
            background: var(--paper-warm);
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 14px;
        }
        .pod-fr {
            font-family: 'Cormorant Garamond', serif;
            font-size: 15px; font-style: italic;
            color: var(--navy); line-height: 1.5;
            margin-bottom: 6px;
        }
        .pod-fa {
            font-size: 13px; color: var(--ink);
            line-height: 1.8;
        }
        .premium-tag {
            background: #fff3e0 !important;
            color: #e08a00 !important;
        }
        .card .open {
            display: block; text-align: center;
            background: var(--navy);
            color: var(--cream); padding: 12px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 500; font-size: 14px;
            margin-top: auto;
            transition: all 0.25s;
        }
        .card .open:hover { background: var(--gold); color: var(--white); }

        .empty {
            grid-column: 1/-1;
            text-align: center;
            color: var(--gray);
            font-size: 18px;
            padding: 70px 20px;
        }
        .empty .big { font-size: 50px; display: block; margin-bottom: 16px; opacity: 0.5; }

        /* فوتر */
        .footer {
            text-align: center;
            padding: 44px 20px;
            background: var(--navy);
            border-top: 3px solid var(--gold-soft);
            color: var(--paper-warm);
            font-size: 14px;
            position: relative; z-index: 1;
        }
        .footer strong { color: var(--gold-soft); font-weight: 500; }

        @media (max-width: 768px) {
            .hero h2 { font-size: 30px; }
            .hero .sub { font-size: 16px; }
            .cat-grid { grid-template-columns: 1fr; max-width: 360px; }
            .cat-chip { padding: 16px 18px; }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div>
            <h1>Français avec Hoda</h1>
            <div class="tag"><span class="name-fa">هدی خدمتی</span><span class="role-fa">مدرس زبان فرانسه</span></div>
        </div>
    </div>

    <div class="hero" id="hero">
      <div class="hero-text hero-centered">
          <h2>کتابخانهٔ فرانسهٔ من</h2>
          <p class="sub-fr" dir="ltr">Ma bibliothèque de français</p>
          <p class="sub">همه‌چیز اینجاست تا فرانسه برای تو ساده‌تر بشه</p>
      </div>

        <div class="search-box">
            <input type="text" id="search" placeholder="جستجو در محتواها..." oninput="onSearch()">
        </div>

        <a href="https://t.me/TCFHODA" target="_blank" class="channel-btn">
            <span class="tg">✈</span>
            <span>کانال تلگرام من</span>
        </a>

        <div class="cat-grid" id="catGrid"></div>

        <div class="latest" id="latest"></div>
    </div>

    <div class="results" id="results">
        <div class="results-head">
            <div>
                <h3 id="resultsTitle">همه‌ی محتواها</h3>
                <div class="count" id="count"></div>
            </div>
            <button class="back-btn" onclick="goHome()">⬆ بازگشت به خانه</button>
        </div>
        <div class="grid" id="grid"></div>
    </div>

    <div class="footer">
        <p>🇫🇷 <strong>Français avec Hoda</strong> — کتابخانه‌ی آموزش زبان فرانسه</p>
        <p style="margin-top:6px; font-size:12px;">© 2025</p>
    </div>

    <!-- کارت نکته — گوشه‌ی صفحه -->
    <div class="tip-corner" id="tipCard" onclick="nextTip()"></div>

    <script src="data.js"></script>
    <script>
        let activeCat = null;
        let activeSection = null;  // بخش فعال (مثل expression-orale)
        let activeTask = null;     // تکلیف فعال (مثل tache-3)
        let activeSujet = null;    // موضوع فعال (مثل immigration)
        let activeGroupe = null;   // پوشه‌ی فعال در گرامر (مثل conditionnel)

        function lessonsIn(catId) {
            return LESSONS.filter(l => l.category === catId).length;
        }

        // ساخت کارت‌های دسته در صفحه‌ی اول
        function buildCatGrid() {
            const el = document.getElementById("catGrid");
            let html = `
                <button class="cat-chip" onclick="openCat('all')" style="--c:var(--navy)">
                    <span class="chip-body">
                        <span class="name">همهٔ محتواها</span>
                        <span class="num">${LESSONS.length} محتوا</span>
                    </span>
                </button>`;
            CATEGORIES.forEach(c => {
                const n = lessonsIn(c.id);
                html += `
                <button class="cat-chip" onclick="openCat('${c.id}')" style="--c:${c.color}">
                    <span class="chip-body">
                        <span class="name">${c.label}</span>
                        <span class="num">${n} محتوا</span>
                    </span>
                </button>`;
            });
            el.innerHTML = html;
        }

        function catInfo(id) {
            return CATEGORIES.find(c => c.id === id) || { label: id, icon: "📄", color: "#2e7bb5" };
        }
        function sectionsOf(catId) {
            return (typeof SECTIONS !== "undefined" && SECTIONS[catId]) ? SECTIONS[catId] : null;
        }

        function openCat(catId) {
            activeCat = catId;
            activeSection = null;
            activeTask = null;
            activeSujet = null;
            activeGroupe = null;
            document.getElementById("search").value = "";
            openResults();
            // دسته‌ی نکته‌های طلایی → نمایش مخصوص
            if (catId === "astuces") {
                renderAstuces();
            } else if (catId === "adjectifs") {
                renderAdjectifs();
            } else if (catId === "quiz") {
                renderQuiz();
            } else if (catId === "reactions") {
                renderReactions();
            } else if (catId === "prononciation") {
                renderPrononciation();
            } else if (catId === "editoa1") {
                renderEditoA1();
            } else if (catId === "miniarticle") {
                renderMiniarticles();
            } else if (catId === "innerfrench") {
                renderInnerFrench();
            } else if (catId === "prive") {
                renderPrive();
            } else if (catId === "grammar" && !activeGroupe) {
                // گرامر زیرپوشه‌ها (مودهای فعلی) دارد → اول پوشه‌ها را نشان بده
                renderGroupes(catId);
            } else if (catId !== "all" && sectionsOf(catId)) {
                // اگر این دسته زیرشاخه دارد، به‌جای محتواها زیرشاخه‌ها را نشان بده
                renderSections(catId);
            } else {
                setResultsTitle(catId);
                render();
            }
        }

        // نمایش کارت‌های نکته‌ی طلایی
        function renderAstuces() {
            document.getElementById("grid").classList.add("grid-single");
            const ci = catInfo("astuces");
            document.getElementById("resultsTitle").innerHTML =
                '<span style="color:' + ci.color + '">' + ci.icon + '</span> ' + ci.label;
            const list = (typeof ASTUCES !== "undefined") ? ASTUCES : [];
            document.getElementById("count").textContent = list.length + " نکته";
            const grid = document.getElementById("grid");
            if (!list.length) {
                grid.innerHTML = '<div class="empty"><span class="big">✦</span>هنوز نکته‌ای اضافه نشده<br><span style="font-size:14px">به‌زودی</span></div>';
                return;
            }
            grid.innerHTML = list.map(a => `
                <div class="astuce-card">
                    <div class="astuce-badge">✦ نکته‌ی طلایی</div>
                    <h4 class="astuce-titre">${a.titre}</h4>
                    <div class="astuce-compare">
                        ${a.correct ? `<div class="astuce-row correct"><span class="ar-icon">✅</span><span dir="ltr">${a.correct}</span></div>` : ""}
                        ${a.faux ? `<div class="astuce-row faux"><span class="ar-icon">❌</span><span dir="ltr">${a.faux}</span></div>` : ""}
                    </div>
                    ${a.note ? `<div class="astuce-note">${a.note}</div>` : ""}
                    ${a.exemple ? `<div class="astuce-ex"><div class="ax-fr" dir="ltr">${a.exemple}</div>${a.exempleFa ? `<div class="ax-fa">${a.exempleFa}</div>` : ""}</div>` : ""}
                </div>`).join("");
        }

        function setResultsTitle(catId) {
            const ci = catInfo(catId);
            if (catId === "all") {
                document.getElementById("resultsTitle").innerHTML = "همه‌ی محتواها";
            } else {
                document.getElementById("resultsTitle").innerHTML =
                    '<span style="color:' + ci.color + '">' + ci.icon + '</span> ' + ci.label;
            }
        }

        // نمایش کارت‌های صفت
        function renderAdjectifs() {
            document.getElementById("grid").classList.add("grid-single");
            const ci = catInfo("adjectifs");
            document.getElementById("resultsTitle").innerHTML =
                '<span style="color:' + ci.color + '">' + ci.icon + '</span> ' + ci.label;
            const list = (typeof ADJECTIFS !== "undefined") ? ADJECTIFS : [];
            document.getElementById("count").textContent = list.length + " صفت";
            const grid = document.getElementById("grid");
            if (!list.length) {
                grid.innerHTML = '<div class="empty"><span class="big">◆</span>هنوز صفتی اضافه نشده<br><span style="font-size:14px">به‌زودی</span></div>';
                return;
            }
            grid.innerHTML = list.map(a => `
                <div class="adj-card">
                    <div class="adj-head">
                        <span class="adj-mot" dir="ltr">${a.mot}</span>
                        ${a.emoji ? `<span class="adj-emoji">${a.emoji}</span>` : ""}
                    </div>
                    ${(a.traductions && a.traductions.length) ? `
                    <div class="adj-block">
                        <div class="adj-label">🔹 ترجمه</div>
                        <div class="adj-trads">${a.traductions.map(t => `<span class="adj-trad">${t}</span>`).join("")}</div>
                    </div>` : ""}
                    ${(a.synonymes && a.synonymes.length) ? `
                    <div class="adj-block">
                        <div class="adj-label">🔹 مترادف‌ها</div>
                        <div class="adj-syns">
                            ${a.synonymes.map(s => `<div class="adj-syn"><span class="syn-fr" dir="ltr">${s.fr}</span><span class="syn-arrow">←</span><span class="syn-fa">${s.fa}</span></div>`).join("")}
                        </div>
                    </div>` : ""}
                    ${(a.combinaisons && a.combinaisons.length) ? `
                    <div class="adj-block">
                        <div class="adj-label">🔗 ترکیبات پرتکرار</div>
                        <div class="adj-combos">
                            ${a.combinaisons.map(c => `
                            <div class="adj-combo">
                                <span class="combo-icon">${c.icon || "•"}</span>
                                <div class="combo-text">
                                    <span class="combo-fr" dir="ltr">${c.fr}</span>
                                    <span class="combo-fa">${c.fa}</span>
                                </div>
                            </div>`).join("")}
                        </div>
                    </div>` : ""}
                    ${a.phrase ? `
                    <div class="adj-phrase">
                        <div class="adj-label">🔹 جمله</div>
                        <div class="phrase-fr" dir="ltr">${a.phrase.fr}</div>
                        <div class="phrase-fa">${a.phrase.fa}</div>
                    </div>` : ""}
                </div>`).join("");
        }

        // نمایش کوییزها
        function renderQuiz() {
            document.getElementById("grid").classList.add("grid-single");
            const ci = catInfo("quiz");
            document.getElementById("resultsTitle").innerHTML =
                '<span style="color:' + ci.color + '">' + ci.icon + '</span> ' + ci.label;
            const list = (typeof QUIZ !== "undefined") ? QUIZ : [];
            document.getElementById("count").textContent = list.length + " کوییز";
            const grid = document.getElementById("grid");
            if (!list.length) {
                grid.innerHTML = '<div class="empty"><span class="big">?</span>هنوز کوییزی اضافه نشده<br><span style="font-size:14px">به‌زودی</span></div>';
                return;
            }
            grid.innerHTML = list.map((q, qi) => `
                <div class="quiz-card">
                    <div class="quiz-badge">؟ کوییز کوتاه</div>
                    <div class="quiz-q" dir="ltr">${q.question}</div>
                    <div class="quiz-opts">
                        ${q.options.map((opt, oi) => `
                            <button class="quiz-opt" id="q${qi}o${oi}" onclick="answerQuiz(${qi},${oi},${q.correct})">
                                <span class="opt-letter">${String.fromCharCode(65+oi)}</span>
                                <span dir="ltr">${opt}</span>
                            </button>`).join("")}
                    </div>
                    ${q.note ? `<div class="quiz-note" id="qn${qi}">${q.note}</div>` : ""}
                </div>`).join("");
        }

        function answerQuiz(qi, oi, correct) {
            const card = document.getElementById("q"+qi+"o0").parentElement;
            if (card.dataset.answered) return;
            card.dataset.answered = "1";
            const opts = card.querySelectorAll(".quiz-opt");
            opts.forEach((b, idx) => {
                b.classList.add("disabled");
                if (idx === correct) b.classList.add("correct");
            });
            if (oi !== correct) {
                document.getElementById("q"+qi+"o"+oi).classList.add("wrong");
            }
            const note = document.getElementById("qn"+qi);
            if (note) note.classList.add("show");
        }

        // نمایش واکنش‌ها (چطور واکنش بدم؟)
        function renderReactions() {
            document.getElementById("grid").classList.add("grid-single");
            const ci = catInfo("reactions");
            document.getElementById("resultsTitle").innerHTML =
                '<span style="color:' + ci.color + '">' + ci.icon + '</span> ' + ci.label;
            const list = (typeof REACTIONS !== "undefined") ? REACTIONS : [];
            document.getElementById("count").textContent = list.length + " موضوع";
            const grid = document.getElementById("grid");
            if (!list.length) {
                grid.innerHTML = '<div class="empty"><span class="big">❝</span>هنوز موضوعی اضافه نشده<br><span style="font-size:14px">به‌زودی</span></div>';
                return;
            }
            grid.innerHTML = list.map(r => {
                const col = r.couleur || "#d17b3f";
                return `
                <div class="react-card" style="--rc:${col}">
                    <div class="react-head">
                        <span class="react-titre" dir="ltr">${r.titre}</span>
                        ${r.emoji ? `<span class="react-emoji">${r.emoji}</span>` : ""}
                    </div>
                    ${r.titreFa ? `<div class="react-titre-fa">${r.titreFa}</div>` : ""}
                    <div class="react-list">
                        ${r.expressions.map(e => `
                            <div class="react-item">
                                <div class="react-expr">
                                    <span class="react-ico">${e.emoji || "💬"}</span>
                                    <span class="react-fr" dir="ltr">${e.fr}</span>
                                    <span class="react-fa">${e.fa}</span>
                                </div>
                                ${e.ex ? `<div class="react-ex"><div class="rex-fr" dir="ltr">${e.ex}</div>${e.exFa ? `<div class="rex-fa">${e.exFa}</div>` : ""}</div>` : ""}
                            </div>`).join("")}
                    </div>
                </div>`;
            }).join("");
        }

        // نمایش تمرین‌های تلفظ
        function renderPrononciation() {
            document.getElementById("grid").classList.add("grid-single");
            const ci = catInfo("prononciation");
            document.getElementById("resultsTitle").innerHTML =
                '<span style="color:' + ci.color + '">' + ci.icon + '</span> ' + ci.label;
            const list = (typeof PRONONCIATION !== "undefined") ? PRONONCIATION : [];
            document.getElementById("count").textContent = list.length + " تمرین";
            const grid = document.getElementById("grid");
            // کارت راهنمای کامل تلفظ (بالای ویدیوها)
            const guideCard = `
                <a class="pron-guide" href="GUIDE_prononciation.html">
                    <div class="pron-guide-icon">🔊</div>
                    <div class="pron-guide-body">
                        <div class="pron-guide-title">راهنمای کامل تلفظ فرانسوی</div>
                        <div class="pron-guide-fa">از A تا Z — همه‌ی صداها، حروف ناخوانا، لیزون و زبان‌گردان‌ها در ۹ درس</div>
                    </div>
                    <div class="pron-guide-go">مطالعه ←</div>
                </a>`;
            if (!list.length) {
                grid.innerHTML = guideCard + '<div class="empty"><span class="big">🗣</span>هنوز ویدیویی اضافه نشده<br><span style="font-size:14px">به‌زودی</span></div>';
                return;
            }
            grid.innerHTML = guideCard + list.map(p => {
                const sounds = (p.focus || []).map(s => `<span class="pron-sound" dir="ltr">${s}</span>`).join("");
                const lines = (p.texteFr || []).map((fr, i) => `
                    <div class="pron-line">
                        <div class="pron-fr" dir="ltr">${fr}</div>
                        ${p.texteFa && p.texteFa[i] ? `<div class="pron-fa">${p.texteFa[i]}</div>` : ""}
                    </div>`).join("");
                return `
                <div class="pron-card">
                    <div class="pron-head">
                        <span class="pron-jour">🗣️ ${p.jour}</span>
                        <span class="pron-titre">${p.titre}</span>
                    </div>
                    ${sounds ? `<div class="pron-sounds">${sounds}</div>` : ""}
                    ${p.video ? `
                    <div class="pron-video">
                        <video controls preload="metadata" playsinline>
                            <source src="${safeUrl(p.video)}" type="video/mp4">
                            مرورگر شما از پخش ویدیو پشتیبانی نمی‌کند.
                        </video>
                    </div>` : ""}
                    <div class="pron-text">${lines}</div>
                    <div class="pron-cta">📢 با من تکرار کن!</div>
                </div>`;
            }).join("");
        }

        // نمایش کارت‌های بخش (مثل Expression Orale)
        function renderSections(catId) {
            document.getElementById("grid").classList.remove("grid-single");
            const ci = catInfo(catId);
            const secs = sectionsOf(catId);
            document.getElementById("resultsTitle").innerHTML =
                '<span style="color:' + ci.color + '">' + ci.icon + '</span> ' + ci.label;
            document.getElementById("count").textContent = secs.length + " بخش";
            const grid = document.getElementById("grid");
            grid.innerHTML = secs.map(s => `
                <button class="sub-card" style="--c:${ci.color}" onclick="openSection('${catId}','${s.id}')">
                    <span class="sub-fr-l" dir="ltr">${s.label}</span>

        // باز کردن یک قسمت → متن کامل با واژگان کلیکی + پخش‌کننده

        // تبدیل متن با نشانه‌ی ⟦mot|معنی⟧ به HTML با واژگان کلیکی
        function parseClickWords(text) {
            return text.replace(/⟦([^|⟧]+)\|([^⟧]+)⟧/g, function(_, mot, sens) {
                const m = mot.replace(/"/g, '&quot;');
                const s = sens.replace(/"/g, '&quot;');
                return '<span class="cw" dir="ltr" onclick="toggleCw(this)" data-sens="' + s + '">' + m + '</span>';
            });
        }
        function toggleCw(el) {
            // اگر باز است، فوراً ببند
            if (el.classList.contains("open")) {
                el.classList.remove("open");
                if (el._cwTimer) { clearTimeout(el._cwTimer); el._cwTimer = null; }
                return;
            }
            // ساخت حباب معنی اگر هنوز نیست
            let pop = el.querySelector(".cw-pop");
            if (!pop) {
                pop = document.createElement("span");
                pop.className = "cw-pop";
                pop.textContent = el.getAttribute("data-sens");
                el.appendChild(pop);
            }
            el.classList.add("open");
            // محو خودکار بعد از ۵ ثانیه
            if (el._cwTimer) clearTimeout(el._cwTimer);
            el._cwTimer = setTimeout(() => {
                el.classList.remove("open");
                el._cwTimer = null;
            }, 5000);
        }

        // نمایش مینی‌آرتیکل‌ها

            // دکمه‌های بخش

        // اطلاعات پوشه‌های گرامر (مودهای فعلی و دسته‌بندی‌ها)
        const GRAMMAR_GROUPES = {
            "conditionnel": { fr: "Le Conditionnel", fa: "وجه شرطی", icon: "◈" },
            "subjonctif":   { fr: "Le Subjonctif", fa: "وجه التزامی", icon: "◈" },
            "indicatif":    { fr: "L'Indicatif", fa: "وجه اخباری", icon: "◈" },

        // نمایش پوشه‌های گرامر (هر مود فعلی یک پوشه)
        function renderGroupes(catId) {
            document.getElementById("grid").classList.remove("grid-single");
            const ci = catInfo(catId);
            document.getElementById("resultsTitle").innerHTML =
                '<span style="color:' + ci.color + '">' + ci.icon + '</span> ' + ci.label;
            // گروه‌بندی محتواهای گرامر بر اساس فیلد groupe (پیش‌فرض: autres)
            const lessons = LESSONS.filter(l => l.category === catId);
            const groupesMap = {};
            lessons.forEach(l => {
                const g = l.groupe || "autres";
                if (!groupesMap[g]) groupesMap[g] = [];
                groupesMap[g].push(l);
            });
            // ترتیب نمایش: ابتدا مودهای تعریف‌شده، سپس autres
            const order = ["conditionnel", "subjonctif", "indicatif", "autres"];
            const keys = Object.keys(groupesMap).sort((a,b) => {
                const ia = order.indexOf(a), ib = order.indexOf(b);
                return (ia<0?99:ia) - (ib<0?99:ib);
            });
            document.getElementById("count").textContent = keys.length + " پوشه";
            const grid = document.getElementById("grid");
            grid.innerHTML = keys.map(g => {
                const info = GRAMMAR_GROUPES[g] || { fr: g, fa: "", icon: "✦" };
                const n = groupesMap[g].length;
                return `
                <button class="sub-card" style="--c:${ci.color}" onclick="openGroupe('${g}')">
                    <span class="sub-fr-l" dir="ltr">${info.icon} ${info.fr}</span>
                    <span class="sub-fa-l">${info.fa}</span>
                    <span class="sub-go">${n} درس ←</span>
                </button>`;
            }).join("");
        }

        }

            activeSujet = null;
            activeGroupe = null;
            document.getElementById("search").value = "";
            document.getElementById("results").classList.remove("show");
            document.getElementById("hero").classList.remove("shrink");
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        function render() {
            document.getElementById("grid").classList.remove("grid-single");
            const q = document.getElementById("search").value.trim().toLowerCase();
            const grid = document.getElementById("grid");

            let filtered = LESSONS.filter(l => {
                const matchCat = !activeCat || activeCat === "all" || l.category === activeCat;
                const matchGroupe = !activeGroupe || (l.groupe || "autres") === activeGroupe;
                const matchSection = !activeSection || l.section === activeSection;
                const matchTask = !activeTask || l.task === activeTask;
                const matchSujet = !activeSujet || l.sujet === activeSujet;
                const matchSearch = !q ||
                    (l.title && l.title.toLowerCase().includes(q)) ||
                    (l.titleFr && l.titleFr.toLowerCase().includes(q)) ||
                    (l.tags && l.tags.join(" ").toLowerCase().includes(q));
                return matchCat && matchGroupe && matchSection && matchTask && matchSujet && matchSearch;
            });

            document.getElementById("count").textContent = filtered.length + " محتوا";

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="empty"><span class="big">📚</span>هنوز محتوایی در این بخش نیست<br><span style="font-size:14px">به‌زودی اضافه می‌شود</span></div>`;
                return;
            }

            grid.innerHTML = filtered.map(l => {
                const c = catInfo(l.category);
                const isPodcast = l.category === "podcast" || l.link;
                // مقصد لینک: پادکست → لینک خارجی، بقیه → فایل HTML
                const href = safeUrl(l.link || l.file || "#");
                const target = l.link ? ' target="_blank" rel="noopener"' : "";
                const btnText = isPodcast ? "شنیدن پادکست ♪" : "باز کردن ←";

                // بخش توضیح دوزبانه (مخصوص پادکست)
                let descBlock = "";
                if (l.descFr || l.descFa) {
                    descBlock = `
                        <div class="pod-desc">
                            ${l.descFr ? `<div class="pod-fr" dir="ltr">${l.descFr}</div>` : ""}
                            ${l.descFa ? `<div class="pod-fa">${l.descFa}</div>` : ""}
                        </div>`;
                }

                const coverBlock = (isPodcast && l.cover)
                    ? `<div class="pod-cover">${l.cover}<span class="pod-play">▶</span></div>`
                    : `<div class="card-top" style="background:${c.color}"></div>`;
                return `
                <div class="card${isPodcast ? ' card-podcast' : ''}">
                    ${coverBlock}
                    <div class="card-body">
                        <span class="card-cat"><span style="color:${c.color}">${c.icon}</span> ${c.label}</span>
                        <h4>${l.title || ""}</h4>
                        ${l.titleFr ? `<div class="fr">${l.titleFr}</div>` : ""}
                        ${descBlock}
                        ${(l.theme || (l.keywords && l.keywords.length)) ? `
                        <div class="theme-box">
                            ${l.theme ? `<div class="theme-line"><span class="theme-label">تم:</span> ${l.theme}</div>` : ""}
                            ${(l.keywords && l.keywords.length) ? `<div class="kw-line">${l.keywords.map(k => `<span class="kw">${k}</span>`).join("")}</div>` : ""}
                        </div>` : ""}
                        <div class="card-meta">
                            ${l.level ? `<span>${l.level}</span>` : ""}
                            ${(l.tags||[]).map(t => `<span>${t}</span>`).join("")}
                            ${l.premium ? `<span class="premium-tag">⭐ ویژه</span>` : ""}
                        </div>
                        <a href="${href}"${target} class="open">${btnText}</a>
                    </div>
                </div>`;
            }).join("");
        }

        // تولید تصویر SVG زیبا برای هر محتوا بر اساس دسته‌اش
        // امن‌کردن URL برای قرارگیری در ویژگی href
        function safeUrl(u) {
            return (u || "#").replace(/&/g, "&amp;");
        }

        function coverFor(l) {
            // ۱) عکس واقعی (فایل آپلودشده)
            if (l.img) return '<img src="' + l.img + '" alt="" loading="lazy" style="width:100%;height:100%;object-fit:cover;display:block;">';
            // ۲) تصویر SVG سفارشی (مثل پادکست)
            if (l.cover) return l.cover;
            const c = catInfo(l.category);
            const col = c.color;
            // رنگ روشن‌تر برای گرادیان (با ترکیب سفید)
            const lite = col + "cc";

            // موتیف‌های پخته و زیبا برای هر دسته
            const motifs = {
                tcf: '<g opacity="0.9"><rect x="148" y="44" width="104" height="76" rx="8" fill="#fffdf8" opacity="0.95"/><rect x="160" y="58" width="62" height="6" rx="3" fill="' + col + '" opacity="0.5"/><rect x="160" y="72" width="80" height="5" rx="2.5" fill="' + col + '" opacity="0.3"/><rect x="160" y="84" width="70" height="5" rx="2.5" fill="' + col + '" opacity="0.3"/><circle cx="232" cy="104" r="15" fill="#2e9e5b"/><path d="M225 104 l5 5 l9 -11" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>',
                grammar: '<text x="200" y="118" font-size="130" fill="#fffdf8" opacity="0.16" text-anchor="middle" font-family="Georgia,serif" font-style="italic" font-weight="bold">§</text><rect x="120" y="56" width="160" height="7" rx="3.5" fill="#fffdf8" opacity="0.4"/><rect x="140" y="74" width="120" height="6" rx="3" fill="#fffdf8" opacity="0.28"/>',
                conversation: '<g><rect x="58" y="44" width="150" height="62" rx="18" fill="#fffdf8" opacity="0.95"/><circle cx="92" cy="75" r="6" fill="' + col + '" opacity="0.55"/><circle cx="118" cy="75" r="6" fill="' + col + '" opacity="0.55"/><circle cx="144" cy="75" r="6" fill="' + col + '" opacity="0.55"/><rect x="150" y="88" width="170" height="52" rx="16" fill="#fffdf8" opacity="0.55"/></g>',
                vocab: '<text x="92" y="120" font-size="96" fill="#fffdf8" opacity="0.22" font-family="Georgia,serif" font-weight="bold">Aa</text><rect x="200" y="54" width="120" height="7" rx="3.5" fill="#fffdf8" opacity="0.4"/><rect x="200" y="74" width="150" height="6" rx="3" fill="#fffdf8" opacity="0.28"/><rect x="200" y="92" width="100" height="6" rx="3" fill="#fffdf8" opacity="0.22"/>',
                podcast: '<g><circle cx="200" cy="76" r="46" fill="#fffdf8" opacity="0.1"/><rect x="184" y="44" width="32" height="54" rx="16" fill="#fffdf8" opacity="0.92"/><path d="M168 88 a32 32 0 0 0 64 0" stroke="#fffdf8" stroke-width="5" fill="none" opacity="0.7"/><rect x="197" y="120" width="6" height="18" rx="3" fill="#fffdf8" opacity="0.6"/><rect x="184" y="136" width="32" height="5" rx="2.5" fill="#fffdf8" opacity="0.5"/></g>'
            };
            const motif = motifs[l.category] || '';

            // الگوی نقطه‌چین ظریف در پس‌زمینه
            const dots = '<circle cx="40" cy="36" r="3" fill="#fff" opacity="0.12"/><circle cx="360" cy="130" r="4" fill="#fff" opacity="0.1"/><circle cx="330" cy="30" r="2.5" fill="#fff" opacity="0.14"/><circle cx="60" cy="128" r="2.5" fill="#fff" opacity="0.1"/>';

            return '<svg viewBox="0 0 400 160" xmlns="http://www.w3.org/2000/svg">' +
                '<defs>' +
                '<linearGradient id="bg' + l.category + '" x1="0" y1="0" x2="1" y2="1">' +
                '<stop offset="0" stop-color="' + col + '"/>' +
                '<stop offset="1" stop-color="' + col + '" stop-opacity="0.78"/></linearGradient>' +
                '<linearGradient id="sh" x1="0" y1="0" x2="0" y2="1">' +
                '<stop offset="0.55" stop-color="#000" stop-opacity="0"/>' +
                '<stop offset="1" stop-color="#000" stop-opacity="0.22"/></linearGradient>' +
                '</defs>' +
                '<rect width="400" height="160" fill="url(#bg' + l.category + ')"/>' +
                dots + motif +
                '<rect width="400" height="160" fill="url(#sh)"/>' +
                '</svg>';
        }

        function buildLatest() {
            const box = document.getElementById("latest");
            if (!LESSONS.length) { box.innerHTML = ""; return; }
            // جدیدترین = آخرین مواردی که به لیست اضافه شده‌اند (تا ۴ مورد)
            const latest = LESSONS.slice(-4).reverse();
            let html = `
                <div class="latest-title">Derniers ajouts<span class="fa">جدیدترین محتواها</span></div>
                <div class="latest-sub">تازه‌ترین چیزهایی که به کتابخانه اضافه شده</div>
                <div class="news-list">`;
            latest.forEach(l => {
                const c = catInfo(l.category);
                const href = safeUrl(l.link || l.file || "#");
                const target = l.link ? ' target="_blank" rel="noopener"' : "";
                const summary = l.summary || l.descFa || "";
                html += `
                    <a href="${href}"${target} class="news-card">
                        <div class="news-img">${coverFor(l)}</div>
                        <div class="news-body">
                            <span class="news-cat" style="color:${c.color}">${c.label}${l.premium ? ' · ⭐ ویژه' : ''}</span>
                            <h5 class="news-title">${l.title || ""}</h5>
                            ${summary ? `<p class="news-excerpt">${summary}</p>` : ""}
                            <span class="news-more" style="color:${c.color}">${l.link ? 'شنیدن ←' : 'خواندن ←'}</span>
                        </div>
                    </a>`;
            });
            html += `</div>`;
            box.innerHTML = html;
        }

        let lastTip = -1;
        function nextTip() {
            const card = document.getElementById("tipCard");
            if (typeof TIPS === "undefined" || !TIPS.length) { card.style.display = "none"; return; }
            let i;
            do { i = Math.floor(Math.random() * TIPS.length); }
            while (TIPS.length > 1 && i === lastTip);
            lastTip = i;
            const t = TIPS[i];
            const head = t.type === "rappel" ? "✦ یادت باشه که…" : "✦ می‌دونستی که…؟";
            card.innerHTML = `
                <span class="tip-close" onclick="closeTip(event)">×</span>
                <div class="tip-head">${head}</div>
                <div class="tip-fr" dir="ltr">${t.fr}</div>
                <div class="tip-fa">${t.fa}</div>
                <div class="tip-next">برای نکته‌ی بعدی لمس کن ↺</div>`;
        }

        function closeTip(e) {
            e.stopPropagation();
            document.getElementById("tipCard").style.display = "none";
        }

        nextTip();
        buildLatest();
        buildCatGrid();
    </script>
    <script src="protect.js"></script>
</body>
</html>
