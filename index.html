<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Estedad',sans-serif;background:#f7f3ea;min-height:100vh;direction:rtl;color:#1f3a5f}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:repeating-linear-gradient(transparent,transparent 31px,rgba(65,97,138,0.07) 31px,rgba(65,97,138,0.07) 32px)}
.page{position:relative;z-index:1;max-width:430px;margin:0 auto;padding:1.5rem 1rem 3rem}
.top{text-align:center;padding:.5rem 0 1rem}
.top .back{display:inline-block;font-size:12px;color:#a8874f;text-decoration:none;margin-bottom:1rem}
.top .back:hover{color:#1f3a5f}
.top h1{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:600;color:#1f3a5f;letter-spacing:.5px;white-space:nowrap}
.top p{font-size:14px;color:#a8874f;margin-top:10px;letter-spacing:2px}

/* ROAD + STATIONS */
.road-wrap{position:relative;max-width:380px;margin:1rem auto 0}
svg.road{width:100%;display:block}
.stations{position:absolute;inset:0}

.node-card{position:absolute;transform:translateY(-50%);
  background:#fbf8f1;border:1.5px solid #d9ceb8;border-radius:14px;
  padding:.7rem .8rem;cursor:pointer;text-align:center;
  box-shadow:0 4px 14px rgba(31,58,95,.08);transition:transform .15s,box-shadow .15s}
.node-card:hover{transform:translateY(-50%) scale(1.04);box-shadow:0 8px 20px rgba(31,58,95,.16)}
.nc-title{font-size:16px;font-weight:600;line-height:1.35}
.nc-count{font-size:12px;color:#a8874f;margin-top:3px;line-height:1.3}

.milestone{position:absolute;left:50%;transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-radius:50%;flex-shrink:0;box-shadow:0 4px 12px rgba(31,58,95,.18)}
.ms-main{width:56px;height:56px;background:#1f3a5f;color:#f7f3ea;font-size:11px;font-weight:600}
.ms-mid{width:52px;height:52px;background:#fbf8f1;border:2.5px solid #1f3a5f;color:#1f3a5f;font-size:12px;font-weight:700}
.ms-b2{width:52px;height:52px;background:#fbf8f1;border:2.5px solid #a8874f;color:#a8874f;font-size:12px;font-weight:700}
.ms-tcf{width:56px;height:56px;background:#1f3a5f;color:#f7f3ea;font-size:11px;font-weight:600}
.ms-end{width:56px;height:56px;background:#a8874f;color:#f7f3ea;font-size:18px}
.ms-label{font-size:9px;margin-top:2px;opacity:.8}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(31,58,95,.3);z-index:200;align-items:center;justify-content:center;padding:1rem}
.overlay.open{display:flex}
.modal{background:#f7f3ea;border-radius:18px;width:100%;max-width:420px;max-height:84vh;overflow:hidden;display:flex;flex-direction:column;border:1px solid #d9ceb8}
.mhead{padding:1.2rem 1.4rem 1rem;border-bottom:1px solid #e8e0ce;display:flex;align-items:center;justify-content:space-between}
.mtitle{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600}
.mcount{font-size:11px;color:#a8874f;margin-top:3px}
.mclose{width:30px;height:30px;border-radius:50%;border:1px solid #d9ceb8;background:#efe9db;cursor:pointer;font-size:14px;color:#41618a;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mbody{overflow-y:auto;padding:1rem 1.4rem 1.5rem}
.item{display:flex;align-items:flex-start;gap:.7rem;padding:.65rem 0;border-bottom:1px solid #efe9db;text-decoration:none;transition:opacity .15s}
.item:last-child{border-bottom:none}
.item:hover{opacity:.65}
.iico{font-size:16px;flex-shrink:0;margin-top:2px;width:22px;text-align:center}
.ititle{font-size:13px;color:#1f3a5f;line-height:1.45;font-weight:500}
.imeta{font-size:11px;color:#a8874f;margin-top:2px}
.empty{text-align:center;padding:2rem;font-size:13px;color:#a8874f}

        /* Auth bar */
        .auth-bar{

          background:#fffdf6;border-bottom:1px solid #e8e0ce;

<script src="data.js"></script>
<script>
const CAT_LINKS={roulette:'ROULETTE.html',phrases:'PHRASES_utiles.html'};
function catInfo(id){return CATEGORIES.find(c=>c.id===id)||{label:id,icon:'§',color:'#1f3a5f'};}
function openCat(id){
  const ci=catInfo(id);
  if(CAT_LINKS[id]){window.location.href=CAT_LINKS[id];return;}
  document.getElementById('mtitle').textContent=ci.label;
  document.getElementById('mtitle').style.color=ci.color||'#1f3a5f';
  const body=document.getElementById('mbody');
  body.innerHTML='';
  if(id==='miniarticle'){
    const arts = typeof MINIARTICLES!=='undefined' ? MINIARTICLES : [];
    document.getElementById('mcount').textContent = arts.length ? arts.length+' متن' : '';
    if(!arts.length){ body.innerHTML='<div class="empty">محتوایی یافت نشد</div>'; }
    else arts.forEach((m,i)=>{
      const div=document.createElement('div');div.className='item';div.style.cursor='pointer';
      div.innerHTML=`<span class="iico">${m.emoji||'✑'}</span><div><div class="ititle">${m.titre||''}</div><div class="imeta">${m.niveau||''}</div></div>`;
      div.onclick=()=>openMiniArticle(m);
      body.appendChild(div);
    });
  } else if(id==='innerfrench'){
    document.getElementById('mcount').textContent=INNERFRENCH.length+' اپیزود';
    INNERFRENCH.forEach(e=>{
      const a=document.createElement('a');a.className='item';a.href=e.source||'#';a.target='_blank';
      a.innerHTML=`<span class="iico">▶</span><div><div class="ititle">${e.titreFa}</div><div class="imeta">اپیزود ${e.num}</div></div>`;
      body.appendChild(a);
    });
  } else {
    const items=LESSONS.filter(l=>l.category===id);
    document.getElementById('mcount').textContent=items.length+' محتوا';
    if(!items.length){body.innerHTML='<div class="empty">محتوایی یافت نشد</div>';}
    else items.forEach(l=>{
      const a=document.createElement('a');a.className='item';a.href=l.file||'#';
      a.innerHTML=`<span class="iico">${ci.icon||'§'}</span><div><div class="ititle">${l.title}</div><div class="imeta">${l.level||''}</div></div>`;
      body.appendChild(a);
    });
  }
  document.getElementById('overlay').classList.add('open');
}
function openMiniArticle(m){
  // Build article reader
  const reader = document.getElementById('articleReader');
  if(reader){ reader.remove(); }
  const overlay2 = document.createElement('div');
  overlay2.style.cssText='position:fixed;inset:0;background:rgba(31,58,95,.4);z-index:400;display:flex;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(3px)';
  const box = document.createElement('div');
  box.style.cssText='background:#fffdf6;border-radius:20px;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;padding:1.5rem;border:1px solid #d9ceb8;box-shadow:0 20px 60px rgba(31,58,95,.2)';
  const header = `<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.2rem">
    <div>
      <div style="font-size:11px;color:#a8874f;letter-spacing:1px;margin-bottom:4px">${m.niveau||''} ${m.emoji||''}</div>
      <div style="font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:#1f3a5f">${m.titre||''}</div>
    </div>
    <button onclick="this.closest('div[style]').parentElement.remove()" style="width:34px;height:34px;border-radius:50%;border:1px solid #d9ceb8;background:#efe9db;cursor:pointer;font-size:16px;flex-shrink:0;margin-top:4px">✕</button>
  </div>`;
  const paras = (m.paras||[]).map(p=>{
    // Replace ⟦word|translation⟧ with styled spans
    const html = p.replace(/⟦([^|]+)\|([^⟧]+)⟧/g,
      '<span style="border-bottom:1.5px solid #a8874f;cursor:help;color:#1f3a5f" title="$2">$1</span>');
    return `<p style="line-height:2;font-size:15px;color:#2a3f5f;margin-bottom:1rem;direction:ltr;text-align:left">${html}</p>`;
  }).join('');
  box.innerHTML = header + paras;
  overlay2.appendChild(box);
  overlay2.onclick = e=>{ if(e.target===overlay2) overlay2.remove(); };
  document.body.appendChild(overlay2);
}

function closeModal(e){
  if(!e||e.target===document.getElementById('overlay'))
    document.getElementById('overlay').classList.remove('open');
}
</script>
