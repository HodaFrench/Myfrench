<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Français avec Hoda</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Estedad:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Estedad',sans-serif;
  background:#f5f0e8;
  min-height:100vh;direction:rtl;color:#1f3a5f;overflow-x:hidden;
}
body::before{
  content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:repeating-linear-gradient(transparent,transparent 38px,rgba(65,97,138,0.05) 38px,rgba(65,97,138,0.05) 39px);
}
.page{position:relative;z-index:1;max-width:460px;margin:0 auto;padding:1.5rem 1rem 5rem}

/* HEADER */
.header{text-align:center;padding:.8rem 0 1.5rem}
.header h1{
  font-family:'Cormorant Garamond',serif;
  font-size:36px;font-weight:600;color:#1f3a5f;
  letter-spacing:.5px;white-space:nowrap;
}
.header p{font-size:12px;color:#a8874f;margin-top:8px;letter-spacing:2.5px;text-transform:uppercase}

/* AUTH BAR */
.auth-bar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(245,240,232,.95);border-bottom:1px solid #e0d8c8;
  padding:7px 18px;display:flex;align-items:center;justify-content:space-between;
  font-size:12px;color:#a8874f;backdrop-filter:blur(6px);
}
.auth-bar button{
  border:1px solid #d9ceb8;background:transparent;border-radius:8px;
  padding:3px 12px;font-family:'Estedad',sans-serif;font-size:11px;
  color:#a8874f;cursor:pointer;transition:all .2s;
}
.auth-bar button:hover{background:#1f3a5f;color:#fff;border-color:#1f3a5f}
body{padding-top:38px}

/* ROAD WRAP */
.road-wrap{position:relative;width:100%}
svg.road{width:100%;display:block;overflow:visible}

/* NODE CARDS */
.stations{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none}
.node-card{
  position:absolute;pointer-events:all;
  transform:translateY(-50%);
  background:rgba(255,253,246,.92);
  border:1.5px solid #d9ceb8;border-radius:14px;
  padding:.65rem .9rem;cursor:pointer;text-align:center;
  box-shadow:0 6px 22px rgba(31,58,95,.1);
  transition:transform .2s,box-shadow .2s;
  backdrop-filter:blur(4px);
}
.node-card:hover{transform:translateY(-50%) scale(1.06);box-shadow:0 10px 30px rgba(31,58,95,.18)}
.node-card:active{transform:translateY(-50%) scale(.97)}
.nc-icon{font-size:24px;margin-bottom:3px}
.nc-title{font-size:15px;font-weight:600;line-height:1.3}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(31,58,95,.3);z-index:300;
  align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(3px)}
.overlay.open{display:flex}
.modal{background:#f7f3ea;border-radius:20px;width:100%;max-width:440px;
  max-height:86vh;overflow:hidden;display:flex;flex-direction:column;
  border:1px solid #d9ceb8;box-shadow:0 20px 60px rgba(31,58,95,.2)}
.mhead{padding:1.2rem 1.4rem 1rem;border-bottom:1px solid #e8e0ce;
  display:flex;align-items:center;justify-content:space-between}
.mtitle{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600}
.mcount{font-size:12px;color:#a8874f;margin-top:3px}
.mclose{width:34px;height:34px;border-radius:50%;border:1px solid #d9ceb8;
  background:#efe9db;cursor:pointer;font-size:16px;color:#41618a;
  display:flex;align-items:center;justify-content:center;transition:all .2s}
.mclose:hover{background:#1f3a5f;color:#fff;border-color:#1f3a5f}
.mbody{overflow-y:auto;padding:1rem 1.4rem 1.5rem}
.item{display:flex;align-items:flex-start;gap:.8rem;padding:.75rem 0;
  border-bottom:1px solid #efe9db;text-decoration:none;transition:opacity .15s}
.item:last-child{border-bottom:none}
.item:hover{opacity:.65}
.iico{font-size:18px;flex-shrink:0;margin-top:2px;width:24px;text-align:center}
.ititle{font-size:14px;color:#1f3a5f;line-height:1.5;font-weight:500}
.imeta{font-size:11px;color:#a8874f;margin-top:2px}
.empty{text-align:center;padding:2.5rem;font-size:14px;color:#a8874f}
.lib-link{display:block;text-align:center;margin-top:2rem;font-size:13px;
  color:#a8874f;text-decoration:none;letter-spacing:.5px}
.lib-link:hover{color:#1f3a5f}
</style>
</head>
<body>

<div class="auth-bar">
  <span id="_username">...</span>
  <button onclick="_logout()">خروج</button>
</div>

<div class="page">
  <div class="header">
    <h1>Français avec Hoda</h1>
    <p>مسیر یادگیری · از صفر تا روان</p>
  </div>

  <div class="road-wrap" id="roadWrap"></div>

  <a href="library.html" class="lib-link">📚 کتابخانه‌ی کامل ←</a>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="mhead">
      <div><div class="mtitle" id="mtitle"></div><div class="mcount" id="mcount"></div></div>
      <button class="mclose" onclick="closeModal()">✕</button>
    </div>
    <div class="mbody" id="mbody"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const _sb = supabase.createClient(
  'https://ifjsnasoxnalhttzhlpd.supabase.co',
  'sb_publishable_3aBoJ8PEPsrnOpgR_vOG4A_NDfJd6cK'
);
_sb.auth.getSession().then(({data:{session}})=>{
  if(!session){window.location.href='auth.html';return;}
  const u=session.user.email?.split('@')[0]||'';
  const el=document.getElementById('_username');
  if(el) el.textContent='👤 '+u;
});
function _logout(){_sb.auth.signOut().then(()=>window.location.href='auth.html');}
</script>

<script src="data.js"></script>
<script>
const STATIONS=[
  {id:'grammar',    title:'گرامر',         icon:'📐', c:'#1f3a5f', side:'R'},
  {id:'vocab',      title:'واژگان',        icon:'📚', c:'#22618f', side:'L'},
  {id:'miniarticle',title:'مینی‌آرتیکل',   icon:'✍️', c:'#b0506f', side:'R'},
  {id:'innerfrench',title:'InnerFrench',   icon:'🎧', c:'#5a3b88', side:'L'},
  {id:'article',    title:'آرتیکل',        icon:'📰', c:'#2e8b6b', side:'R'},
  {id:'podcast',    title:'پادکست',        icon:'🎙️', c:'#c4502d', side:'L'},
  {id:'culture',    title:'فرهنگ فرانسه',  icon:'🗼', c:'#8a2040', side:'R'},
  {id:'tcf',        title:'آمادگی TCF',    icon:'🎯', c:'#1a4f7a', side:'L'},
  {id:'roulette',   title:'گردونه موضوع',  icon:'🎡', c:'#7a5ba8', side:'R'},
  {id:'phrases',    title:'جملات کاربردی', icon:'💬', c:'#c77d3a', side:'L'},
];
const CAT_LINKS={roulette:'ROULETTE.html',phrases:'PHRASES_utiles.html'};

// French landmark SVGs (simplified, elegant)
function eiffelTower(x,y,h){
  const w=h*0.38, bw=h*0.55;
  return `<g opacity=".18" fill="#1f3a5f">
    <!-- base -->
    <path d="M${x-bw/2} ${y} Q${x-bw/2} ${y-h*0.3} ${x-w/2} ${y-h*0.55} L${x-w/3} ${y-h*0.65} L${x-w/5} ${y-h} L${x+w/5} ${y-h} L${x+w/3} ${y-h*0.65} L${x+w/2} ${y-h*0.55} Q${x+bw/2} ${y-h*0.3} ${x+bw/2} ${y} Z"/>
    <!-- cross beams -->
    <line x1="${x-bw/2}" y1="${y-h*0.28}" x2="${x+bw/2}" y2="${y-h*0.28}" stroke="#1f3a5f" stroke-width="${h*0.025}" fill="none"/>
    <line x1="${x-w/2}" y1="${y-h*0.55}" x2="${x+w/2}" y2="${y-h*0.55}" stroke="#1f3a5f" stroke-width="${h*0.02}" fill="none"/>
    <!-- antenna -->
    <line x1="${x}" y1="${y-h}" x2="${x}" y2="${y-h*1.12}" stroke="#1f3a5f" stroke-width="${h*0.018}" stroke-linecap="round"/>
  </g>`;
}

function arcDeTriomphe(x,y,h){
  const w=h*0.9;
  return `<g opacity=".15" fill="#a8874f">
    <rect x="${x-w/2}" y="${y-h}" width="${w}" height="${h}" rx="2"/>
    <rect x="${x-w/2+w*0.12}" y="${y-h}" width="${w*0.28}" height="${h*0.75}" rx="1" fill="#f5f0e8"/>
    <rect x="${x+w/2-w*0.12-w*0.28}" y="${y-h}" width="${w*0.28}" height="${h*0.75}" rx="1" fill="#f5f0e8"/>
    <path d="M${x-w*0.14} ${y-h*0.75} Q${x} ${y-h*0.95} ${x+w*0.14} ${y-h*0.75}" fill="#f5f0e8"/>
  </g>`;
}

function louvre(x,y,h){
  const w=h*1.4;
  return `<g opacity=".15" fill="#1f3a5f">
    <rect x="${x-w/2}" y="${y-h*0.6}" width="${w}" height="${h*0.6}" rx="2"/>
    <rect x="${x-w*0.18}" y="${y-h}" width="${w*0.36}" height="${h*0.4}" rx="1"/>
    <!-- pyramid -->
    <polygon points="${x},${y-h*1.3} ${x-w*0.22},${y-h} ${x+w*0.22},${y-h}" fill="#a8874f" opacity=".5"/>
    <line x1="${x}" y1="${y-h*1.3}" x2="${x-w*0.22}" y2="${y-h}" stroke="#a8874f" stroke-width="1.5" opacity=".6"/>
    <line x1="${x}" y1="${y-h*1.3}" x2="${x+w*0.22}" y2="${y-h}" stroke="#a8874f" stroke-width="1.5" opacity=".6"/>
  </g>`;
}

function sacreCoeur(x,y,h){
  const w=h*0.7;
  return `<g opacity=".15" fill="#f5f0e8" stroke="#1f3a5f" stroke-width="1">
    <rect x="${x-w/2}" y="${y-h*0.6}" width="${w}" height="${h*0.6}" rx="2"/>
    <path d="M${x-w/2} ${y-h*0.6} Q${x-w/2} ${y-h*0.85} ${x} ${y-h} Q${x+w/2} ${y-h*0.85} ${x+w/2} ${y-h*0.6}"/>
    <circle cx="${x}" cy="${y-h*1.05}" r="${h*0.1}" fill="#1f3a5f" opacity=".5"/>
    <circle cx="${x-w*0.22}" cy="${y-h*0.72}" r="${h*0.08}"/>
    <circle cx="${x+w*0.22}" cy="${y-h*0.72}" r="${h*0.08}"/>
  </g>`;
}

function buildRoad(){
  const wrap=document.getElementById('roadWrap');
  const W=wrap.clientWidth||380;
  const CX=W/2;
  const AMP=W*0.14;
  const N=STATIONS.length;
  const STEP=115;
  const VBH=N*STEP+80;
  const STROKE=Math.max(20,W*0.058);
  const CARD_W=Math.min(128,W*0.33);

  // Road path
  let d='';
  for(let y=25;y<=VBH-25;y+=6){
    const x=CX+AMP*Math.sin((y-25)/(STEP*1.15));
    d+=(y===25?'M':'L')+`${x.toFixed(1)} ${y} `;
  }

  // Landmarks at specific Y positions
  const LH=VBH/N;
  const landmarks=
    eiffelTower(W*0.12, LH*1.5, W*0.22)+
    arcDeTriomphe(W*0.86, LH*3.2, W*0.12)+
    louvre(W*0.1, LH*5.5, W*0.1)+
    sacreCoeur(W*0.88, LH*7.2, W*0.12)+
    eiffelTower(W*0.88, LH*9.2, W*0.14);

  // Subtle cobblestone hint (dots along road sides)
  let cobbles='';
  for(let y=60;y<VBH-40;y+=28){
    const rx=CX+AMP*Math.sin((y-25)/(STEP*1.15));
    const off=STROKE/2+8;
    cobbles+=`<circle cx="${(rx-off).toFixed(1)}" cy="${y}" r="1.8" fill="#c8bfaa" opacity=".4"/>`;
    cobbles+=`<circle cx="${(rx+off).toFixed(1)}" cy="${y}" r="1.8" fill="#c8bfaa" opacity=".4"/>`;
  }

  // French flag color stripes at start (subtle)
  const startX=CX+AMP*Math.sin(0);
  const flagDecor=`
    <circle cx="${startX.toFixed(1)}" cy="25" r="${STROKE*0.6}" fill="#1f3a5f"/>
    <text x="${startX.toFixed(1)}" y="30" text-anchor="middle" fill="#f5f0e8" font-size="13" font-family="Arial">🇫🇷</text>
  `;

  const svg=`<svg class="road" viewBox="0 0 ${W} ${VBH}" xmlns="http://www.w3.org/2000/svg">
    ${landmarks}
    ${cobbles}
    <path d="${d}" stroke="#d4c9b0" stroke-width="${STROKE}" stroke-linecap="round" fill="none"/>
    <path d="${d}" stroke="#e8e0cc" stroke-width="${STROKE-6}" stroke-linecap="round" fill="none" opacity=".5"/>
    <path d="${d}" stroke="#fff" stroke-width="2" stroke-dasharray="10 9" stroke-linecap="round" fill="none" opacity=".7"/>
    ${flagDecor}
  </svg>`;

  const stDiv=document.createElement('div');
  stDiv.className='stations';
  stDiv.style.height=VBH+'px';

  STATIONS.forEach((s,i)=>{
    const y=30+i*STEP+STEP/2;
    const top=(y/VBH*100).toFixed(2);
    const isR=s.side==='R';
    const roadX=CX+AMP*Math.sin((y-25)/(STEP*1.15));
    const leftPx=isR?roadX+STROKE/2+8:null;
    const rightPx=!isR?W-(roadX-STROKE/2-8):null;

    const card=document.createElement('div');
    card.className='node-card';
    card.style.cssText=`top:${top}%;${isR?`left:${((leftPx/W)*100).toFixed(1)}%`:`right:${((rightPx/W)*100).toFixed(1)}%`};width:${CARD_W}px;border-color:${s.c};animation-delay:${i*0.06}s`;
    card.innerHTML=`<div class="nc-icon">${s.icon}</div><div class="nc-title" style="color:${s.c}">${s.title}</div>`;
    card.onclick=()=>openCat(s.id);
    stDiv.appendChild(card);
  });

  wrap.innerHTML=svg;
  wrap.appendChild(stDiv);
}

buildRoad();
window.addEventListener('resize',buildRoad);

// MODAL
function catInfo(id){return CATEGORIES.find(c=>c.id===id)||{label:id,icon:'§',color:'#1f3a5f'};}
function openCat(id){
  if(CAT_LINKS[id]){window.location.href=CAT_LINKS[id];return;}
  const ci=catInfo(id);
  const s=STATIONS.find(x=>x.id===id)||{};
  document.getElementById('mtitle').textContent=s.title||ci.label;
  document.getElementById('mtitle').style.color=s.c||ci.color||'#1f3a5f';
  const body=document.getElementById('mbody');
  body.innerHTML='';
  let items=[];
  if(id==='miniarticle'&&typeof MINIARTICLES!=='undefined'){
    document.getElementById('mcount').textContent=MINIARTICLES.length+' متن';
    MINIARTICLES.forEach(m=>{
      const a=document.createElement('a');a.className='item';a.href='library.html#cat=miniarticle';
      a.innerHTML=`<span class="iico">${m.emoji||'✑'}</span><div><div class="ititle">${m.titre}</div><div class="imeta">${m.niveau||''}</div></div>`;
      body.appendChild(a);
    });
  } else if(id==='innerfrench'&&typeof INNERFRENCH!=='undefined'){
    document.getElementById('mcount').textContent=INNERFRENCH.length+' اپیزود';
    INNERFRENCH.forEach(e=>{
      const a=document.createElement('a');a.className='item';a.href=e.source||'#';a.target='_blank';
      a.innerHTML=`<span class="iico">▶</span><div><div class="ititle">${e.titreFa}</div><div class="imeta">اپیزود ${e.num}</div></div>`;
      body.appendChild(a);
    });
  } else {
    if(typeof LESSONS!=='undefined') items=LESSONS.filter(l=>l.category===id);
    document.getElementById('mcount').textContent=items.length+' محتوا';
    if(!items.length){body.innerHTML='<div class="empty">محتوایی یافت نشد</div>';}
    else items.forEach(l=>{
      const a=document.createElement('a');a.className='item';a.href=l.file||'#';
      a.innerHTML=`<span class="iico">${s.icon||ci.icon||'§'}</span><div><div class="ititle">${l.title}</div><div class="imeta">${l.level||''}</div></div>`;
      body.appendChild(a);
    });
  }
  document.getElementById('overlay').classList.add('open');
}
function closeModal(e){
  if(!e||e.target===document.getElementById('overlay'))
    document.getElementById('overlay').classList.remove('open');
}
</script>
</body>
</html>
