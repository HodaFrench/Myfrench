<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Français avec Hoda — ورود</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Estedad:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Estedad',sans-serif;direction:rtl;overflow:hidden;height:100vh}

/* iframe — صفحه اصلی به عنوان پس‌زمینه */
.bg-frame{
  position:fixed;inset:0;z-index:0;
  width:100%;height:100%;
  border:none;
  pointer-events:none;
  filter:blur(0px);
}

/* لایه کم‌رنگ روی iframe */
.overlay{
  position:fixed;inset:0;z-index:1;
  background:rgba(245,240,232,.45);
}

/* فرم ورود */
.auth{
  position:fixed;
  z-index:10;
  top:50%;
  right:4%;
  transform:translateY(-50%);
  width:330px;
}
.card{
  background:rgba(255,253,246,.9);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(217,206,184,.6);
  border-radius:20px;
  padding:2rem 1.8rem;
  box-shadow:0 24px 80px rgba(31,58,95,.15),0 0 0 1px rgba(255,255,255,.5);
}
.logo{text-align:center;margin-bottom:1.4rem}
.logo .flag{font-size:24px;margin-bottom:6px}
.logo h1{
  font-family:'Cormorant Garamond',serif;
  font-size:22px;font-weight:600;
  color:#1e3a5f;
}
.logo p{font-size:10.5px;color:#b07a4a;letter-spacing:1.5px;margin-top:3px}

.tabs{
  display:flex;background:rgba(240,235,224,.8);
  border-radius:10px;padding:3px;
  margin-bottom:1.2rem;gap:3px;
}
.tab{flex:1;padding:.48rem;border:none;border-radius:8px;background:transparent;
  cursor:pointer;font-family:'Estedad',sans-serif;font-size:13px;
  font-weight:500;color:#a8874f;transition:all .2s}
.tab.active{background:rgba(255,253,246,.95);color:#1e3a5f;
  box-shadow:0 1px 6px rgba(31,58,95,.1);font-weight:600}

.form{display:flex;flex-direction:column;gap:.65rem}
.field label{display:block;font-size:11.5px;font-weight:500;color:#1e3a5f;margin-bottom:3px}
.field input{
  width:100%;padding:.62rem .9rem;
  border:1.5px solid rgba(217,206,184,.7);border-radius:10px;
  background:rgba(255,255,255,.8);
  font-family:'Estedad',sans-serif;font-size:14px;color:#1e3a5f;
  direction:ltr;text-align:left;transition:all .2s;
}
.field input:focus{outline:none;border-color:#1e3a5f;background:#fff}
.field input::placeholder{color:#c4b9a8;font-size:13px}

.btn{
  margin-top:.3rem;padding:.7rem;
  background:#1e3a5f;color:#f5f0e8;border:none;
  border-radius:10px;font-family:'Estedad',sans-serif;
  font-size:14px;font-weight:600;cursor:pointer;
  transition:background .2s;width:100%;
}
.btn:hover{background:#2a4f7f}
.btn:disabled{background:#a8b8c8;cursor:not-allowed}

.msg{font-size:12px;padding:.5rem;border-radius:8px;display:none;line-height:1.5;text-align:center;margin-top:.2rem}
.msg.error{background:#fdf0f0;color:#c0392b;border:1px solid #f5c6c6}
.msg.success{background:#f0fdf4;color:#2e7d52;border:1px solid #b7e4c7}
.msg.show{display:block}

.confirm-box{display:none;text-align:center;padding:.9rem;
  background:#fff8e8;border:1px solid #e8d5a0;border-radius:12px;margin-top:.3rem}
.confirm-box.show{display:block}
.confirm-box .icon{font-size:26px;margin-bottom:.3rem}
.confirm-box h3{font-size:13px;color:#1e3a5f;font-weight:700;margin-bottom:.3rem}
.confirm-box p{font-size:11px;color:#6a5a3a;line-height:1.8}
.confirm-box .em{font-weight:700;color:#b07a4a}
.hint{font-size:10.5px;color:#b0a090;text-align:center;margin-top:.3rem}

@media(max-width:700px){
  .auth{
    top:auto;right:auto;
    bottom:0;left:0;right:0;
    transform:none;
    width:100%;
  }
  .card{
    border-radius:20px 20px 0 0;
    padding:1.5rem 1.5rem 2rem;
  }
}
</style>
</head>
<body>

<!-- صفحه اصلی به عنوان پس‌زمینه -->
<iframe class="bg-frame" src="index.html" scrolling="no" tabindex="-1"></iframe>
<div class="overlay"></div>

<!-- فرم ورود -->
<div class="auth">
<div class="card">
  <div class="logo">
    <div class="flag">🇫🇷</div>
    <h1>Français avec Hoda</h1>
    <p>وارد شو و یادگیری رو شروع کن</p>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('login')">ورود</button>
    <button class="tab" onclick="showTab('signup')">ثبت‌نام رایگان</button>
  </div>
  <div id="loginForm" class="form">
    <div class="field"><label>ایمیل</label>
      <input type="email" id="loginEmail" placeholder="email@example.com" autocomplete="email"></div>
    <div class="field"><label>رمز عبور</label>
      <input type="password" id="loginPass" placeholder="••••••" autocomplete="current-password"></div>
    <div class="msg" id="loginMsg"></div>
    <button class="btn" id="loginBtn" onclick="doLogin()">ورود به سایت ←</button>
    <p class="hint">حساب ندارید؟ روی «ثبت‌نام رایگان» کلیک کنید</p>
  </div>
  <div id="signupForm" class="form" style="display:none">
    <div class="field"><label>ایمیل</label>
      <input type="email" id="signupEmail" placeholder="email@example.com" autocomplete="email"></div>
    <div class="field"><label>رمز عبور</label>
      <input type="password" id="signupPass" placeholder="حداقل ۶ کاراکتر" autocomplete="new-password"></div>
    <div class="field"><label>تکرار رمز عبور</label>
      <input type="password" id="signupPass2" placeholder="••••••" autocomplete="new-password"></div>
    <div class="msg" id="signupMsg"></div>
    <div class="confirm-box" id="confirmBox">
      <div class="icon">📧</div>
      <h3>ایمیل تأیید فرستاده شد!</h3>
      <p>به <span class="em" id="confirmedEmail"></span> ایمیل فرستادیم.<br>
      روی لینک کلیک کن تا حسابت فعال بشه.<br>
      📂 پوشه <b>Spam</b> رو هم چک کن.</p>
    </div>
    <button class="btn" id="signupBtn" onclick="doSignup()">ساخت حساب رایگان ←</button>
    <p class="hint">قبلاً ثبت‌نام کردید؟ روی «ورود» کلیک کنید</p>
  </div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb=supabase.createClient('https://ifjsnasoxnalhttzhlpd.supabase.co','sb_publishable_3aBoJ8PEPsrnOpgR_vOG4A_NDfJd6cK');
sb.auth.getSession().then(({data:{session}})=>{if(session)window.location.href='index.html';});
function showTab(t){
  document.getElementById('loginForm').style.display=t==='login'?'flex':'none';
  document.getElementById('signupForm').style.display=t==='signup'?'flex':'none';
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',(t==='login'&&i===0)||(t==='signup'&&i===1)));
}
function showMsg(id,txt,type){const el=document.getElementById(id);el.textContent=txt;el.className='msg '+type+' show';}
function setLoading(id,on){const b=document.getElementById(id);b.disabled=on;b.textContent=on?'...':(id==='loginBtn'?'ورود به سایت ←':'ساخت حساب رایگان ←');}
async function doSignup(){
  const email=document.getElementById('signupEmail').value.trim();
  const pass=document.getElementById('signupPass').value;
  const pass2=document.getElementById('signupPass2').value;
  if(!email||!pass)return showMsg('signupMsg','همه فیلدها را پر کنید','error');
  if(pass.length<6)return showMsg('signupMsg','رمز عبور باید حداقل ۶ کاراکتر باشد','error');
  if(pass!==pass2)return showMsg('signupMsg','رمزهای عبور یکسان نیستند','error');
  setLoading('signupBtn',true);
  const {error}=await sb.auth.signUp({email,password:pass});
  setLoading('signupBtn',false);
  if(error)return showMsg('signupMsg',error.message,'error');
  document.getElementById('confirmedEmail').textContent=email;
  document.getElementById('confirmBox').classList.add('show');
  document.getElementById('signupBtn').style.display='none';
}
async function doLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const pass=document.getElementById('loginPass').value;
  if(!email||!pass)return showMsg('loginMsg','همه فیلدها را پر کنید','error');
  setLoading('loginBtn',true);
  const {error}=await sb.auth.signInWithPassword({email,password:pass});
  setLoading('loginBtn',false);
  if(error){
    if(error.message.includes('Email not confirmed'))return showMsg('loginMsg','ایمیلت رو تأیید نکردی! 📧','error');
    return showMsg('loginMsg','ایمیل یا رمز عبور اشتباه است','error');
  }
  window.location.href='index.html';
}
document.addEventListener('keydown',e=>{if(e.key==='Enter'){if(document.getElementById('loginForm').style.display!=='none')doLogin();else doSignup();}});
</script>
</body>
</html>
