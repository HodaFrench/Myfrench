<style>

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Estedad',sans-serif;background:#f7f3ea;min-height:100vh;direction:rtl;color:#1f3a5f}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:repeating-linear-gradient(transparent,transparent 31px,rgba(65,97,138,0.07) 31px,rgba(65,97,138,0.07) 32px)}
.page{position:relative;z-index:1;max-width:430px;margin:0 auto;padding:1.5rem 1rem 3rem}
.top{text-align:center;padding:.5rem 0 1rem}
.top .back{display:inline-block;font-size:12px;color:#a8874f;text-decoration:none;margin-bottom:1rem}
.top .back:hover{color:#1f3a5f}
.top h1{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:600;color:#1f3a5f;letter-spacing:.5px;white-space:nowrap}
.top p{font-size:14px;color:#a8874f;margin-top:10px;letter-spacing:2px}

/* ROAD + STATIONS */
.road-wrap{position:relative;max-width:380px;margin:1rem auto 0}
svg.road{width:100%;display:block}
.stations{position:absolute;inset:0}

.node-card{position:absolute;transform:translateY(-50%);
  background:#fbf8f1;border:1.5px solid #d9ceb8;border-radius:14px;
  padding:.7rem .8rem;cursor:pointer;text-align:center;
  box-shadow:0 4px 14px rgba(31,58,95,.08);transition:transform .15s,box-shadow .15s}
.node-card:hover{transform:translateY(-50%) scale(1.04);box-shadow:0 8px 20px rgba(31,58,95,.16)}
.nc-title{font-size:16px;font-weight:600;line-height:1.35}
.nc-count{font-size:12px;color:#a8874f;margin-top:3px;line-height:1.3}

.milestone{position:absolute;left:50%;transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-radius:50%;flex-shrink:0;box-shadow:0 4px 12px rgba(31,58,95,.18)}
.ms-main{width:56px;height:56px;background:#1f3a5f;color:#f7f3ea;font-size:11px;font-weight:600}
.ms-mid{width:52px;height:52px;background:#fbf8f1;border:2.5px solid #1f3a5f;color:#1f3a5f;font-size:12px;font-weight:700}
.ms-b2{width:52px;height:52px;background:#fbf8f1;border:2.5px solid #a8874f;color:#a8874f;font-size:12px;font-weight:700}
.ms-tcf{width:56px;height:56px;background:#1f3a5f;color:#f7f3ea;font-size:11px;font-weight:600}
.ms-end{width:56px;height:56px;background:#a8874f;color:#f7f3ea;font-size:18px}
.ms-label{font-size:9px;margin-top:2px;opacity:.8}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(31,58,95,.3);z-index:200;align-items:center;justify-content:center;padding:1rem}
.overlay.open{display:flex}
.modal{background:#f7f3ea;border-radius:18px;width:100%;max-width:420px;max-height:84vh;overflow:hidden;display:flex;flex-direction:column;border:1px solid #d9ceb8}
.mhead{padding:1.2rem 1.4rem 1rem;border-bottom:1px solid #e8e0ce;display:flex;align-items:center;justify-content:space-between}
.mtitle{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600}
.mcount{font-size:11px;color:#a8874f;margin-top:3px}
.mclose{width:30px;height:30px;border-radius:50%;border:1px solid #d9ceb8;background:#efe9db;cursor:pointer;font-size:14px;color:#41618a;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mbody{overflow-y:auto;padding:1rem 1.4rem 1.5rem}
.item{display:flex;align-items:flex-start;gap:.7rem;padding:.65rem 0;border-bottom:1px solid #efe9db;text-decoration:none;transition:opacity .15s}
.item:last-child{border-bottom:none}
.item:hover{opacity:.65}
.iico{font-size:16px;flex-shrink:0;margin-top:2px;width:22px;text-align:center}
.ititle{font-size:13px;color:#1f3a5f;line-height:1.45;font-weight:500}
.imeta{font-size:11px;color:#a8874f;margin-top:2px}
.empty{text-align:center;padding:2rem;font-size:13px;color:#a8874f}

        /* Auth bar */
        .auth-bar{
          position:fixed;top:0;left:0;right:0;z-index:100;
          background:#fffdf6;border-bottom:1px solid #e8e0ce;
          padding:8px 20px;display:flex;align-items:center;justify-content:space-between;
          font-size:12px;color:#a8874f;
          box-shadow:0 2px 8px rgba(31,58,95,.06);
        }
        .auth-bar button{
          border:1px solid #d9ceb8;background:transparent;
          border-radius:8px;padding:4px 12px;
          font-family:'Estedad',sans-serif;font-size:11px;
          color:#a8874f;cursor:pointer;transition:all .2s;
        }
        .auth-bar button:hover{background:#1f3a5f;color:#fff;border-color:#1f3a5f}

        .auth-bar{

        }
        .auth-bar button:hover{background:#1f3a5f;color:#fff;border-color:#1f3a5f}

.auth-tab{flex:1;padding:.48rem;border:none;border-radius:8px;background:transparent;cursor:pointer;font-family:'Estedad',sans-serif;font-size:13px;font-weight:500;color:#a8874f;transition:all .2s}
.auth-tab.active{background:rgba(255,253,246,.95);color:#1e3a5f;box-shadow:0 1px 6px rgba(31,58,95,.1);font-weight:600}
.auth-form{display:flex;flex-direction:column;gap:.65rem}
.auth-field label{display:block;font-size:11.5px;font-weight:500;color:#1e3a5f;margin-bottom:3px}
.auth-field input{width:100%;padding:.65rem .9rem;border:1.5px solid rgba(217,206,184,.7);border-radius:10px;background:rgba(255,255,255,.85);font-family:'Estedad',sans-serif;font-size:14px;color:#1e3a5f;direction:ltr;text-align:left;transition:all .2s}
.auth-field input:focus{outline:none;border-color:#1e3a5f;background:#fff}
.auth-field input::placeholder{color:#c4b9a8}
.auth-btn{margin-top:.3rem;padding:.7rem;background:#1e3a5f;color:#f5f0e8;border:none;border-radius:10px;font-family:'Estedad',sans-serif;font-size:14px;font-weight:600;cursor:pointer;width:100%;transition:background .2s}
.auth-btn:hover{background:#2a4f7f}
.auth-btn:disabled{background:#a8b8c8;cursor:not-allowed}
.auth-msg{font-size:12px;padding:.5rem;border-radius:8px;display:none;line-height:1.5;text-align:center;margin-top:.2rem}
.auth-msg.error{background:#fdf0f0;color:#c0392b;border:1px solid #f5c6c6}
.auth-msg.show{display:block}
.auth-confirm{display:none;text-align:center;padding:.9rem;background:#fff8e8;border:1px solid #e8d5a0;border-radius:12px;margin-top:.3rem}
.auth-confirm.show{display:block}
.auth-confirm .icon{font-size:26px;margin-bottom:.3rem}
.auth-confirm h3{font-size:13px;color:#1e3a5f;font-weight:700;margin-bottom:.3rem}
.auth-confirm p{font-size:11px;color:#6a5a3a;line-height:1.8}
.auth-confirm .em{font-weight:700;color:#b07a4a}
.auth-hint{font-size:10.5px;color:#b0a090;text-align:center;margin-top:.3rem}
</style>

<script>
const sb=supabase.createClient('https://ifjsnasoxnalhttzhlpd.supabase.co','sb_publishable_3aBoJ8PEPsrnOpgR_vOG4A_NDfJd6cK');
sb.auth.getSession().then(({data:{session}})=>{if(session)window.location.href='index.html';});
// Build road (same as index.html)
if(typeof buildRoad==='function')buildRoad();
function showTab(t){document.getElementById('loginForm').style.display=t==='login'?'flex':'none';document.getElementById('signupForm').style.display=t==='signup'?'flex':'none';document.querySelectorAll('.auth-tab').forEach((el,i)=>el.classList.toggle('active',(t==='login'&&i===0)||(t==='signup'&&i===1)));}
function showMsg(id,txt){const el=document.getElementById(id);el.textContent=txt;el.className='auth-msg error show';}
function setLoading(id,on){const b=document.getElementById(id);b.disabled=on;b.textContent=on?'...':(id==='loginBtn'?'ورود به سایت ←':'ساخت حساب رایگان ←');}
async function doSignup(){const email=document.getElementById('signupEmail').value.trim();const pass=document.getElementById('signupPass').value;const pass2=document.getElementById('signupPass2').value;if(!email||!pass)return showMsg('signupMsg','همه فیلدها را پر کنید');if(pass.length<6)return showMsg('signupMsg','رمز عبور باید حداقل ۶ کاراکتر باشد');if(pass!==pass2)return showMsg('signupMsg','رمزهای عبور یکسان نیستند');setLoading('signupBtn',true);const {error}=await sb.auth.signUp({email,password:pass});setLoading('signupBtn',false);if(error)return showMsg('signupMsg',error.message);document.getElementById('confirmedEmail').textContent=email;document.getElementById('confirmBox').classList.add('show');document.getElementById('signupBtn').style.display='none';}
async function doLogin(){const email=document.getElementById('loginEmail').value.trim();const pass=document.getElementById('loginPass').value;if(!email||!pass)return showMsg('loginMsg','همه فیلدها را پر کنید');setLoading('loginBtn',true);const {error}=await sb.auth.signInWithPassword({email,password:pass});setLoading('loginBtn',false);if(error){if(error.message.includes('Email not confirmed'))return showMsg('loginMsg','ایمیلت رو تأیید نکردی! 📧');return showMsg('loginMsg','ایمیل یا رمز عبور اشتباه است');}window.location.href='index.html';}
document.addEventListener('keydown',e=>{if(e.key==='Enter'){if(document.getElementById('loginForm').style.display!=='none')doLogin();else doSignup();}});
</script>
