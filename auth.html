<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ورود — Français avec Hoda</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Estedad:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Estedad',sans-serif;
  background:#f7f3ea;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:1.5rem;direction:rtl;
}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:repeating-linear-gradient(transparent,transparent 35px,rgba(65,97,138,0.06) 35px,rgba(65,97,138,0.06) 36px);}
.card{
  position:relative;z-index:1;
  background:#fffdf6;border:1px solid #d9ceb8;border-radius:24px;
  padding:2.5rem 2rem;width:100%;max-width:400px;
  box-shadow:0 20px 60px rgba(31,58,95,.1);
}
.logo{text-align:center;margin-bottom:2rem}
.logo h1{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;color:#1f3a5f;white-space:nowrap}
.logo p{font-size:12px;color:#a8874f;margin-top:6px;letter-spacing:2px}
.tabs{display:flex;background:#f0ebe0;border-radius:12px;padding:4px;margin-bottom:2rem;gap:4px}
.tab{flex:1;padding:.6rem;border:none;border-radius:9px;background:transparent;cursor:pointer;
  font-family:'Estedad',sans-serif;font-size:14px;font-weight:500;color:#a8874f;transition:all .2s}
.tab.active{background:#fff;color:#1f3a5f;box-shadow:0 2px 8px rgba(31,58,95,.1)}
.form{display:flex;flex-direction:column;gap:1rem}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:13px;font-weight:500;color:#1f3a5f}
.field input{
  padding:.8rem 1rem;border:1.5px solid #d9ceb8;border-radius:12px;
  background:#fff;font-family:'Estedad',sans-serif;font-size:15px;color:#1f3a5f;
  transition:border-color .2s;direction:ltr;text-align:left;
}
.field input:focus{outline:none;border-color:#1f3a5f}
.field input::placeholder{color:#c9c0b0}
.btn{
  margin-top:.5rem;padding:.9rem;background:#1f3a5f;color:#f7f3ea;
  border:none;border-radius:12px;font-family:'Estedad',sans-serif;
  font-size:16px;font-weight:600;cursor:pointer;transition:all .2s;
}
.btn:hover{background:#2a4f7f}
.btn:disabled{background:#a8b8c8;cursor:not-allowed}
.msg{text-align:center;font-size:13px;padding:.7rem;border-radius:10px;display:none}
.msg.error{background:#fdf0f0;color:#c0392b;border:1px solid #f5c6c6}
.msg.success{background:#f0fdf4;color:#2e7d52;border:1px solid #b7e4c7}
.msg.show{display:block}
.hint{font-size:11px;color:#b0a090;text-align:center;margin-top:.5rem}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>Français avec Hoda</h1>
    <p>یادگیری فرانسه به روش درست</p>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('login')">ورود</button>
    <button class="tab" onclick="showTab('signup')">ثبت‌نام</button>
  </div>

  <!-- LOGIN -->
  <div id="loginForm" class="form">
    <div class="field">
      <label>ایمیل</label>
      <input type="email" id="loginEmail" placeholder="email@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label>رمز عبور</label>
      <input type="password" id="loginPass" placeholder="رمز عبور" autocomplete="current-password">
    </div>
    <div class="msg" id="loginMsg"></div>
    <button class="btn" id="loginBtn" onclick="doLogin()">ورود</button>
    <p class="hint">حساب ندارید؟ روی «ثبت‌نام» کلیک کنید</p>
  </div>

  <!-- SIGNUP -->
  <div id="signupForm" class="form" style="display:none">
    <div class="field">
      <label>ایمیل</label>
      <input type="email" id="signupEmail" placeholder="email@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label>رمز عبور</label>
      <input type="password" id="signupPass" placeholder="حداقل ۶ کاراکتر" autocomplete="new-password">
    </div>
    <div class="field">
      <label>تکرار رمز عبور</label>
      <input type="password" id="signupPass2" placeholder="رمز عبور را دوباره وارد کنید" autocomplete="new-password">
    </div>
    <div class="msg" id="signupMsg"></div>
    <button class="btn" id="signupBtn" onclick="doSignup()">ثبت‌نام</button>
    <p class="hint">قبلاً ثبت‌نام کردید؟ روی «ورود» کلیک کنید</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb = supabase.createClient(
  'https://ifjsnasoxnalhttzhlpd.supabase.co',
  'sb_publishable_3aBoJ8PEPsrnOpgR_vOG4A_NDfJd6cK'
);

sb.auth.getSession().then(({data:{session}})=>{
  if(session) window.location.href='index.html';
});

function showTab(tab){
  document.getElementById('loginForm').style.display = tab==='login'?'flex':'none';
  document.getElementById('signupForm').style.display = tab==='signup'?'flex':'none';
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active',(tab==='login'&&i===0)||(tab==='signup'&&i===1));
  });
}

function showMsg(id,text,type){
  const el=document.getElementById(id);
  el.textContent=text;el.className='msg '+type+' show';
}
function setLoading(id,on){
  const b=document.getElementById(id);
  b.disabled=on;
  b.textContent=on?'...':(id==='loginBtn'?'ورود':'ثبت‌نام');
}

async function doSignup(){
  const email=document.getElementById('signupEmail').value.trim();
  const pass=document.getElementById('signupPass').value;
  const pass2=document.getElementById('signupPass2').value;
  if(!email||!pass) return showMsg('signupMsg','همه فیلدها را پر کنید','error');
  if(pass.length<6) return showMsg('signupMsg','رمز عبور باید حداقل ۶ کاراکتر باشد','error');
  if(pass!==pass2) return showMsg('signupMsg','رمزهای عبور یکسان نیستند','error');
  setLoading('signupBtn',true);
  const {data, error}=await sb.auth.signUp({email,password:pass});
  setLoading('signupBtn',false);
  if(error) return showMsg('signupMsg',error.message,'error');
  // Auto login after signup (no email confirmation needed)
  if(data.session){
    window.location.href='index.html';
  } else {
    // Try signing in immediately
    const {error:err2}=await sb.auth.signInWithPassword({email,password:pass});
    if(err2) return showMsg('signupMsg','ثبت‌نام شد! لطفاً وارد شوید.','success');
    window.location.href='index.html';
  }
}

async function doLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const pass=document.getElementById('loginPass').value;
  if(!email||!pass) return showMsg('loginMsg','همه فیلدها را پر کنید','error');
  setLoading('loginBtn',true);
  const {error}=await sb.auth.signInWithPassword({email,password:pass});
  setLoading('loginBtn',false);
  if(error) return showMsg('loginMsg','ایمیل یا رمز عبور اشتباه است','error');
  window.location.href='index.html';
}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    if(document.getElementById('loginForm').style.display!=='none') doLogin();
    else doSignup();
  }
});
</script>
</body>
</html>
