<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Français avec Hoda — ورود</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Estedad:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Estedad',sans-serif;
  min-height:100vh;direction:rtl;
  background:#f5f0e8;
  background-image:repeating-linear-gradient(transparent,transparent 35px,rgba(65,97,138,0.06) 35px,rgba(65,97,138,0.06) 36px);
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}

/* جاده پس‌زمینه */
.bg-road{
  position:fixed;inset:0;z-index:0;
  opacity:.28;
}
.bg-road svg{width:100%;height:100%;display:block}

/* فرم وسط */
.card-wrap{
  position:relative;z-index:1;
  width:100%;max-width:400px;
  margin:1.5rem;
}
.glass{
  background:rgba(255,253,246,.94);
  backdrop-filter:blur(10px);
  border:1px solid rgba(217,206,184,.7);
  border-radius:24px;
  padding:2.2rem 2rem;
  box-shadow:0 24px 64px rgba(31,58,95,.14),0 0 0 1px rgba(255,255,255,.6);
}
.logo{text-align:center;margin-bottom:1.6rem}
.logo .flag{font-size:26px;margin-bottom:6px}
.logo h1{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:#1f3a5f;white-space:nowrap}
.logo p{font-size:11px;color:#a8874f;margin-top:5px;letter-spacing:2px}
.tabs{display:flex;background:rgba(240,235,224,.9);border-radius:12px;padding:4px;margin-bottom:1.4rem;gap:4px}
.tab{flex:1;padding:.55rem;border:none;border-radius:9px;background:transparent;cursor:pointer;font-family:'Estedad',sans-serif;font-size:14px;font-weight:500;color:#a8874f;transition:all .2s}
.tab.active{background:rgba(255,253,246,.95);color:#1f3a5f;box-shadow:0 2px 8px rgba(31,58,95,.1)}
.form{display:flex;flex-direction:column;gap:.8rem}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:12.5px;font-weight:500;color:#1f3a5f}
.field input{padding:.72rem 1rem;border:1.5px solid rgba(217,206,184,.8);border-radius:12px;background:rgba(255,255,255,.85);font-family:'Estedad',sans-serif;font-size:15px;color:#1f3a5f;transition:border-color .2s;direction:ltr;text-align:left}
.field input:focus{outline:none;border-color:#1f3a5f;background:#fff}
.field input::placeholder{color:#c9c0b0}
.btn{margin-top:.4rem;padding:.82rem;background:#1f3a5f;color:#f7f3ea;border:none;border-radius:12px;font-family:'Estedad',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s}
.btn:hover{background:#2a4f7f}
.btn:disabled{background:#a8b8c8;cursor:not-allowed}
.msg{text-align:center;font-size:13px;padding:.65rem;border-radius:10px;display:none;line-height:1.6}
.msg.error{background:#fdf0f0;color:#c0392b;border:1px solid #f5c6c6}
.msg.success{background:#f0fdf4;color:#2e7d52;border:1px solid #b7e4c7}
.msg.show{display:block}
.confirm-box{display:none;text-align:center;padding:1.1rem;background:#fff8e8;border:1px solid #e8d5a0;border-radius:14px;margin-top:.4rem}
.confirm-box.show{display:block}
.confirm-box .icon{font-size:30px;margin-bottom:.4rem}
.confirm-box h3{font-size:14px;color:#1f3a5f;margin-bottom:.4rem;font-weight:700}
.confirm-box p{font-size:12px;color:#6a5a3a;line-height:1.8}
.confirm-box .em{font-weight:700;color:#a8874f}
.hint{font-size:11px;color:#b0a090;text-align:center;margin-top:.4rem}
</style>
</head>

<!-- فرم ورود -->
<div class="card-wrap">
<div class="glass">
  <div class="logo">
    <div class="flag">🇫🇷</div>
    <h1>Français avec Hoda</h1>
    <p>وارد شو و شروع کن</p>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('login')">ورود</button>
    <button class="tab" onclick="showTab('signup')">ثبت‌نام رایگان</button>
  </div>
  <div id="loginForm" class="form">
    <div class="field"><label>ایمیل</label>
      <input type="email" id="loginEmail" placeholder="email@example.com" autocomplete="email"></div>
    <div class="field"><label>رمز عبور</label>
      <input type="password" id="loginPass" placeholder="رمز عبور" autocomplete="current-password"></div>
    <div class="msg" id="loginMsg"></div>
    <button class="btn" id="loginBtn" onclick="doLogin()">ورود به سایت ←</button>
    <p class="hint">حساب ندارید؟ روی «ثبت‌نام رایگان» کلیک کنید</p>
  </div>
  <div id="signupForm" class="form" style="display:none">
    <div class="field"><label>ایمیل</label>
      <input type="email" id="signupEmail" placeholder="email@example.com" autocomplete="email"></div>
    <div class="field"><label>رمز عبور</label>
      <input type="password" id="signupPass" placeholder="حداقل ۶ کاراکتر" autocomplete="new-password"></div>
    <div class="field"><label>تکرار رمز عبور</label>
      <input type="password" id="signupPass2" placeholder="رمز عبور را دوباره وارد کنید" autocomplete="new-password"></div>
    <div class="msg" id="signupMsg"></div>
    <div class="confirm-box" id="confirmBox">
      <div class="icon">📧</div>
      <h3>ایمیل تأیید فرستاده شد!</h3>
      <p>به <span class="em" id="confirmedEmail"></span> ایمیل فرستادیم.<br>
      روی لینک کلیک کن تا حسابت فعال بشه.<br>
      📂 پوشه <b>Spam</b> رو هم چک کن.</p>
    </div>
    <button class="btn" id="signupBtn" onclick="doSignup()">ساخت حساب رایگان</button>
    <p class="hint">قبلاً ثبت‌نام کردید؟ روی «ورود» کلیک کنید</p>
  </div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb=supabase.createClient('https://ifjsnasoxnalhttzhlpd.supabase.co','sb_publishable_3aBoJ8PEPsrnOpgR_vOG4A_NDfJd6cK');
sb.auth.getSession().then(({data:{session}})=>{if(session)window.location.href='index.html';});
function showTab(t){
  document.getElementById('loginForm').style.display=t==='login'?'flex':'none';
  document.getElementById('signupForm').style.display=t==='signup'?'flex':'none';
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',(t==='login'&&i===0)||(t==='signup'&&i===1)));
}
function showMsg(id,txt,type){const el=document.getElementById(id);el.textContent=txt;el.className='msg '+type+' show';}
function setLoading(id,on){const b=document.getElementById(id);b.disabled=on;b.textContent=on?'...':(id==='loginBtn'?'ورود به سایت ←':'ساخت حساب رایگان');}
async function doSignup(){
  const email=document.getElementById('signupEmail').value.trim();
  const pass=document.getElementById('signupPass').value;
  const pass2=document.getElementById('signupPass2').value;
  if(!email||!pass)return showMsg('signupMsg','همه فیلدها را پر کنید','error');
  if(pass.length<6)return showMsg('signupMsg','رمز عبور باید حداقل ۶ کاراکتر باشد','error');
  if(pass!==pass2)return showMsg('signupMsg','رمزهای عبور یکسان نیستند','error');
  setLoading('signupBtn',true);
  const {error}=await sb.auth.signUp({email,password:pass});
  setLoading('signupBtn',false);
  if(error)return showMsg('signupMsg',error.message,'error');
  document.getElementById('confirmedEmail').textContent=email;
  document.getElementById('confirmBox').classList.add('show');
  document.getElementById('signupBtn').style.display='none';
}
async function doLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const pass=document.getElementById('loginPass').value;
  if(!email||!pass)return showMsg('loginMsg','همه فیلدها را پر کنید','error');
  setLoading('loginBtn',true);
  const {error}=await sb.auth.signInWithPassword({email,password:pass});
  setLoading('loginBtn',false);
  if(error){
    if(error.message.includes('Email not confirmed'))return showMsg('loginMsg','ایمیلت رو تأیید نکردی! صندوق ورودیت رو چک کن 📧','error');
    return showMsg('loginMsg','ایمیل یا رمز عبور اشتباه است','error');
  }
  window.location.href='index.html';
}
document.addEventListener('keydown',e=>{if(e.key==='Enter'){if(document.getElementById('loginForm').style.display!=='none')doLogin();else doSignup();}});
</script>
</body>
