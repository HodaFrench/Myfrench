<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>پنل هدی — مدیریت سوالات</title>
<link href="https://fonts.googleapis.com/css2?family=Estedad:wght@300;400;500;600;700&family=Roboto:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#1e3a5f;--gold:#b07a4a;--paper:#f4f3f5;--cream:#f9f8fa;--ink:#2c2a26;--gray:#8a8275;--line:#e2e1e3;--white:#fcfbfd;--green:#2e8b6b;--rose:#b0506f}
body{font-family:'Estedad',sans-serif;background:#1e3a5f;color:#f5f0e8;padding:0;min-height:100vh}
.admin-header{background:rgba(0,0,0,.3);padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.admin-header h1{font-size:16px;font-weight:700}
.admin-header a{color:#c4a572;font-size:12px;text-decoration:none}
.admin-body{max-width:800px;margin:0 auto;padding:20px 1rem}
.auth-box{background:rgba(255,255,255,.08);border-radius:14px;padding:24px;margin-bottom:20px;text-align:center}
.auth-input{width:100%;padding:10px 14px;border-radius:8px;border:none;background:rgba(255,255,255,.1);color:#f5f0e8;font-family:'Estedad',sans-serif;font-size:14px;margin-bottom:10px;direction:ltr}
.auth-btn{padding:9px 24px;background:var(--gold);color:#1e3a5f;border:none;border-radius:9px;font-family:'Estedad',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.q-card{background:rgba(255,255,255,.07);border-radius:12px;padding:16px;margin-bottom:12px;border:1px solid rgba(255,255,255,.1)}
.q-text{font-size:14px;line-height:1.8;margin-bottom:12px;background:rgba(255,255,255,.05);border-radius:8px;padding:10px 14px}
.q-meta{font-size:11px;color:#c4b8a8;margin-bottom:10px}
.q-answer{width:100%;min-height:80px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.05);color:#f5f0e8;font-family:'Estedad',sans-serif;font-size:13.5px;padding:10px;resize:vertical;margin-bottom:8px}
.q-answer:focus{outline:none;border-color:var(--gold)}
.q-actions{display:flex;gap:8px}
.btn-approve{flex:1;padding:8px;background:var(--green);color:#fff;border:none;border-radius:8px;font-family:'Estedad',sans-serif;font-size:13px;font-weight:600;cursor:pointer}
.btn-reject{padding:8px 16px;background:var(--rose);color:#fff;border:none;border-radius:8px;font-family:'Estedad',sans-serif;font-size:13px;cursor:pointer}
.status-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;margin-right:8px}
.pending{background:rgba(176,122,74,.3);color:#f5c47a}
.approved{background:rgba(46,139,107,.3);color:#7ee8c0}
.rejected{background:rgba(176,80,111,.3);color:#f5a0c0}
.loading{text-align:center;padding:30px;color:#c4b8a8}
#panel{display:none}
</style>
</head>
<body>
<div class="admin-header">
  <h1>👩‍🏫 پنل هدی — مدیریت سوالات انجمن</h1>
  <a href="index.html">← بازگشت</a>
</div>
<div class="admin-body">

  <!-- auth -->
  <div class="auth-box" id="auth-box">
    <div style="font-size:18px;margin-bottom:16px">🔐 ورود ادمین</div>
    <input class="auth-input" type="password" id="admin-pass" placeholder="رمز عبور">
    <br>
    <button class="auth-btn" onclick="checkPass()">ورود</button>
    <div id="auth-err" style="color:#f5a0c0;font-size:12px;margin-top:8px"></div>
  </div>

  <!-- panel -->
  <div id="panel">
    <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">
      <button onclick="loadQ('pending')" style="padding:7px 16px;background:rgba(176,122,74,.3);color:#f5c47a;border:none;border-radius:8px;cursor:pointer;font-family:'Estedad',sans-serif;font-size:13px">⏳ در انتظار</button>
      <button onclick="loadQ('approved')" style="padding:7px 16px;background:rgba(46,139,107,.3);color:#7ee8c0;border:none;border-radius:8px;cursor:pointer;font-family:'Estedad',sans-serif;font-size:13px">✅ تأییدشده</button>
      <button onclick="loadQ('rejected')" style="padding:7px 16px;background:rgba(176,80,111,.3);color:#f5a0c0;border:none;border-radius:8px;cursor:pointer;font-family:'Estedad',sans-serif;font-size:13px">❌ ردشده</button>
    </div>
    <div id="q-list"><div class="loading">⏳ بارگذاری...</div></div>
  </div>

</div>

<script>
const SB = 'https://ifjsnasoxnalhttzhlpd.supabase.co';
const KEY = 'sb_publishable_3aBoJ8PEPsrnOpgR_vOG4A_NDfJd6cK';
// Admin password - simple client-side check
const ADMIN_HASH = '7c3e95b1';  // hash of "hoda2024" - change as needed
let adminToken = null;

function checkPass(){
  const pass = document.getElementById('admin-pass').value;
  // Store in session
  sessionStorage.setItem('admin_auth', pass);
  if(pass === 'hoda@admin2024'){
    document.getElementById('auth-box').style.display='none';
    document.getElementById('panel').style.display='block';
    loadQ('pending');
  } else {
    document.getElementById('auth-err').textContent = 'رمز اشتباه است';
  }
}

// Check if already logged in
if(sessionStorage.getItem('admin_auth') === 'hoda@admin2024'){
  document.getElementById('auth-box').style.display='none';
  document.getElementById('panel').style.display='block';
}

async function loadQ(status){
  const list = document.getElementById('q-list');
  list.innerHTML = '<div class="loading">⏳ بارگذاری...</div>';
  
  const token = localStorage.getItem('sb-ifjsnasoxnalhttzhlpd-auth-token');
  let authToken = KEY;
  if(token){ try{ authToken = JSON.parse(token).access_token || KEY; }catch(e){} }
  
  try{
    const res = await fetch(
      SB+'/rest/v1/forum_questions?status=eq.'+status+'&order=created_at.desc',
      {headers:{'apikey':KEY,'Authorization':'Bearer '+authToken}}
    );
    const data = await res.json();
    
    if(!data.length){ list.innerHTML='<div class="loading">هیچ سوالی در این دسته نیست</div>'; return; }
    
    list.innerHTML = data.map(q => `
      <div class="q-card" id="qc-${q.id}">
        <div class="q-meta">
          <span class="status-badge ${q.status}">${q.status==='pending'?'⏳ در انتظار':q.status==='approved'?'✅ تأیید شده':'❌ رد شده'}</span>
          ${new Date(q.created_at).toLocaleString('fa-IR')}
        </div>
        <div class="q-text">${q.question}</div>
        ${status==='pending'?`
        <textarea class="q-answer" id="ans-${q.id}" placeholder="جواب خودت رو اینجا بنویس (اختیاری)...">${q.answer||''}</textarea>
        <div class="q-actions">
          <button class="btn-approve" onclick="approveQ(${q.id})">✅ تأیید و انتشار</button>
          <button class="btn-reject" onclick="rejectQ(${q.id})">❌ رد</button>
        </div>` : `
        <div style="background:rgba(46,139,107,.15);border-radius:8px;padding:10px;margin-top:8px;font-size:13px">${q.answer||'بدون جواب'}</div>
        `}
      </div>
    `).join('');
  }catch(e){
    list.innerHTML = '<div class="loading" style="color:#f5a0c0">خطا — جدول هنوز ساخته نشده. ابتدا یک سوال ارسال کن تا جدول ساخته شود.</div>';
  }
}

async function approveQ(id){
  const answer = document.getElementById('ans-'+id)?.value.trim()||'';
  const token = localStorage.getItem('sb-ifjsnasoxnalhttzhlpd-auth-token');
  let authToken = KEY;
  if(token){ try{ authToken = JSON.parse(token).access_token || KEY; }catch(e){} }
  
  const res = await fetch(SB+'/rest/v1/forum_questions?id=eq.'+id, {
    method:'PATCH',
    headers:{'apikey':KEY,'Authorization':'Bearer '+authToken,'Content-Type':'application/json','Prefer':'return=minimal'},
    body: JSON.stringify({status:'approved', answer, answered_at: new Date().toISOString()})
  });
  if(res.ok){ document.getElementById('qc-'+id).style.opacity='.4'; }
}

async function rejectQ(id){
  const token = localStorage.getItem('sb-ifjsnasoxnalhttzhlpd-auth-token');
  let authToken = KEY;
  if(token){ try{ authToken = JSON.parse(token).access_token || KEY; }catch(e){} }
  
  const res = await fetch(SB+'/rest/v1/forum_questions?id=eq.'+id, {
    method:'PATCH',
    headers:{'apikey':KEY,'Authorization':'Bearer '+authToken,'Content-Type':'application/json','Prefer':'return=minimal'},
    body: JSON.stringify({status:'rejected'})
  });
  if(res.ok){ document.getElementById('qc-'+id).style.opacity='.4'; }
}

document.getElementById('admin-pass')?.addEventListener('keydown',e=>{ if(e.key==='Enter')checkPass(); });
</script>
<script>
/* hoda-protect: بازدارنده‌ی کپی (نه امنیت کامل) */
(function(){
  document.addEventListener('contextmenu',function(e){e.preventDefault();},{capture:true});
  document.addEventListener('selectstart',function(e){
    var t=e.target;
    if(t&&(t.tagName==='INPUT'||t.tagName==='TEXTAREA'||t.isContentEditable))return;
    e.preventDefault();
  });
  document.addEventListener('copy',function(e){
    var t=e.target;
    if(t&&(t.tagName==='INPUT'||t.tagName==='TEXTAREA'||t.isContentEditable))return;
    e.preventDefault();
  });
  document.addEventListener('keydown',function(e){
    var t=e.target;
    var inField=t&&(t.tagName==='INPUT'||t.tagName==='TEXTAREA'||t.isContentEditable);
    var k=(e.key||'').toLowerCase();
    if((e.ctrlKey||e.metaKey)&&['c','x','u','s','a'].indexOf(k)>-1&&!inField){e.preventDefault();}
  },{capture:true});
})();
</script>
<style>
body{-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none}
input,textarea,[contenteditable]{-webkit-user-select:text;-moz-user-select:text;-ms-user-select:text;user-select:text}
img{-webkit-user-drag:none;user-drag:none;pointer-events:none}
</style>
</body>
</html>
