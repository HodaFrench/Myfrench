<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>تست دکمه خروج</title>
<style>
body{font-family:sans-serif;margin:0;padding:0;background:#f4f3f5}
.auth-bar{
  position:fixed;top:0;left:0;right:0;z-index:9999;
  background:#fffdf6;border-bottom:2px solid #b0506f;
  padding:10px 18px;display:flex;align-items:center;justify-content:space-between;
  min-height:48px;box-shadow:0 2px 10px rgba(0,0,0,.1);
}
.auth-bar button{
  background:#b0506f;color:#fff;border:none;border-radius:8px;
  padding:8px 18px;font-size:14px;font-weight:700;cursor:pointer;
}
.content{padding:80px 20px 20px;text-align:center}
</style>
</head>
<body>

<div class="auth-bar">
  <span style="font-weight:700;color:#1e3a5f;font-size:15px">👤 کاربر تست</span>
  <button onclick="alert('دکمه خروج کار می‌کند!')">🚪 خروج از حساب</button>
</div>

<div class="content">
  <h1>صفحه تست</h1>
  <p style="font-size:18px;color:#666;margin-top:20px">
    اگر بالای این صفحه یک نوار با دکمه صورتی <strong>«🚪 خروج از حساب»</strong> می‌بینی،<br>
    یعنی نوار درست رندر می‌شود.
  </p>
  <p style="margin-top:30px;color:#b0506f;font-size:14px">نسخه تست: 1782556015</p>
  <p style="margin-top:10px;color:#999;font-size:13px">
    👆 روی دکمه خروج بزن — باید یک پیام نشون بده
  </p>
</div>

</body>
</html>
