const _DATA = {"lessons":[{"f":"VOCAB_mots_difficiles.html","t":"📚 ۱۰۰ کلمهٔ دشوار فرانسه","c":"vocab","lv":"B2–C1","s":"۱۰۰ کلمهٔ سطح B2–C1 با تعریف فرانسوی، ترجمهٔ فارسی و ۲ مثال هر کدام. قابل جستجو و فیلتر بر اساس سطح و موضوع (احساس، اخلاق، ذهن، اجتماع...)."},{"f":"LECON_mind_maps_temps.html","t":"🗺️ Mind Maps — زمان‌های فرانسه","c":"grammar","lv":"A1–C1","s":"همهٔ ۶ زمان اصلی با مثال‌های A1 تا C1: Présent / PC / Imparfait / Futur / Conditionnel / Subjonctif — هر کدام با فرمول، سیگنال‌ها، ۵ سطح مثال با ترجمه و نکتهٔ کلیدی."},{"f":"VOCAB_cuisine.html","t":"واژگان: ابزار آشپزخانه","c":"vocab","lv":"A1–B1","s":"۵۰+ ابزار آشپزخانه در ۶ دسته: ظرف‌ها / قابلمه و تابه / قاشق و چنگال / ابزار آماده‌سازی / قنادی / برقی. هر کدام با مثال روزمره."},{"f":"CULTURE_desserts_francais.html","t":"🍰 دسرهای فرانسوی","c":"culture","lv":"B1–B2","s":"دسرهای مشهور فرانسوی با هایلایت دوزبانه: crème brûlée، tarte Tatin، mille-feuille، éclair. چرا مشهورند؟ + جهانی‌شدن (ژاپن، کره، کانادا...)"},{"f":"CULTURE_macaron.html","t":"🍬 Le Macaron — تاریخ و هنر","c":"culture","lv":"B1–B2","s":"پانصد سال تاریخ ماکارون: از کاترین دو مدیچی تا Pierre Hermé. Ladurée vs Hermé. علم ماکارون. دوزبانه با هایلایت‌های کلیکی."},{"f":"CULTURE_art_de_vivre.html","t":"L'Art de Vivre — هنر زندگی فرانسوی","c":"culture","lv":"B1–B2","s":"هنر زندگی فرانسوی: سفره و غذا، مد پاریسی، فرهنگ کافه، جشن‌های ملی. با واژگان، نقل‌قول‌ها و حقایق جذاب."},{"f":"LECON_mind_maps_temps.html","t":"Mind Maps — زمان‌های فرانسه","c":"grammar","lv":"A1–B2","s":"۶ زمان اصلی فرانسه در یک نگاه: Présent / Passé composé / Imparfait / Futur / Conditionnel / Subjonctif — هر کدام با فرمول، سیگنال‌ها، مثال و جدول مقایسه."},{"f":"LECON_h_aspire_muet.html","t":"درسنامه: H aspiré یا H muet؟","c":"grammar","lv":"A2–B2","s":"تفاوت H muet (l'homme → الیزیون) و H aspiré (le hibou → بدون الیزیون) + جدول ۲۵ کلمه + ترفندهای حفظ + آزمون ۵ سؤالی."},{"f":"LECON_aimer_adorer.html","t":"درسنامه: aimer, adorer, détester","c":"grammar","lv":"A1–B1","s":"ساختار دقیق این افعال احساسی: + le/la/les یا + مصدر (بدون حرف اضافه)، درجه‌بندی شدت، préférer A à B، préférer que + subjonctif. آزمون ۵ سؤالی."},{"f":"LECON_verbes_prepositions.html","t":"درسنامه: فعل‌ها + à یا de","c":"grammar","lv":"A2–B2","s":"۳۰+ فعل با à یا de — دسته‌بندی مفهومی، مثال کامل برای هر کدام، فعل + اسم (parler à vs parler de)، jouer à vs jouer de. آزمون ۸ سؤالی."},{"f":"VOCAB_routine.html","t":"واژگان: روتین روزانه","c":"vocab","lv":"A2","s":"۵۰+ واژهٔ روتین روزانه: صبح (انعکاسی‌ها) + روز + شب + فعل‌های کلیدی (avoir l'habitude de...) + مکالمهٔ نمونه + متن توصیفی کامل."},{"f":"PAGE_examens_tcf.html","t":"راهنمای کامل امتحانات TCF / TEF / DELF","c":"tcf","lv":"tous niveaux","s":"مقایسهٔ TCF vs TEF vs DELF · ساختار TCF Canada (۴ مهارت) · سطوح A1-C2 · نمره‌دهی · استراتژی روز امتحان · منابع رایگان"},{"f":"LECON_conditionnel.html","t":"درسنامه: Conditionnel Présent","c":"grammar","lv":"B1–B2","s":"ساخت (Futur+پسوندهای Imparfait) + صرف ۸ فعل بی‌قاعده + ۵ کاربرد (Si / درخواست مؤدبانه / توصیه / خبر غیرمستقیم / آرزو) + ۷۰ تمرین تعاملی در ۵ گروه."},{"f":"LECON_heure.html","t":"درسنامه: گفتن ساعت","c":"grammar","lv":"A1–B1","s":"ساعت روزمره (et quart / et demie / moins) و رسمی (0-23) + پرسیدن ساعت + برنامه‌ریزی + ساعت تعاملی بصری + آزمون ۵ سؤالی."},{"f":"LECON_quand_quant.html","t":"درسنامه: QUAND یا QUANT؟","c":"grammar","lv":"A2–B2","s":"QUAND (وقتی/کِی) در مقابل QUANT À (در موردِ). با ۲۰+ مثال، تله‌های رایج و آزمون ۵ سؤالی."},{"f":"LECON_adverbes.html","t":"درسنامه: ۱۰۰ قید پرکاربرد","c":"grammar","lv":"A1–B2","s":"ساخت با -ment + قیدهای زمان/مکان/کمیت/حالت با مثال کامل. کلمات نشانهٔ B2 (considérablement...). آزمون ۵ سؤالی."},{"f":"ARTICLE_voleurs_energie_nozbe.html","t":"دزدان انرژی — Nozbe","c":"article","lv":"B1–B2","s":"مقاله‌ای از Nozbe: ۵ دزد انرژی رایج (آدم‌های منفی، تعلل، کار بی‌وقفه، بی‌نظمی، چیزهای غیرقابل کنترل). واژگان و ساختارهای B2."},{"f":"LECON_etre_aller.html","t":"درسنامه: J'ai été یا Je suis allé؟","c":"grammar","lv":"A2–B1","s":"تفاوت دقیق j'ai été (بودم/تجربه) و je suis allé (رفتم — حرکت مشخص) با جدول مقایسه، نکات توافق و آزمون ۵ سؤالی."},{"f":"LECON_possessifs.html","t":"درسنامه: صفت‌های ملکی","c":"grammar","lv":"A1–B1","s":"جدول کامل صفت‌های ملکی + تله‌های رایج: mon amie (نه ma)، leur/leurs، و جنسیت اسم نه مالک. آزمون ۵ سؤالی."},{"f":"LECON_a_ou_de.html","t":"درسنامه: À یا DE بعد از صفت و اسم؟","c":"grammar","lv":"B1–B2","s":"صفت‌های همیشه + à (prêt à، habitué à) و همیشه + de (content de، capable de) + اسم‌ها + à/de. آزمون ۵ سؤالی."},{"f":"LECON_etre_aller.html","t":"درسنامه: J'ai été یا Je suis allé؟","c":"grammar","lv":"A2–B1","s":"تفاوت دقیق j'ai été (بودم/تجربه) و je suis allé (رفتم — حرکت مشخص) با جدول مقایسه، نکات توافق و آزمون ۵ سؤالی."},{"f":"LECON_possessifs.html","t":"درسنامه: صفت‌های ملکی","c":"grammar","lv":"A1–B1","s":"جدول کامل صفت‌های ملکی + تله‌های رایج: mon amie (نه ma)، leur/leurs، و جنسیت اسم نه مالک. آزمون ۵ سؤالی."},{"f":"LECON_a_ou_de.html","t":"درسنامه: À یا DE بعد از صفت و اسم؟","c":"grammar","lv":"B1–B2","s":"صفت‌های همیشه + à (prêt à، habitué à) و همیشه + de (content de، capable de) + اسم‌ها + à/de. آزمون ۵ سؤالی."},{"f":"LECON_prepositions.html","t":"درسنامه: حروف اضافه‌ی فرانسه","c":"grammar","lv":"A2–B2","s":"حروف اضافهٔ پرکاربرد: à/de/en/dans/sur + فعل‌ها + حروف اضافه + اصطلاحات ثابت. با جدول، مثال و آزمون تعاملی."},{"f":"LECON_prepositions_exercices.html","t":"درسنامه: تمرین حروف اضافه","c":"grammar","lv":"A2–B1","s":"تمرین حروف اضافه در موقعیت‌های واقعی: سفر، زندگی روزمره، اصطلاحات ثابت grâce à/à cause de. با آزمون."},{"f":"LECON_articles.html","t":"درسنامه: آرتیکل‌ها در فرانسه","c":"grammar","lv":"A1–B1","s":"سه نوع آرتیکل: défini (le/la)، indéfini (un/une)، partitif (du/de la). انقباض au/du + نفی → de. با آزمون."},{"f":"LECON_sentir.html","t":"درسنامه: SENTIR یا SE SENTIR؟","c":"grammar","lv":"A2–B1","s":"تفاوت sentir (بوی دادن / حس کردن از بیرون) و se sentir (احساس کردن درباره‌ی خودت). sentir bon vs se sentir bien. با آزمون."},{"f":"LECON_certain_quelque.html","t":"درسنامه: CERTAIN یا QUELQUE؟","c":"grammar","lv":"B1–B2","s":"تفاوت دقیق certain (بعضی‌های مشخص) و quelques (چند تا). ترکیب‌های ثابت: quelque chose، quelque part. با آزمون."},{"f":"ARTICLE_voleurs_energie.html","t":"۱۰ دزد انرژی در زندگی","c":"article","lv":"B1–B2","s":"مقاله‌ای از psychologue.net با تحلیل کامل واژگان، ساختارها و کلوکیشن‌ها — همراه با ترجمه‌ی فارسی روان زیر هر پاراگراف."},{"f":"ARTICLE_tri_dechets.html","t":"تفکیک زباله: چرا مهم‌تر از آن چیزی است که فکر می‌کنیم؟","c":"article","lv":"B1–B2","s":"تفکیک زباله — داده‌های واقعی از CITEO: صرفه‌جویی CO₂، اقتصاد چرخشی، بازیافت شیشه و آلومینیم. با تحلیل واژگان و ساختارهای B2."},{"f":"ARTICLE_especes_menacees.html","t":"۵ کاری که می‌توانید برای حفظ گونه‌های در خطر انقراض انجام دهید","c":"article","lv":"B1–B2","s":"۵ اقدام عملی برای حفظ گونه‌های در معرض خطر: کاهش ردپای کربن، مصرف مسئولانه، حمایت از انجمن‌ها، آگاه‌سازی، پرهیز از مواد مضر. تحلیل واژگان و ساختارهای B1."},{"f":"ARTICLE_surtourisme.html","t":"سورتوریسم: چه تأثیری بر شهرها و محیط زیست دارد؟","c":"article","lv":"B1–B2","s":"سورتوریسم: تأثیر گردشگری انبوه بر شهرها (فشار مسکن، اجاره‌بها) و محیط زیست (CO₂، اکوسیستم). واژگان پیشرفته‌ی B2 با تحلیل."},{"f":"ARTICLE_ville_campagne.html","t":"زندگی در شهر یا روستا: مزایا و معایب","c":"article","lv":"B1–B2","s":"شهر یا روستا؟ مقایسه‌ی کامل: امکانات شهر vs آرامش روستا + مدل ترکیبی جدید. واژگان مقایسه‌ای B1-B2 با تحلیل."},{"f":"LECON_consequence.html","t":"درسنامه: بیان نتیجه","c":"grammar","lv":"B1–B2","s":"درسنامه‌ی کامل بیان نتیجه در فرانسه — از donc و du coup تا par conséquent و ساختارهای si...que. با فهرست تیترها، مثال و آزمون."},{"f":"LECON_adjectifs_adverbes.html","t":"درسنامه: صفت یا قید؟","c":"grammar","lv":"A2–B1","s":"درسنامه‌ی کامل تفاوت صفت و قید — RAPIDE/VITE، BON/BIEN، MEILLEUR/MIEUX، جای صفت، ساخت قید با -ment. با فهرست تیترها و آزمون."},{"f":"LECON_genre.html","t":"درسنامه: جنسیت اسم‌ها (مذکر/مؤنث)","c":"grammar","lv":"A1–B1","s":"درسنامه‌ی کامل جنسیت اسم‌ها — نشانه‌های مذکر و مؤنث، تبدیل، و اسم‌های فریبنده. با قانون‌های کاربردی، فهرست تیترها و آزمون."},{"f":"LECON_concession.html","t":"درسنامه: تضاد و امتیاز","c":"grammar","lv":"B1–B2","s":"درسنامه‌ی کامل بیان تضاد و امتیاز — mais، pourtant، bien que (+subjonctif)، malgré، en revanche. با فهرست تیترها و آزمون."},{"f":"LECON_questions.html","t":"درسنامه: سؤال پرسیدن","c":"grammar","lv":"A1–B1","s":"درسنامه‌ی کامل سؤال پرسیدن — سه سطح (محاوره/معمولی/رسمی)، کلمات پرسشی، quel و qui/que، و اشتباه‌های رایج. با فهرست تیترها و آزمون."},{"f":"VOCAB_teletravail_intermediaire.html","t":"واژگان دورکاری و فناوری — متوسط","c":"vocab","lv":"متوسط (B1–B2)","s":"واژگان ضروری دورکاری و فناوری در سطح متوسط — با تعریف، مترادف و مثال. نقطه‌ی شروع خوبی برای ساختن دایره‌ی واژگان این موضوع."},{"f":"VOCAB_teletravail_avance.html","t":"واژگان دورکاری و فناوری — پیشرفته","c":"vocab","lv":"پیشرفته (B2+)","s":"واژگان پیشرفته‌تر و دقیق‌تر دورکاری و فناوری — برای کسانی که می‌خواهند بیان غنی‌تر و حرفه‌ای‌تری در آزمون داشته باشند."},{"f":"VOCAB_bienetre_intermediaire.html","t":"واژگان رفاه در محیط کار — متوسط","c":"vocab","lv":"متوسط (B1–B2)","s":"واژگان ضروری مربوط به رفاه و سلامت در محیط کار، در سطح متوسط — با تعریف و مثال."},{"f":"VOCAB_bienetre_avance.html","t":"واژگان رفاه در محیط کار — پیشرفته","c":"vocab","lv":"پیشرفته (B2+)","s":"واژگان پیشرفته‌تر رفاه در محیط کار — برای بیان دقیق‌تر و حرفه‌ای‌تر دربارهٔ این موضوع در آزمون."},{"f":"VOCAB_environnement_intermediaire.html","t":"واژگان محیط‌زیست و انرژی — متوسط","c":"vocab","lv":"متوسط (B1–B2)","s":"واژگان ضروری محیط‌زیست و انرژی در سطح متوسط — با تعریف و مثال. موضوعی کلیدی برای آزمون و مکالمه."},{"f":"VOCAB_environnement_avance.html","t":"واژگان محیط‌زیست و انرژی — پیشرفته","c":"vocab","lv":"پیشرفته (B2+)","s":"واژگان پیشرفته‌تر محیط‌زیست و انرژی — برای بیان دقیق و حرفه‌ای درباره‌ی چالش‌های زیست‌محیطی در آزمون."},{"f":"VOCAB_zerodechet_avance.html","t":"واژگان زباله‌ی صفر و بازیافت — پیشرفته","c":"vocab","lv":"پیشرفته (B2→B2+)","s":"واژگان تخصصی زباله‌ی صفر و بازیافت در سطح B2+ — با تعریف، ت const COLORS = {grammar:'#6c63ff',vocab:'#06b6d4',miniarticle:'#ec4899',innerfrench:'#8b5cf6',article:'#10b981',podcast:'#f97316',tcf:'#f97316',culture:'#6c63ff'};
const LABELS = {grammar:'گرامر',vocab:'واژگان',miniarticle:'مینی‌آرتیکل',innerfrench:'InnerFrench',article:'آرتیکل',podcast:'پادکست',tcf:'آمادگی TCF',culture:'فرهنگ فرانسه'};

function openCat(cat){
  const color = COLORS[cat]||'#6c63ff';
  document.getElementById('modal-title').textContent = LABELS[cat]||cat;
  document.getElementById('modal-title').style.color = color;
  
  const body = document.getElementById('modal-body');
  body.innerHTML='';

  if(cat==='miniarticle'){
    document.getElementById('modal-sub').textContent = _DATA.mini.length+' متن';
    _DATA.mini.forEach(m=>{
      const a=document.createElement('a');
      a.className='item'; a.href='index.html#cat=miniarticle'; 
      a.innerHTML=`<span class="item-icon">${m.e}</span><div class="item-body"><div class="item-title">${m.t}</div><div class="item-meta">${m.n}</div></div>`;
      body.appendChild(a);
    });
  } else if(cat==='innerfrench'){
    document.getElementById('modal-sub').textContent = _DATA.inner.length+' اپیزود';
    _DATA.inner.forEach(e=>{
      const a=document.createElement('a');
      a.className='item'; a.href=e.src||'index.html#cat=innerfrench'; a.target='_blank';
      a.innerHTML=`<span class="item-icon">▶</span><div class="item-body"><div class="item-title">${e.t}</div><div class="item-meta">اپیزود ${e.n}</div></div>`;
      body.appendChild(a);
    });
  } else {
    const items = _DATA.lessons.filter(l=>l.c===cat);
    document.getElementById('modal-sub').textContent = items.length+' محتوا';
    items.forEach(l=>{
      const a=document.createElement('a');
      a.className='item'; a.href=l.f||'index.html';
      a.innerHTML=`<div class="item-body"><div class="item-title">${l.t}</div><div class="item-meta">${l.lv||''}</div></div>`;
      body.appendChild(a);
    });
  }

  document.getElementById('overlay').classList.add('open');
}

function closeModal(e){
  if(!e||e.target===document.getElementById('overlay'))
    document.getElementById('overlay').classList.remove('open');
}
