<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>تست نوار 1782584606</title>
<link href="https://fonts.googleapis.com/css2?family=Estedad:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Estedad',sans-serif;background:#f4f3f5;padding-top:60px}
#stats-bar{
  position:fixed;top:0;left:0;right:0;z-index:300;
  height:46px;background:rgba(255,253,246,.97);
  backdrop-filter:blur(10px);border-bottom:1px solid rgba(217,206,184,.5);
  display:flex;align-items:center;justify-content:space-between;
  gap:8px;padding:0 10px;
}
.sb-right{display:flex;align-items:center;gap:7px}
#tg-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;
  background:#22618f;color:#fff;text-decoration:none;font-size:12.5px;font-weight:800;
  white-space:nowrap;flex-shrink:0}
#sb-logout{background:#b0506f;color:#fff;border:none;border-radius:20px;
  padding:7px 15px;font-weight:700;font-size:12.5px;cursor:pointer;
  white-space:nowrap;flex-shrink:0;font-family:'Estedad',sans-serif}
#sb-menu-btn{background:rgba(31,58,95,.09);color:#1e3a5f;border:none;border-radius:50%;
  width:36px;height:36px;font-size:20px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;line-height:1;padding:0}
#sb-menu{position:fixed;top:52px;right:10px;z-index:350;background:#fff;
  border-radius:14px;box-shadow:0 6px 24px rgba(0,0,0,.18);border:1px solid #e8e2d8;
  min-width:230px;overflow:hidden;display:none}
#sb-menu.open{display:block}
.sb-menu-item{display:flex;align-items:center;gap:10px;padding:14px 16px;
  text-decoration:none;color:#2c2a26;font-size:14px;font-weight:600;
  border-bottom:1px solid #f0ece4;cursor:pointer;font-family:'Estedad',sans-serif;
  width:100%;background:none;border-right:none;border-left:none;border-top:none;text-align:right}
.sb-menu-item:last-child{border-bottom:none}
.sb-menu-icon{font-size:18px}
.sb-menu-val{margin-right:auto;font-weight:800;color:#22618f;font-size:13px}
#ov{position:fixed;inset:0;z-index:340;display:none}
#ov.open{display:block}
</style>
</head>
<body>

<div id="stats-bar">
  <a id="tg-btn" href="https://t.me/tcfhoda" target="_blank">📢 کانال TCF</a>
  <div class="sb-right">
    <button id="sb-logout" onclick="alert('خروج')">🚪 خروج</button>
    <button id="sb-menu-btn" onclick="tm(event)">⋮</button>
  </div>
</div>
<div id="ov" onclick="cm()"></div>
<div id="sb-menu">
  <a href="#" class="sb-menu-item"><span class="sb-menu-icon">❓</span> هر سوالی داری ازم بپرس</a>
  <a href="#" class="sb-menu-item"><span class="sb-menu-icon">📋</span> تاریخچه‌ی مطالعه</a>
  <div class="sb-menu-item" style="cursor:default"><span class="sb-menu-icon">⏱</span> تایم مطالعه امروز <span class="sb-menu-val">۰ دقیقه</span></div>
</div>

<div style="padding:20px;text-align:center">
  <h2>صفحه تست نوار</h2>
  <p style="margin-top:20px;color:#666;line-height:2">
    بالا باید ببینی:<br>
    <b style="color:#22618f">چپ:</b> 📢 کانال TCF<br>
    <b style="color:#b0506f">راست:</b> 🚪 خروج + ⋮<br><br>
    روی ⋮ بزن، منو باز بشه
  </p>
  <p style="margin-top:30px;color:#b0506f;font-size:13px">نسخه: 1782584606</p>
</div>

<script>
function tm(e){if(e)e.stopPropagation();document.getElementById('sb-menu').classList.toggle('open');document.getElementById('ov').classList.toggle('open');}
function cm(){document.getElementById('sb-menu').classList.remove('open');document.getElementById('ov').classList.remove('open');}
</script>
</body>
</html>
