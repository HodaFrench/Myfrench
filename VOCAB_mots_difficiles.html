<style>
  *{margin:0;padding:0;box-sizing:border-box;}

  .topbar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
  .topbar a{color:var(--accent);text-decoration:none;font-size:13px;border:1px solid var(--line);
    background:var(--cream);padding:7px 14px;border-radius:8px;}
  .topbar a:hover{background:var(--accent);color:#fff;}
  /* هدر */
  .header{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;
    padding:28px;border-radius:18px;margin-bottom:20px;
    box-shadow:0 12px 32px rgba(122,91,168,.28);position:relative;overflow:hidden;}
  .header::before{content:"📚";position:absolute;top:-10px;left:10px;font-size:110px;opacity:.09;}
  .header h1{font-size:22px;font-weight:700;margin-bottom:5px;}
  .header .sub{font-size:13.5px;opacity:.92;line-height:1.9;}
  /* فیلتر */
  .filter-bar{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px;
    align-items:center;}
  .filter-bar input{font-family:'Roboto',serif;font-size:14px;border:1.5px solid var(--line);
    border-radius:20px;padding:9px 16px;outline:none;flex:1;min-width:180px;
    background:var(--white);transition:border-color .2s;}
  .filter-bar input:focus{border-color:var(--accent);}
  .filter-btn{font-family:'Estedad',sans-serif;font-size:12.5px;font-weight:600;
    border:1.5px solid var(--line);background:var(--white);border-radius:20px;
    padding:8px 14px;cursor:pointer;transition:all .2s;color:var(--ink);}
  .filter-btn:hover,.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .count-info{font-size:13px;color:var(--gray);margin-bottom:14px;}
  /* کارت‌های واژه */
  .words-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media(max-width:580px){.words-grid{grid-template-columns:1fr;}}
  .word-card{background:var(--white);border:1px solid var(--line);border-radius:14px;
    padding:16px 18px;transition:all .25s;cursor:default;}
  .word-card:hover{border-color:var(--accent);box-shadow:0 6px 20px rgba(122,91,168,.1);
    transform:translateY(-2px);}
  .word-card.hidden{display:none;}
  .wc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
  .wc-num{font-size:11px;color:var(--gray);font-weight:700;flex-shrink:0;margin-top:2px;}
  .wc-level{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:6px;
    color:#fff;flex-shrink:0;}
  .wc-fr{font-family:'Roboto',serif;font-size:17px;font-weight:700;color:var(--navy);
    direction:ltr;text-align:left;margin-bottom:3px;}
  .wc-genre{font-size:11.5px;color:var(--gray);font-style:italic;margin-right:6px;}
  .wc-fa{font-size:14px;color:var(--accent);font-weight:600;margin-bottom:8px;}
  .wc-def{font-family:'Roboto',serif;font-size:13px;color:var(--gray);
    direction:ltr;text-align:left;line-height:1.7;margin-bottom:8px;
    font-style:italic;border-right:3px solid var(--line);padding-right:10px;}
  .wc-def-fa{font-size:12.5px;color:var(--gray);margin-bottom:8px;}
  .wc-ex{font-family:'Roboto',serif;font-size:14px;color:var(--ink);
    direction:ltr;text-align:left;line-height:1.7;margin-bottom:4px;
    background:var(--cream);padding:8px 12px;border-radius:8px;}
  .wc-ex-fa{font-size:12.5px;color:var(--gray);padding:0 4px;}
  .wc-ex2{font-family:'Roboto',serif;font-size:13.5px;color:var(--ink);
    direction:ltr;text-align:left;line-height:1.7;margin-top:6px;margin-bottom:4px;
    background:rgba(122,91,168,.05);padding:7px 12px;border-radius:8px;}
  .wc-ex2-fa{font-size:12px;color:var(--gray);padding:0 4px;}
  .wc-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
  .wc-tag{font-size:11px;padding:2px 8px;border-radius:6px;
    background:rgba(122,91,168,.1);color:var(--accent2);}
  /* نتیجه خالی */
  .empty-state{text-align:center;padding:40px;color:var(--gray);}
  .empty-state .em{font-size:40px;margin-bottom:12px;}
</style>

let activeCat = 'all';
function buildGrid(words){
  const grid = document.getElementById('wordsGrid');
  const empty = document.getElementById('emptyState');
  if(!words.length){grid.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  document.getElementById('countInfo').textContent='نمایش '+words.length+' کلمه از ۱۰۰';
  const levelColors={'B2':'#2e7bb5','C1':'#7a5ba8'};
  grid.innerHTML=words.map(w=>`
    <div class="word-card" data-cat="${w.tags.join(' ')}" data-level="${w.level}">
      <div class="wc-top">
        <span class="wc-num">#${w.n}</span>
        <span class="wc-level" style="background:${levelColors[w.level]||'#888'}">${w.level}</span>
      </div>
      <div class="wc-fr">${w.fr} <span class="wc-genre">${w.genre}</span></div>
      <div class="wc-fa">${w.fa}</div>
      <div class="wc-def">${w.def}</div>
      <div class="wc-def-fa">${w.def_fa}</div>
      <div class="wc-ex">${w.ex1}</div>
      <div class="wc-ex-fa">${w.ex1_fa}</div>
      <div class="wc-ex2">${w.ex2}</div>
      <div class="wc-ex2-fa">${w.ex2_fa}</div>
      <div class="wc-tags">${w.tags.map(t=>`<span class="wc-tag">${t}</span>`).join('')}</div>
    </div>`).join('');
}
function filterWords(){
  const q=document.getElementById('searchInput').value.toLowerCase().trim();
  let filtered=WORDS;
  if(activeCat!=='all') filtered=filtered.filter(w=>w.tags.includes(activeCat)||w.level===activeCat);
  if(q) filtered=filtered.filter(w=>w.fr.toLowerCase().includes(q)||w.fa.includes(q)||w.def_fa.includes(q));
  buildGrid(filtered);
}
function filterCat(cat,btn){
  activeCat=cat;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('searchInput').value='';
  filterWords();
}
buildGrid(WORDS);
</script>
<script src="protect.js"></script>
</body>
</html>
