    q: `<span class="fr" dir="ltr">bon</span> و <span class="fr" dir="ltr">bien</span> چه فرقی دارن؟`,
    a: `<p>این دوتا رو فارسی‌زبون‌ها زیاد قاطی می‌کنن:</p>
        <p>🔹 <span class="ex" dir="ltr">bon</span> = <b>صفت</b> (خوب) → اسم رو وصف می‌کنه. <span class="ex" dir="ltr">un <span class="h">bon</span> repas</span> (یه غذای خوب)</p>
        <p>🔹 <span class="ex" dir="ltr">bien</span> = <b>قید</b> (خوب/به‌خوبی) → فعل رو وصف می‌کنه. <span class="ex" dir="ltr">Il travaille <span class="h">bien</span>.</span> (خوب کار می‌کنه)</p>
        <div class="tip">💡 <span>غذا خوبه → <span class="ex" dir="ltr">C'est bon !</span> | حالم خوبه → <span class="ex" dir="ltr">Je vais bien.</span></span></div>`
  },
  {
    q: `چرا می‌گن <span class="fr" dir="ltr">aller à la maison</span> ولی <span class="fr" dir="ltr">aller au cinéma</span>؟`,
    a: `<p>چون حرفِ اضافه‌ی <span class="ex" dir="ltr">à</span> با حرف تعریف قاطی می‌شه:</p>
        <p>🔹 <span class="ex" dir="ltr">à + le = <span class="h">au</span></span> → <span class="ex" dir="ltr">au cinéma, au restaurant</span></p>
        <p>🔹 <span class="ex" dir="ltr">à + les = <span class="h">aux</span></span> → <span class="ex" dir="ltr">aux toilettes</span></p>
        <p>🔹 ولی <span class="ex" dir="ltr">à + la</span> و <span class="ex" dir="ltr">à + l'</span> تغییری نمی‌کنن → <span class="ex" dir="ltr">à la maison, à l'école</span></p>
        <div class="tip">💡 <span>همین قانون برای <span class="ex" dir="ltr">de</span> هم هست: <span class="ex" dir="ltr">de + le = du</span>، <span class="ex" dir="ltr">de + les = des</span>.</span></div>`
  },
  {
    q: `<span class="fr" dir="ltr">visiter</span> رو برای آدم‌ها هم می‌شه به کار برد؟`,
    a: `<p>نه! این یه تله‌ی رایجه. <span class="ex" dir="ltr">visiter</span> رو فقط برای <b>مکان‌ها</b> به کار می‌بریم، نه آدم‌ها.</p>
        <p>✅ <span class="ex" dir="ltr"><span class="h">visiter</span> un musée</span> (بازدید از موزه)</p>
        <p>✅ برای آدم: <span class="ex" dir="ltr">rendre visite <span class="h">à</span> un ami</span> (به دیدنِ دوست رفتن)</p>
        <p>❌ <span class="ex" dir="ltr">visiter mon ami</span></p>
        <div class="tip">💡 <span>مکان → <span class="ex" dir="ltr">visiter</span> | آدم → <span class="ex" dir="ltr">rendre visite à</span></span></div>`
  },
  {
    q: `<span class="fr" dir="ltr">an</span> یا <span class="fr" dir="ltr">année</span>؟`,
    a: `<p>هر دو یعنی «سال»، ولی فرقشون ظریفه:</p>
        <p>🔹 <span class="ex" dir="ltr">an</span> = واحدِ شمارش (با عدد). <span class="ex" dir="ltr">deux <span class="h">ans</span></span>, <span class="ex" dir="ltr">J'ai 20 ans</span></p>
        <p>🔹 <span class="ex" dir="ltr">année</span> = مدتِ سال، با تأکید روی طول یا کیفیتش. <span class="ex" dir="ltr">une bonne <span class="h">année</span></span>, <span class="ex" dir="ltr">toute l'année</span></p>
        <div class="tip">💡 <span>با عدد معمولاً <span class="ex" dir="ltr">an</span>؛ با صفت یا «کلِ سال» معمولاً <span class="ex" dir="ltr">année</span>. (Bonne année ! = سال نو مبارک)</span></div>`
  },
  {
    q: `<span class="fr" dir="ltr">savoir</span> و <span class="fr" dir="ltr">connaître</span> هر دو یعنی «دانستن»؟`,
    a: `<p>بله ولی کاربردشون فرق داره:</p>
        <p>🔹 <span class="ex" dir="ltr">savoir</span> = دانستنِ یه <b>اطلاعات</b> یا <b>بلد بودنِ</b> یه کار. <span class="ex" dir="ltr">Je <span class="h">sais</span> nager.</span> (شنا بلدم)</p>
        <p>🔹 <span class="ex" dir="ltr">connaître</span> = <b>آشنا بودن</b> با یه شخص، مکان یا چیز. <span class="ex" dir="ltr">Je <span class="h">connais</span> Paris.</span> (پاریس رو می‌شناسم)</p>
        <div class="tip">💡 <span>بعد از <span class="ex" dir="ltr">connaître</span> همیشه یه اسم میاد (شخص/مکان). «بلد بودنِ کاری» → همیشه <span class="ex" dir="ltr">savoir</span>.</span></div>`
  },
  {
    q: `چرا <span class="fr" dir="ltr">je vais à Paris</span> ولی <span class="fr" dir="ltr">je vais en France</span>؟`,
    a: `<p>چون حرفِ اضافه‌ی کشورها به جنسیتشون بستگی داره:</p>
        <p>🔹 شهرها → <span class="ex" dir="ltr"><span class="h">à</span></span>. <span class="ex" dir="ltr">à Paris, à Tokyo</span></p>
        <p>🔹 کشورهای مؤنث → <span class="ex" dir="ltr"><span class="h">en</span></span>. <span class="ex" dir="ltr">en France, en Iran, en Italie</span></p>
        <p>🔹 کشورهای مذکر → <span class="ex" dir="ltr"><span class="h">au</span></span>. <span class="ex" dir="ltr">au Canada, au Japon</span></p>
        <div class="tip">💡 <span>اکثر کشورهایی که به «e» ختم می‌شن مؤنث‌ان (en). استثنا: le Mexique.</span></div>`
  },
  {
    q: `می‌گیم <span class="fr" dir="ltr">je suis d'accord</span> یا <span class="fr" dir="ltr">je suis agree</span>؟`,
    a: `<p>برای «موافقم»، فرانسه اصطلاحِ خاصِ خودش رو داره:</p>
        <p>✅ درست: <span class="ex" dir="ltr">Je suis <span class="h">d'accord</span>.</span> (موافقم)</p>
        <p>✅ مخالفت: <span class="ex" dir="ltr">Je ne suis pas d'accord.</span></p>
        <p>❌ تحتِ تأثیرِ انگلیسی نگو «agree». فرانسه فعلِ مستقیم برای این نداره.</p>
        <div class="tip">💡 <span>«با تو موافقم» → <span class="ex" dir="ltr">Je suis d'accord avec toi.</span></span></div>`
  },
  {
    q: `بعد از <span class="fr" dir="ltr">il faut</span> چی میاد؟`,
    a: `<p><span class="ex" dir="ltr">il faut</span> یعنی «باید/لازمه»، و بعدش معمولاً <b>مصدر</b> میاد:</p>
        <p>✅ <span class="ex" dir="ltr">Il faut <span class="h">manger</span> pour vivre.</span> (برای زندگی باید خورد)</p>
        <p>✅ با اسم: <span class="ex" dir="ltr">Il faut <span class="h">du</span> temps.</span> (وقت لازمه)</p>
        <p>🔹 برای شخصِ خاص، از <span class="ex" dir="ltr">il faut que</span> + سوبژونکتیف استفاده می‌شه: <span class="ex" dir="ltr">Il faut que tu <span class="h">viennes</span>.</span> (باید بیای)</p>
        <div class="tip">💡 <span><span class="ex" dir="ltr">il faut</span> همیشه با <span class="ex" dir="ltr">il</span> میاد (غیرشخصیه)، حتی برای جمع.</span></div>`
  },
  {
    q: `<span class="fr" dir="ltr">manquer</span> رو چطور درست استفاده کنم؟ («دلم تنگ شده»)`,
    a: `<p>این یکی از گیج‌کننده‌ترین فعل‌هاست چون ساختارش <b>برعکسِ</b> فارسی و انگلیسیه!</p>
        <p>✅ <span class="ex" dir="ltr">Tu <span class="h">me</span> manques.</span> = دلم برات تنگ شده. (تحت‌اللفظی: «تو به من کم هستی»)</p>
        <p>🔹 یعنی کسی که دلت براش تنگ شده، <b>فاعلِ</b> جمله‌ست، نه مفعول.</p>
        <p>✅ <span class="ex" dir="ltr">Ma famille me manque.</span> (دلم برای خانواده‌ام تنگ شده)</p>
        <div class="tip">💡 <span>برعکسش کن: «X به من کم است» = دلم برای X تنگ شده. <span class="ex" dir="ltr">Vous me manquez !</span></span></div>`
  }
];

function sparkles(){
  return `<span class="spk" style="top:10px;left:14px">✦</span>
          <span class="spk p" style="top:24px;right:16px">✦</span>
          <span class="spk" style="bottom:18px;left:22px;font-size:10px">✦</span>`;
}
function render(){
  const box=document.getElementById('faq');
  box.innerHTML=FAQS.map((f,i)=>`
    <div class="faq-item" data-i="${i}">
      ${sparkles()}
      <div class="faq-head" onclick="toggle(${i})">
        <div class="faq-char">${CHAR}</div>
        <div class="dots"><i></i><i></i></div>
        <div class="qbubble">
          <div class="q-label">❓ سوال</div>
          <div class="q-text">${f.q}</div>
        </div>
        <span class="chev">&#9662;</span>
      </div>
      <div class="faq-answer">
        <div class="answer-inner">
          <div class="a-label">✅ جواب هدا</div>
          <div class="a-text">${f.a}</div>
        </div>
      </div>
    </div>`).join('');
}
function toggle(i){
  document.querySelector('.faq-item[data-i="'+i+'"]').classList.toggle('open');
}
render();
document.querySelector('.faq-item') && document.querySelector('.faq-item').classList.add('open');
</script>
</body>
</html>
