        «دلم برای <b>X</b> تنگ شده» ← «<b>X</b> به من کم است» ← <span class="ex" dir="ltr"><b>X</b> me manque.</span><br><br>
        مثال: «دلم برای پاریس تنگ شده» ← «پاریس به من کم است» ← <span class="ex" dir="ltr">Paris me manque.</span></div>

        <h4>📌 معناهای دیگه‌ی manquer</h4>
        <p>این فعل چند کاربردِ دیگه هم داره:</p>
        <ul>
        <li><span class="ex" dir="ltr">J'ai <span class="h">manqué</span> le bus.</span> — اتوبوس رو از دست دادم</li>
        <li><span class="ex" dir="ltr">Il <span class="h">manque</span> une page.</span> — یه صفحه کم است / غایبه</li>
        <li><span class="ex" dir="ltr">Tu as <span class="h">manqué</span> le cours.</span> — کلاس رو غیبت کردی</li>
        </ul>
        <div class="warnb">⚠️ <b>تله‌ی بزرگ:</b> ترجمه‌ی کلمه‌به‌کلمه‌ی انگلیسی فاجعه‌ست! "I miss you" را <b>هرگز</b> نگو <span class="ex" dir="ltr">Je te manque</span> (که یعنی «دلت برام تنگ شده؟»). درستش <span class="ex" dir="ltr">Tu me manques</span> ـه. این یکی از معروف‌ترین اشتباهاتِ زبان‌آموزهاست.</div>
        <div class="tip">💡 <span><b>ترفند نهایی:</b> هر وقت خواستی بگی دلت برای کسی تنگ شده، اول اون شخص/چیز رو بذار اولِ جمله، بعد <span class="ex" dir="ltr">me/te/lui manque</span>. برعکسِ فارسی فکر کن!</span></div>
        <div class="src">📚 منابع: Le Robert (manquer à qqn)؛ مراجع FLE درباره‌ی verbes à construction indirecte.</div>`
  }
];

function sparkles(){
  return `<span class="spk" style="top:10px;left:14px">✦</span>
          <span class="spk p" style="top:24px;right:16px">✦</span>
          <span class="spk" style="bottom:18px;left:22px;font-size:10px">✦</span>`;
}
function render(){
  const box=document.getElementById('faq');
  box.innerHTML=FAQS.map((f,i)=>`
    <div class="faq-item" data-i="${i}">
      ${sparkles()}
      <div class="faq-head" onclick="toggle(${i})">
        <div class="faq-char">${CHAR}</div>
        <div class="dots"><i></i><i></i></div>
        <div class="qbubble">
          <div class="q-label">❓ سوال</div>
          <div class="q-text">${f.q}</div>
        </div>
        <span class="chev">&#9662;</span>
      </div>
      <div class="faq-answer">
        <div class="answer-inner">
          <div class="a-label">✅ جواب هدا</div>
          <div class="a-text">${f.a}</div>
        </div>
      </div>
    </div>`).join('');
}
function toggle(i){
  document.querySelector('.faq-item[data-i="'+i+'"]').classList.toggle('open');
}
render();
document.querySelector('.faq-item') && document.querySelector('.faq-item').classList.add('open');
</script>
