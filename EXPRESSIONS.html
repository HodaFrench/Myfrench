<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>اصطلاحات فرانسوی | Français avec Hoda</title>
<link href="https://fonts.googleapis.com/css2?family=Estedad:wght@300;400;500;600;700;800&family=Roboto:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--paper:#f4f3f5;--ink:#2c2a26;--gray:#8a8275;--line:#e6e3dd;--white:#fcfbfd;--green:#2e8b6b;--green-d:#23704f;--rose:#b0506f;--coral:#c75b39;--coral-d:#9e4327;--gold:#b07a4a}
body{font-family:'Estedad',sans-serif;background:var(--paper);background-image:repeating-linear-gradient(transparent,transparent 31px,rgba(199,91,57,0.04) 31px,rgba(199,91,57,0.04) 32px);color:var(--ink);line-height:1.9;padding:0 0 90px}
.hoda-back{position:sticky;top:0;z-index:200;background:rgba(255,253,246,.97);backdrop-filter:blur(12px);border-bottom:1.5px solid rgba(217,206,184,.55);display:flex;align-items:center;gap:10px;padding:9px 16px}
.hoda-back-btn{display:flex;align-items:center;gap:5px;background:var(--coral);color:#fff;text-decoration:none;border-radius:22px;padding:6px 16px;font-size:13.5px;font-weight:700;white-space:nowrap}
.hoda-back-label{font-size:12px;color:#8a8275;flex:1;text-align:center}
.hero{background:linear-gradient(135deg,#c75b39,#9e4327);color:#fff;padding:28px 26px 24px;text-align:center}
.hero-tag{display:inline-block;background:rgba(255,255,255,.18);border-radius:20px;padding:4px 16px;font-size:11px;letter-spacing:1.5px;margin-bottom:12px;font-weight:600}
.hero h1{font-family:'Roboto',serif;font-size:23px;font-weight:700;margin-bottom:6px}
.hero .sub{font-size:13px;opacity:.92;line-height:1.7}
.wrap{max-width:760px;margin:0 auto;padding:0 1rem}
.list{margin-top:18px}
.ex-item{background:var(--white);border:1px solid var(--line);border-radius:18px;margin-bottom:14px;box-shadow:0 3px 14px rgba(199,91,57,.07);overflow:hidden}
.ex-head{display:flex;align-items:center;gap:12px;padding:13px 14px;cursor:pointer}
.ex-illus{width:74px;height:74px;flex-shrink:0;border-radius:14px;overflow:hidden}
.ex-illus svg{width:100%;height:100%;display:block}
.ex-titles{flex:1;min-width:0}
.ex-fr{font-family:'Roboto',serif;font-size:16px;font-weight:700;color:var(--coral-d);direction:ltr;text-align:left;line-height:1.3}
.ex-fa{font-size:13.5px;color:var(--ink);font-weight:600;margin-top:3px}
.ex-chev{flex-shrink:0;color:var(--coral);font-size:17px;transition:transform .3s}
.ex-item.open .ex-chev{transform:rotate(180deg)}
.ex-body{max-height:0;overflow:hidden;transition:max-height .5s ease}
.ex-item.open .ex-body{max-height:900px}
.ex-inner{padding:0 16px 16px;border-top:1px solid var(--line)}
.row{margin-top:11px}
.row-lab{font-size:11px;font-weight:700;color:var(--gray);margin-bottom:3px}
.lit{font-size:13px;color:#7a6f60;font-style:italic;background:rgba(176,122,74,.08);border-radius:8px;padding:6px 10px;display:inline-block}
.mean{font-size:14.5px;color:#2a3a30;font-weight:600;line-height:1.85}
.mean b{color:var(--coral-d)}
.exs{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.exline{background:rgba(46,139,107,.06);border-right:3px solid var(--green);border-radius:9px;padding:7px 11px}
.exline .f{display:block;direction:ltr;text-align:left;font-family:'Roboto',serif;font-size:14px;color:#2c3e35;font-weight:600}
.exline .p{display:block;font-size:12.5px;color:#5a6b60;margin-top:2px}
.note{margin-top:10px;font-size:12px;color:var(--rose);background:rgba(176,80,111,.07);border-radius:9px;padding:7px 11px;display:flex;gap:6px;align-items:flex-start;line-height:1.7}
.foot{text-align:center;font-size:12.5px;color:var(--gray);margin:22px 6px 0;line-height:1.8;padding:14px;background:var(--white);border-radius:14px;border:1px dashed #d9cbb0}
.foot b{color:var(--coral-d)}
.hk-wm{position:fixed;pointer-events:none;z-index:99999;font-family:Georgia,serif;font-size:13px;font-weight:600;color:rgba(199,91,57,0.06);letter-spacing:2px;transform:rotate(-25deg);user-select:none;white-space:nowrap}
</style>
</head>
<body>
<span class="hk-wm" style="top:34%;left:9%">Hoda Khedmati</span>
<span class="hk-wm" style="top:74%;left:54%">Hoda Khedmati</span>

<div class="hoda-back">
  <a class="hoda-back-btn" href="index.html">&#8592; خانه</a>

</div>

<div class="hero">
  <div class="hero-tag">🎭 EXPRESSIONS IMAGÉES</div>
  <h1>اصطلاحات فرانسوی</h1>
  <div class="sub">اصطلاح‌های رایج و تصویریِ فرانسه —<br>با معنی، ترجمه‌ی فارسی و مثال 🇫🇷</div>
</div>

<div class="wrap">
  <div class="list" id="list"></div>
  <div class="foot">
    🎭 این اصطلاح‌ها رو توی مکالمه و آزمون به کار ببر تا فرانسه‌ت <b>طبیعی و بومی</b> بشه.
  </div>
</div>

<script>

  ex:[["Il n'y avait que trois pelés et un tondu à la fête.","تو مهمونی فقط چند نفر انگشت‌شمار بودن."],
      ["On a annulé le concert : trois pelés et un tondu étaient venus.","کنسرت رو لغو کردن؛ تقریباً هیچ‌کس نیومده بود."]],

  svg:`<svg viewBox="0 0 120 120"><rect width="120" height="120" fill="#f4ead4"/><line x1="14" y1="92" x2="106" y2="92" stroke="#d9c39a" stroke-width="2" stroke-dasharray="4 5"/><g fill="#b58a5a"><circle cx="30" cy="60" r="6"/><path d="M24 88 Q24 70 30 69 Q36 70 36 88 Z"/></g><g fill="#a9b08f"><circle cx="92" cy="66" r="6"/><path d="M86 90 Q86 73 92 72 Q98 73 98 90 Z"/></g><g fill="#c7a4a4"><circle cx="62" cy="56" r="5"/><path d="M57 80 Q57 65 62 64 Q67 65 67 80 Z"/></g><circle cx="100" cy="30" r="2" fill="#d9c39a"/><circle cx="20" cy="34" r="2" fill="#d9c39a"/></svg>`

  ex:[["C'est une grande gueule, mais il n'agit jamais.","خیلی زبونش درازه ولی هیچ‌وقت کاری نمی‌کنه."],
      ["Arrête de faire ta grande gueule !","این‌قدر زبون‌درازی نکن!"]],

  ex:[["Les enfants ont été sages comme des images.","بچه‌ها خیلی آروم و سربه‌راه بودن."],

  svg:`<svg viewBox="0 0 120 120"><rect width="120" height="120" fill="#eaf3f7"/><rect x="26" y="22" width="68" height="76" rx="5" fill="#c79a4a"/><rect x="33" y="29" width="54" height="62" rx="3" fill="#fbf7ee"/><circle cx="60" cy="50" r="12" fill="#f4c9a8"/><path d="M48 53 Q44 36 60 35 Q76 36 72 53 Q68 42 60 42 Q52 42 48 53 Z" fill="#5a3f2b"/><circle cx="56" cy="50" r="1.6" fill="#3a2a1f"/><circle cx="64" cy="50" r="1.6" fill="#3a2a1f"/><path d="M55 56 Q60 60 65 56" stroke="#c0704f" stroke-width="1.6" fill="none" stroke-linecap="round"/><path d="M46 86 Q46 66 60 64 Q74 66 74 86 Z" fill="#7fa9c2"/><path d="M52 12 L53.5 16 L57 17 L53.5 18 L52 22 L50.5 18 L47 17 L50.5 16 Z" fill="#e0b94a"/></svg>`

{

  fa:"یعنی <b>در فضای باز و زیرِ آسمون خوابیدن</b> (بدون سقف، توی طبیعت).",

      ["J'adore dormir à la belle étoile en été.","عاشق اینم که تابستون زیرِ ستاره‌ها بخوابم."]],

},
{
  fr:"Être bien dans ses baskets",
  lit:"توی کفش‌های کتانیِ خودت راحت بودن",
  fa:"یعنی <b>با خودت راحت و در آرامش بودن</b>، اعتمادبه‌نفس داشتن و حالت خوب بودن.",
  ex:[["Depuis qu'elle a changé de travail, elle est bien dans ses baskets.","از وقتی کارش رو عوض کرده، با خودش راحت و سرحاله."],
      ["À cet âge, ce n'est pas facile d'être bien dans ses baskets.","تو این سن، با خود راحت بودن آسون نیست."]],
  note:"خودمونی (familier). «baskets» = کفش کتانی.",
  svg:`<svg viewBox="0 0 120 120"><rect width="120" height="120" fill="#e8f5ee"/><path d="M22 64 L26 52 Q34 50 40 56 L62 64 Q72 66 74 74 L74 80 L24 80 Q20 74 22 64 Z" fill="#fff" stroke="#2e8b6b" stroke-width="2"/><path d="M40 56 L48 62 M46 58 L54 64 M52 60 L60 66" stroke="#2e8b6b" stroke-width="2" stroke-linecap="round"/><rect x="22" y="80" width="52" height="6" rx="3" fill="#23704f"/><circle cx="92" cy="40" r="14" fill="#ffd9a0"/><circle cx="87" cy="38" r="1.8" fill="#3a2a1f"/><circle cx="97" cy="38" r="1.8" fill="#3a2a1f"/><path d="M85 44 Q92 50 99 44" stroke="#c0704f" stroke-width="2" fill="none" stroke-linecap="round"/><path d="M100 18 L101.5 22 L105 23 L101.5 24 L100 28 L98.5 24 L95 23 L98.5 22 Z" fill="#2e8b6b"/></svg>`
},
{
  fr:"Être tiré à quatre épingles",
  lit:"با چهار سنجاق کشیده‌شده",

  ex:[["Il est toujours tiré à quatre épingles au bureau.","همیشه سرِ کار خیلی شیک و مرتبه."],
      ["Pour le mariage, elle était tirée à quatre épingles.","برای عروسی خیلی شیک و آراسته بود."]],
  note:"اشاره به سنجاق‌هایی که لباس را صاف و مرتب نگه می‌داشتند.",
  svg:`<svg viewBox="0 0 120 120"><rect width="120" height="120" fill="#eef0f7"/><circle cx="60" cy="36" r="13" fill="#f4c9a8"/><path d="M48 34 Q46 20 60 20 Q74 20 72 34 Q68 26 60 26 Q52 26 48 34 Z" fill="#3a2a22"/><path d="M40 96 Q40 60 60 56 Q80 60 80 96 Z" fill="#2c3e63"/><path d="M54 56 L60 70 L66 56 L60 60 Z" fill="#fff"/><path d="M56 62 L60 67 L64 62 L60 64 Z" fill="#b0506f"/><line x1="60" y1="70" x2="60" y2="92" stroke="#1f2c46" stroke-width="1.5"/><g fill="#b0a8c0"><circle cx="22" cy="22" r="2.5"/><circle cx="98" cy="22" r="2.5"/><circle cx="22" cy="98" r="2.5"/><circle cx="98" cy="98" r="2.5"/></g><path d="M98 40 L99 43 L102 44 L99 45 L98 48 L97 45 L94 44 L97 43 Z" fill="#c79a4a"/></svg>`
},
{
  fr:"C'est du bidon",
  lit:"این بیدونه (حلب/قمقمه‌ست)",

  ex:[["Ne le crois pas, c'est du bidon.","باورش نکن، چرته/الکیه."],
      ["Cette promesse, c'est du bidon.","این قول الکیه/توخالیه."]],

{
  fr:"Avoir le cafard",

  ex:[["Il pleut et j'ai le cafard.","بارون میاد و دمغم/حالم گرفته‌ست."],
      ["Depuis son départ, elle a le cafard.","از وقتی رفته، دلش گرفته و غمگینه."]],
  note:"خیلی رایج. «cafard» در اصل یعنی سوسک.",
  svg:`<svg viewBox="0 0 120 120"><rect width="120" height="120" fill="#e9eef5"/><path d="M34 40 Q34 28 48 28 Q52 18 64 22 Q78 18 82 32 Q94 34 90 46 Q92 54 80 54 L42 54 Q32 52 34 40 Z" fill="#9aa6b8"/><g stroke="#7c8aaa" stroke-width="3" stroke-linecap="round"><line x1="46" y1="58" x2="44" y2="70"/><line x1="60" y1="58" x2="60" y2="72"/><line x1="74" y1="58" x2="76" y2="70"/></g><circle cx="60" cy="92" r="16" fill="#8fb0d0"/><circle cx="54" cy="90" r="2" fill="#2c3a4a"/><circle cx="66" cy="90" r="2" fill="#2c3a4a"/><path d="M53 100 Q60 95 67 100" stroke="#3a4a5a" stroke-width="2" fill="none" stroke-linecap="round"/></svg>`
}
];

function render(){
  document.getElementById('list').innerHTML = EXPR.map((e,i)=>`
    <div class="ex-item" data-i="${i}">
      <div class="ex-head" onclick="tog(${i})">
        <div class="ex-illus">${e.svg}</div>
        <div class="ex-titles">
          <div class="ex-fr">${e.fr}</div>
          <div class="ex-fa">${e.fa.replace(/<[^>]+>/g,'')}</div>
        </div>
        <span class="ex-chev">&#9662;</span>
      </div>
      <div class="ex-body"><div class="ex-inner">
        <div class="row"><div class="row-lab">📖 ترجمه‌ی تحت‌اللفظی</div><span class="lit">${e.lit}</span></div>
        <div class="row"><div class="row-lab">💡 معنی واقعی</div><div class="mean">${e.fa}</div></div>
        <div class="row"><div class="row-lab">✍️ مثال</div><div class="exs">${e.ex.map(x=>`<div class="exline"><span class="f">${x[0]}</span><span class="p">${x[1]}</span></div>`).join('')}</div></div>
        <div class="note">📌 <span>${e.note}</span></div>
      </div></div>
    </div>`).join('');
}
function tog(i){document.querySelector('.ex-item[data-i="'+i+'"]').classList.toggle('open');}
render();
document.querySelector('.ex-item') && document.querySelector('.ex-item').classList.add('open');
</script>
</body>
</html>
